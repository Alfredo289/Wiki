}} for personal knowledge management, reporting that at ~100 articles it outperforms RAG for Q&A.\n\n_Stub - expand when more sources reference this entity._","href":"andrej-karpathy.html","type":"Source"},"readme":{"title":"LLM Wikid","lead":"<p align=\"center\"> <img src=\"assets/cover.png\" alt=\"LLM Wikid\" width=\"700\"> <\/p> LLM Wikid An AI-maintained knowledge base that lives in Obsidian. Based on Karpathy's LLM Wiki pattern. You dump raw sources into a folder. An AI agent reads them, compiles structured wiki pages with cross-references, runs bias checks, and maintains a master index. Every question you ask gets filed back in. The wiki compounds the more you use it. Works with any agent that can read markdown and run shell commands: Claude Code, OpenClaw, Hermes, Codex, or your own setup. Quick Start ```CLAUDE.md``/wiki-ingestraw/raw","rich":"<p align=\"center\"> <img src=\"assets/cover.png\" alt=\"LLM Wikid\" width=\"700\"> <\/p>\n\nAn AI-maintained knowledge base that lives in Obsidian. Based on Karpathy's LLM Wiki pattern.\n\nYou dump raw sources into a folder. An AI agent reads them, compiles structured wiki pages with cross-references, runs bias checks, and maintains a master index. Every question you ask gets filed back in. The wiki compounds the more you use it.\n\nWorks with any agent that can read markdown and run shell commands: Claude Code, OpenClaw, Hermes, Codex, or your own setup.\n\n##Quick Start\n\nThe agent reads CLAUDE.md and knows everything. That file is the schema that controls the entire system.\n\n##How It Works\n\nThis is **not RAG**. RAG re-derives answers every time by chunking documents and running vector search. This system compiles knowledge once into structured wiki pages, keeps them current, and pre-builds cross-references. At ~100 articles / ~400K words, Karpathy found this outperforms RAG for Q&A.\n\nThe compound loop: every answer filed back means the next query has more to work with. Your curiosity makes the system smarter.\n\n##The Ingest Pipeline\n\nWhen you run /wiki-ingest, the agent processes everything in raw/ through these phases:\n\n**Phase 0 - Sort clippings.** Anything in raw/clippings/ gets moved to the right subfolder based on its URL. Tweet goes to raw/bookmarks/, article to raw/articles/, PDF to raw/papers/. The clippings folder is just an inbox.\n\n**Phase 1 - Resolve.** The agent detects what each file contains and fetches the full content: YouTube URL: extracts transcript via yt-dlp X/Twitter URL: fetches tweet text, thread, metrics via X API Web URL / Reddit: scrapes full page via scrapling PDF: reads directly Plain text: already resolved\n\nThe resolved content replaces the file in-place. The original URL stays in frontmatter for provenance.\n\n**Phase 1.5 - Media extraction.** Images get downloaded to raw/assets/images/ and analyzed. Videos get their transcripts pulled. A tweet that says \"here's my stack\" with an image of the stack is useless without the image.\n\n**Phase 2 - Classify and compile.** Each source gets classified by type (transcript, paper, report, article, tweet, notes) and extracted differently. A transcript gets speaker attribution and action items. A paper gets method and findings. An article gets core thesis and supporting arguments. Generic extraction misses what makes each format valuable.\n\nThe agent creates wiki pages, adds {{wikilinks}} between them, runs bias checks (counter-arguments and data gaps on every page), and updates the master index.\n\n**Phase 3 - Re-index.** If you have qmd installed, the search index gets updated with new content.\n\n##Commands\n\n| Command | What it does | |---------|-------------| | /wiki-ingest | Process new raw sources into wiki pages | | /wiki-query [question] | Research a question, get a cited answer, file it back | | /wiki-explore [topic] | Actively research and expand a topic using web search and /last30days | | /wiki-lint | Health check: contradictions, orphans, broken links, stale content |\n\n##Folder Structure\n\nAfter your first ingest, this is what it looks like:\n\n##Quality Controls\n\nThe system has safeguards to prevent it from becoming a pile of confident-sounding AI output:\n\n**Bias checks.** Every concept and source page includes a ## Counter-arguments section (what pushes back) and a ## Data gaps section (what we don't know). Without these, the wiki just agrees with every source.\n\n**Validation gate.** The agent sets explored: false on every page it creates. Only you can mark something as reviewed by setting it to true. You always know what's been human-verified and what hasn't.\n\n**Confidence levels.** Pages are tagged high, medium, low, or uncertain based on how well-supported the content is. Multiple corroborating sources = high. Single mention with thin evidence = low. The agent has to be honest.\n\n**Source tracing.** Every claim links back to a specific source page. No vague \"research shows\" without pointing to which research.\n\n**No blind links.** Every {{wikilink}} resolves to an actual page. If a concept is mentioned but doesn't have a page yet, the agent creates a stub.\n\n##Curation\n\nThis is an idea bank, not a fact database. Some of what goes in will be wrong, half-formed, or just bad. That's fine. The point is capturing your thinking so it compounds over time.\n\nBut curation matters. Before clipping something into raw/, ask: does this feel 80%+ relevant to what I'm working on or thinking about? If it's noise, skip it. The wiki gets stronger when the inputs are high-signal.\n\nRunning /wiki-lint regularly catches the drift: contradictions between pages, stale claims, orphan pages nobody links to, concepts mentioned but never defined. The agent fixes what it can and flags what needs your judgment.\n\n##Git Sync\n\nGitHub is the source of truth. Every operation that changes wiki/ or raw/ ends with a commit and push. This means:\n\nEvery change is reversible (git revert) Multiple agents can work on the same wiki (pull before writing, push after) You can access the wiki from anywhere that can clone a repo Your entire knowledge history is preserved\n\n##Claude Dispatch (automated ingest)\n\nSet up a scheduled trigger that runs /wiki-ingest every morning. You clip things during the day, they get processed overnight.\n\nOr configure directly: a cron trigger pointing at your repo, running the ingest prompt daily. The remote agent clones the repo, reads CLAUDE.md, processes new sources, commits, and pushes. You wake up to a richer wiki.\n\nThe Dispatch agent runs remotely, so it won't have local tools like X API keys. It can still process web URLs, plain text, and anything already resolved. Tweet resolution happens when you run ingest locally.\n\n##Search (qmd)\n\nFor fast search across your wiki, install qmd by Tobi Lutke. Hybrid BM25/vector search with LLM re-ranking, 100% on-device.\n\nThree search modes:\n\nqmd has a built-in MCP server so your agent can use it as a native tool:\n\nThe /wiki-explore command uses qmd automatically when installed.\n\n##Recommended Skills\n\n| Skill | What it adds | |-------|-------------| | last30days | Searches Reddit, HN, X, YouTube, GitHub, Polymarket for recent community signals. Used by /wiki-explore. | | Obsidian Web Clipper | Clip anything from your browser directly to raw/clippings/ |\n\n##Obsidian Plugins\n\n| Plugin | Purpose | |--------|---------| | Dataview | Query frontmatter, build dashboards from wiki data | | Obsidian Git | Auto-commit on interval, push to remote | | Templater | Auto-populate dates and fields on new notes | | Tag Wrangler | Bulk rename and merge tags |\n\n##Scaling\n\n| Wiki Size | Strategy | |-----------|----------| | 0-300 pages | File-based, index TLDR scanning + qmd search | | 300-500 pages | qmd becomes primary search layer | | 500+ pages | Consider PostgreSQL/Supabase |\n\n##Optional Tools\n\nInstalled as needed during ingestion:\n\n| Tool | What it does | Install | |------|-------------|---------| | yt-dlp | YouTube transcripts | brew install yt-dlp | | scrapling | Web scraping | pipx install scrapling | | summarize | PDF extraction | brew install steipete/tap/summarize | | X API | Tweet/thread fetching | OAuth keys in .env (optional) |\n\n##Credits\n\nAndrej Karpathy's LLM Wiki pattern - the original idea hooeem's LLM Knowledge Base course - practical walkthrough qmd by Tobi Lutke - local markdown search engine last30days by mvanhorn - multi-platform signal search Built by @shannholmberg","href":"readme.html","type":"Concept"},"concept":{"title":"{{title}}","lead":"{{title}} [Lead section: 2-3 sentences defining this concept] Key Ideas How It Connects Counter-arguments Data gaps","rich":"[Lead section: 2-3 sentences defining this concept]\n\n##Key Ideas\n\n##How It Connects\n\n##Counter-arguments\n\n##Data gaps","href":"concept.html","type":"Source"},"entity":{"title":"{{title}}","lead":"{{title}} [One paragraph: what/who this is and why it matters] Details Related","rich":"[One paragraph: what/who this is and why it matters]\n\n##Details\n\n##Related","href":"entity.html","type":"Source"},"source":{"title":"{{title}}","lead":"{{title}} Summary Key Takeaways Concepts & Entities Mentioned Counter-arguments Data gaps","rich":"##Summary\n\n##Key Takeaways\n\n##Concepts & Entities Mentioned\n\n##Counter-arguments\n\n##Data gaps","href":"source.html","type":"Source"},"synthesis":{"title":"{{title}}","lead":"{{title}} Analysis Patterns Counter-arguments Data gaps","rich":"##Analysis\n\n##Patterns\n\n##Counter-arguments\n\n##Data gaps","href":"synthesis.html","type":"Source"},"project":{"title":"{{title}}","lead":"{{title}} Goal Context Key Decisions Related","rich":"##Goal\n\n##Context\n\n##Key Decisions\n\n##Related","href":"project.html","type":"Source"},"output":{"title":"{{title}}","lead":"{{title}} Answer Sources Consulted","rich":"##Answer\n\n##Sources Consulted","href":"output.html","type":"Source"},"sop":{"title":"{{title}}","lead":"{{title}} When to Use Steps Notes","rich":"##When to Use\n\n##Steps\n\n1.\n\n##Notes","href":"sop.html","type":"Source"},"claude":{"title":"claude","lead":"# LLM Knowledge Base - Schema Overview Personal knowledge base maintained by an LLM agent. Raw sources live in . The compiled wiki lives in . You (the AI) maintain all wiki content. The user directs strategy and source collection; you execute compilation, maintenance, and queries. This is NOT RAG. Knowledge is pre-compiled into wiki pages. The agent reads structured pages, not raw chunks. Every query compounds the system. Directory Structure Wiki - Master index linking every page with TLDR for fast scanning - Append-only changelog of all operations - Concept pages (ideas, frameworks, topics) -","rich":"# LLM Knowledge Base - Schema\n\n##Overview\n\nPersonal knowledge base maintained by an LLM agent. Raw sources live in raw/. The compiled wiki lives in wiki/. You (the AI) maintain all wiki content. The user directs strategy and source collection; you execute compilation, maintenance, and queries.\n\nThis is NOT RAG. Knowledge is pre-compiled into wiki pages. The agent reads structured pages, not raw chunks. Every query compounds the system.\n\n##Directory Structure\n\n##Wiki\n\nwiki/index.md - Master index linking every page with TLDR for fast scanning wiki/log.md - Append-only changelog of all operations wiki/concepts/ - Concept pages (ideas, frameworks, topics) wiki/entities/ - Entity pages (people, companies, tools, protocols) wiki/sources/ - Source summary pages (one per raw source) wiki/syntheses/ - Cross-cutting analysis across sources wiki/outputs/ - Filed answers to queries wiki/sops/ - Repeatable processes and workflows templates/ - Starter templates per page type (for Obsidian Templater)\n\n##Raw\n\nraw/ideas/ - Idea notes and brainstorms raw/bookmarks/ - Bookmarked tweet and article sources raw/x-archive/ - X archive tweets (exported from X/Twitter) raw/clippings/ - Obsidian Web Clipper inbox. Everything lands here. During INGEST, files get sorted to the correct subfolder and removed from clippings. raw/articles/ - Long-form articles and blog posts (sorted from clippings) raw/papers/ - Research papers and PDFs (sorted from clippings) raw/assets/ - Images, videos, and other media\n\nNew wiki pages go in the subfolder matching their type frontmatter field. Wikilinks use filename only (Obsidian resolves via shortest-path setting).\n\n##Frontmatter Schema\n\nEvery wiki page MUST have YAML frontmatter:\n\n##Validation Gate\n\nexplored defaults to **false** on every AI-created or AI-updated page. Only the user can set it to true after reviewing the content. This prevents blind trust in AI-generated knowledge. The agent must never set explored: true.\n\nconfidence signals how well-supported the content is: **high** - multiple corroborating sources, well-established topic **medium** - single source or limited evidence, reasonable synthesis **low** - speculative, early-stage idea, thin evidence **uncertain** - contradictory sources or insufficient information\n\n##Page Types\n\n| Type | What it is | |------|-----------| | concept | An idea, framework, or topic | | entity | Person, company, tool, protocol | | source | Summary of one raw source | | project | Active project with goals and context | | sop | Repeatable process or workflow | | synthesis | Cross-cutting analysis across sources | | output | Filed answer to a query |\n\n##Source Resolution (Resolve Before Classify)\n\nraw/ is a messy inbox. Before classification, INGEST must resolve each input to its full content using the right tool.\n\n##Resolution Tool Mapping\n\n| Input Pattern | Tool | What It Extracts | |--------------|------|-----------------| | YouTube URL (youtube.com, youtu.be) | yt-dlp | Transcript (auto-subs), title, description, metadata | | X/Twitter URL (x.com, twitter.com) | X API (OAuth) | Tweet text, thread, author, metrics. If video/image attached, also yt-dlp for video and download images | | Web URL / Reddit URL | scrapling | Page content, title, author, date | | PDF file (.pdf) | Read directly / summarize CLI | Full text extraction | | Bookmark dump (list of URLs) | Parse each URL, resolve individually | One resolved file per URL | | Plain text / notes / ideas | Read as-is | No resolution needed |\n\n##Media Extraction\n\nEvery source with attached media MUST have that media downloaded and analyzed:\n\n**Images:** Download to raw/assets/images/ with descriptive kebab-case names Analyze the image content (diagrams, screenshots, infographics, memes, charts) Include analysis in the source summary: what the image shows, key data points, visual format Reference in the raw file frontmatter: media: [\"raw/assets/images/filename.png\"] Embed in wiki source pages: !{{raw/assets/images/filename.png}}\n\n**Videos:** Extract transcript via yt-dlp --write-auto-sub --skip-download Download thumbnail to raw/assets/images/ If short video (under 2 min), describe the visual content in the source summary Reference in raw file frontmatter: media_transcript: \"raw/assets/filename-transcript.txt\"\n\nImages often contain the actual information (diagrams, frameworks, data). A tweet saying \"here's my framework\" with an image of the framework is useless without the image. The wiki must capture the visual knowledge, not just the text.\n\nResolution updates the file in raw/ in-place, preserving the original URL in frontmatter:\n\n##Tool Dependencies\n\n| Tool | Install | Auth | |------|---------|------| | yt-dlp | brew install yt-dlp | None | | scrapling | pipx install scrapling | None | | X API | Official API (OAuth 2.0) | Bearer token + client credentials in .env (optional) | | summarize (optional) | brew install steipete/tap/summarize | None |\n\n##Source Classification (Classify After Resolution)\n\nAfter resolution, classify the content and extract accordingly:\n\n| Source Type | Extraction Focus | |------------|-----------------| | **Transcript** (YouTube, meeting) | Speaker attribution, decisions made, action items, key quotes | | **Paper/Research** | Method, findings, limitations, how it connects to existing knowledge | | **Report** | Executive summary first, key metrics, recommendations | | **Article/Blog** | Core thesis, supporting arguments, author's perspective | | **Tweet/Thread** | Core claim, context, engagement signals, author credibility | | **Reddit thread** | Original post thesis, top arguments for/against, consensus vs outliers | | **Notes/Ideas** | Key ideas, questions raised, connections to other topics |\n\nGeneric extraction misses what makes each format valuable.\n\n##Bias Check\n\nEvery concept, synthesis, and source page MUST include:\n\nThis prevents the wiki from becoming an echo chamber that agrees with every source.\n\n##Operations\n\n##INGEST\n\n1. Scan raw/ for files not yet summarized in wiki/ 2. **RESOLVE**: For each unprocessed file, detect if it contains a URL or unresolved reference. Fetch full content using the right tool and update the file in-place, preserving the original URL in frontmatter. 3. Classify each source by type (transcript, paper, report, article, tweet, reddit, notes) 4. Create source summary using type-specific extraction 5. Identify concepts, entities, and projects mentioned 6. Create new pages if concept appears in 2+ sources (stub if only 1) 7. Update existing pages - append new info, never rewrite from scratch 8. Add {{wikilinks}} to connect new content to existing pages 9. Run bias check: add counter-arguments and data gaps sections 10. Update wiki/index.md with new entries and TLDRs 11. Append to wiki/log.md with date, operation, pages touched\n\n##QUERY\n\n1. Read wiki/index.md - scan TLDRs only 2. Identify relevant pages from TLDRs (skip irrelevant ones to save tokens) 3. Read full content of relevant pages 4. Synthesize an answer with citations to specific {{wiki pages}} 5. Save the answer as wiki/outputs/{question-slug}.md with type: output 6. Update wiki/index.md and wiki/log.md\n\n##EXPLORE\n\n1. Take a topic or concept name as input 2. Read the existing wiki page for that topic (if it exists) 3. Identify gaps, thin sections, and open questions from the page's Data gaps section 4. Search for additional information using available tools (web search, scraping, etc.) 5. Expand the page with new findings, always citing sources 6. Create new source pages in wiki/sources/ for any external material found 7. Update related concept and entity pages with cross-references 8. Set confidence based on source quality and corroboration 9. Set explored: false (always - only the user validates) 10. Update wiki/index.md and wiki/log.md\n\n##LINT\n\n1. Find contradictions between pages 2. Find orphan pages (no inbound links) 3. Find broken {{wikilinks}} pointing to nothing 4. Identify missing frontmatter fields 5. Flag stale content (>6 months, no updates) 6. Suggest new articles for frequently mentioned but unlinked concepts 7. Check for duplicate concepts under different names - merge them 8. Fix automatically where possible 9. Output report to wiki/outputs/lint-report-{date}.md\n\n##COMPILE (rebuild indexes)\n\n1. Scan all wiki pages 2. Regenerate wiki/index.md with current page list and TLDRs 3. Verify all {{wikilinks}} resolve to existing pages 4. Create stubs for any unresolved links\n\n##Page Creation Threshold\n\n**Full page**: subject appears in 2+ sources **Stub page**: single mention (frontmatter + one-line definition + source link) **Never** leave a {{wikilink}} pointing to nothing\n\n##Quality Standards\n\nSource summaries: 200-500 words, synthesize - don't copy Concept articles: 500-1500 words with clear lead section Always trace claims to specific source pages Flag contradictions with a warning note, stating both positions Prefer recency when sources conflict Only make connections explicitly supported by source material Use {{wikilinks}} for all internal cross-references Link only the first occurrence of a concept per section Bold key terms on first use in each article No em dashes - use regular dashes or commas All filenames: kebab-case, lowercase Source summaries: {author-or-source}-{year}-{short-title}.md\n\n##External Integrations\n\n**Git**: Version control for the vault. Every change is reversible. **Obsidian**: Browse and read the wiki. Graph view for connections. Dataview for queries. **Obsidian Web Clipper**: Save location set to raw/clippings/. Clip anything - tweets, articles, Reddit, YouTube, GitHub. During INGEST Phase 0, files get sorted to the correct raw/ subfolder based on source URL, then removed from clippings/.\n\n##Scale Plan\n\n| Pages | Strategy | |-------|----------| | 0-300 | File-based, index.md TLDR scanning. Current approach. | | 300-500 | Add qmd - local markdown search with hybrid BM25/vector + LLM re-ranking. CLI and MCP server. | | 500+ | Consider structured DB (PostgreSQL/Supabase). |","href":"claude.html","type":"Concept"}};
</script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

(function () {
  // ── Data ──
  var mapData = window.__MAP_DATA__;
  var previews = window.__PREVIEWS_DATA__ || {};
  var nodes = mapData.nodes;
  var edges = mapData.edges;

  // ── Theme palettes ──
  var THEMES = {
    dark: {
      bg: 0x0a0a0a,
      fog: 0x0a0a0a,
      ground: 0x0a0f0a,
      grid1: 0x0a2a1a, grid2: 0x1a4a2a,
      ambient: 0x111122, ambientI: 0.6,
      dir: 0xffffff, dirI: 1.2,
      rim: 0x2A9D8F, rimI: 0.4,
      edge: 0x2A9D8F,
      colors: { concept: 0x00ff88, source: 0xff6633, question: 0x44aaff, entity: 0xffaa00, special: 0x888888 },
      colorHex: { concept: '#00ff88', source: '#ff6633', question: '#44aaff', entity: '#ffaa00', special: '#888888' },
      label: function(c) { return '#' + c.toString(16).padStart(6, '0'); }
    },
    light: {
      bg: 0xfbfaf5,
      fog: 0xfbfaf5,
      ground: 0xf3ede0,
      grid1: 0xe3dccb, grid2: 0xd9cfb9,
      ambient: 0xffffff, ambientI: 0.8,
      dir: 0xffeedd, dirI: 1.0,
      rim: 0x7a1f1f, rimI: 0.2,
      edge: 0x7a1f1f,
      colors: { concept: 0x4f8a6d, source: 0xc77a3c, question: 0x4a7ca6, entity: 0xb8963c, special: 0x9a8a77 },
      colorHex: { concept: '#4f8a6d', source: '#c77a3c', question: '#4a7ca6', entity: '#b8963c', special: '#9a8a77' },
      label: function(c) { return '#' + c.toString(16).padStart(6, '0'); }
    }
  };

  var currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  var T = THEMES[currentTheme];
  var COLORS = T.colors;
  var COLOR_HEX = T.colorHex;
  var CATEGORY_LABELS = {
    concept: 'Concepts', source: 'Sources', question: 'Questions',
    entity: 'Entities', special: 'Meta'
  };

  // ── Scene setup ──
  var container = document.getElementById('scene-container');
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(T.bg);
  scene.fog = new THREE.FogExp2(T.fog, 0.0004);

  var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 10000);
  camera.position.set(-200, 350, 900);
  camera.lookAt(0, 0, -200);

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // ── Controls ──
  var controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 100;
  controls.maxDistance = 3000;
  controls.maxPolarAngle = Math.PI * 0.48;
  controls.target.set(0, 30, -200);

  // ── Lighting (dramatic SGI) ──
  var ambientLight = new THREE.AmbientLight(T.ambient, T.ambientI);
  scene.add(ambientLight);

  var dirLight = new THREE.DirectionalLight(T.dir, T.dirI);
  dirLight.position.set(200, 500, 300);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 10;
  dirLight.shadow.camera.far = 2000;
  dirLight.shadow.camera.left = -1000;
  dirLight.shadow.camera.right = 1000;
  dirLight.shadow.camera.top = 1000;
  dirLight.shadow.camera.bottom = -1000;
  scene.add(dirLight);

  var rimLight = new THREE.DirectionalLight(T.rim, T.rimI);
  rimLight.position.set(-300, 200, -200);
  scene.add(rimLight);

  // ── Ground plane ──
  var groundGeo = new THREE.PlaneGeometry(6000, 6000);
  var groundMat = new THREE.MeshStandardMaterial({
    color: T.ground, roughness: 0.95, metalness: 0.1
  });
  var ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Grid lines on ground ──
  var gridHelper = new THREE.GridHelper(4000, 80, T.grid1, T.grid1);
  gridHelper.position.y = 0.1;
  scene.add(gridHelper);

  var gridHelper2 = new THREE.GridHelper(4000, 20, T.grid2, T.grid2);
  gridHelper2.position.y = 0.2;
  scene.add(gridHelper2);

  // ── Layout: map grid positions to 3D world ──
  var CELL_SPACING = 120;
  var nodeById = {};
  var meshByNodeId = {};
  var labelByNodeId = {};
  var nodeMeshes = [];
  var activeCategories = new Set(Object.keys(COLORS));

  // Center the grid
  var minRow = Infinity, maxRow = -Infinity, minCol = Infinity, maxCol = -Infinity;
  nodes.forEach(function (n) {
    if (n.row < minRow) minRow = n.row;
    if (n.row > maxRow) maxRow = n.row;
    if (n.col < minCol) minCol = n.col;
    if (n.col > maxCol) maxCol = n.col;
    nodeById[n.id] = n;
  });
  var centerRow = (minRow + maxRow) / 2;
  var centerCol = (minCol + maxCol) / 2;

  // ── Create blocks ──
  var blockGroup = new THREE.Group();
  scene.add(blockGroup);

  nodes.forEach(function (node) {
    var color = COLORS[node.category] || 0x888888;
    var words = node.words || 0;
    var height = 3 + Math.sqrt(words) * 2;
    var width = 60;
    var depth = 40;

    var geo = new THREE.BoxGeometry(width, height, depth);
    var mat = new THREE.MeshStandardMaterial({
      color: color,
      roughness: 0.3,
      metalness: 0.6,
      emissive: color,
      emissiveIntensity: 0.08
    });
    var mesh = new THREE.Mesh(geo, mat);

    var x = (node.col - centerCol) * CELL_SPACING;
    var z = (node.row - centerRow) * CELL_SPACING;
    mesh.position.set(x, height / 2, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    mesh.userData = { nodeId: node.id, baseHeight: height, baseColor: color };
    meshByNodeId[node.id] = mesh;
    nodeMeshes.push(mesh);
    blockGroup.add(mesh);

    // Store world position on node for edge drawing
    node._wx = x;
    node._wz = z;
    node._height = height;

    // ── Label (sprite) ──
    var labelCanvas = document.createElement('canvas');
    var labelCtx = labelCanvas.getContext('2d');
    var text = node.label.replace(/[~…]/g, '');
    if (text.length > 22) text = text.substring(0, 20) + '..';
    labelCanvas.width = 1024;
    labelCanvas.height = 128;
    labelCtx.font = '600 44px monospace';
    labelCtx.textAlign = 'center';
    // Measure text to draw a background pill
    var tw = labelCtx.measureText(text).width;
    var px = 20, py = 10;
    var rx = 512 - tw/2 - px, ry = 38 - py;
    var rw = tw + px*2, rh = 56 + py*2;
    labelCtx.fillStyle = currentTheme === 'light' ? 'rgba(251,250,245,0.88)' : 'rgba(10,10,10,0.75)';
    labelCtx.beginPath();
    labelCtx.roundRect(rx, ry, rw, rh, 8);
    labelCtx.fill();
    labelCtx.fillStyle = currentTheme === 'light' ? '#3A2F1C' : '#' + color.toString(16).padStart(6, '0');
    labelCtx.fillText(text, 512, 80);

    var labelTexture = new THREE.CanvasTexture(labelCanvas);
    labelTexture.minFilter = THREE.LinearFilter;
    var labelMat = new THREE.SpriteMaterial({ map: labelTexture, transparent: true, depthTest: false });
    var sprite = new THREE.Sprite(labelMat);
    sprite.scale.set(120, 15, 1);
    sprite.position.set(x, height + 12, z);
    sprite.renderOrder = 1;
    labelByNodeId[node.id] = sprite;
    blockGroup.add(sprite);
  });

  // ── Edge lines ──
  var edgeGroup = new THREE.Group();
  scene.add(edgeGroup);

  // Build adjacency lookup for hover highlighting
  var neighbors = {};
  edges.forEach(function (edge) {
    if (!neighbors[edge.source]) neighbors[edge.source] = [];
    if (!neighbors[edge.target]) neighbors[edge.target] = [];
    neighbors[edge.source].push(edge.target);
    neighbors[edge.target].push(edge.source);
  });

  var edgeLines = []; // { line, source, target }
  var highlightGroup = new THREE.Group();     // hover highlights (cleared on unhover)
  scene.add(highlightGroup);
  var selectionEdgeGroup = new THREE.Group(); // selection highlights (persist while panel open)
  scene.add(selectionEdgeGroup);

  function buildEdges() {
    while (edgeGroup.children.length > 0) edgeGroup.remove(edgeGroup.children[0]);
    edgeLines = [];

    var lineMaterial = new THREE.LineBasicMaterial({
      color: 0x2A9D8F, transparent: true, opacity: 0.15
    });
    var lineMatBright = new THREE.LineBasicMaterial({
      color: 0x2A9D8F, transparent: true, opacity: 0.35
    });

    edges.forEach(function (edge) {
      var sn = nodeById[edge.source];
      var tn = nodeById[edge.target];
      if (!sn || !tn) return;
      if (!activeCategories.has(sn.category) || !activeCategories.has(tn.category)) return;

      var midY = Math.max(sn._height, tn._height) * 0.5 + 4;
      var points = [
        new THREE.Vector3(sn._wx, 1, sn._wz),
        new THREE.Vector3(sn._wx, midY, sn._wz),
        new THREE.Vector3(tn._wx, midY, tn._wz),
        new THREE.Vector3(tn._wx, 1, tn._wz)
      ];
      var geo = new THREE.BufferGeometry().setFromPoints(points);
      var dist = Math.abs(sn.row - tn.row) + Math.abs(sn.col - tn.col);
      var defaultMat = dist <= 3 ? lineMatBright : lineMaterial;
      var line = new THREE.Line(geo, defaultMat);
      line.userData = { source: edge.source, target: edge.target, defaultMat: defaultMat };
      edgeLines.push(line);
      edgeGroup.add(line);
    });
  }
  buildEdges();

  // ── Center camera on content — fsn corridor angle ──
  controls.target.set(0, 20, -100);
  camera.position.set(-300, 400, 700);

  // ── Raycasting for hover/click ──
  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  var hoveredMesh = null;
  var tooltipEl = document.getElementById('tooltip');

  function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(nodeMeshes);

    if (intersects.length > 0) {
      var mesh = intersects[0].object;
      if (hoveredMesh !== mesh) {
        unhover();
        hoveredMesh = mesh;
        hover(mesh);
      }
      updateTooltip(mesh.userData.nodeId, event.clientX, event.clientY);
      container.style.cursor = 'pointer';
    } else {
      if (hoveredMesh) {
        unhover();
        hoveredMesh = null;
      }
      hideTooltip();
      container.style.cursor = 'grab';
    }
  }

  function hover(mesh) {
    var nodeId = mesh.userData.nodeId;
    mesh.material.emissiveIntensity = 0.4;
    mesh.scale.y = 1.15;
    mesh.position.y = mesh.userData.baseHeight * 1.15 / 2;

    var sprite = labelByNodeId[nodeId];
    if (sprite) sprite.material.opacity = 1.0;

    // Highlight connected edges with fat lines
    while (highlightGroup.children.length > 0) highlightGroup.remove(highlightGroup.children[0]);
    edgeLines.forEach(function (line) {
      if (line.userData.source === nodeId || line.userData.target === nodeId) {
        line.visible = false;
        var sn = nodeById[line.userData.source];
        var tn = nodeById[line.userData.target];
        if (sn && tn) {
          var midY = Math.max(sn._height, tn._height) * 0.5 + 4;
          var positions = [sn._wx, 1, sn._wz, sn._wx, midY, sn._wz, tn._wx, midY, tn._wz, tn._wx, 1, tn._wz];
          var geo = new LineGeometry();
          geo.setPositions(positions);
          var mat = new LineMaterial({ color: 0x2A9D8F, linewidth: 4, transparent: true, opacity: 0.9 });
          mat.resolution.set(window.innerWidth, window.innerHeight);
          var fatLine = new Line2(geo, mat);
          fatLine.computeLineDistances();
          highlightGroup.add(fatLine);
        }
      }
    });

    // Highlight neighbor nodes
    var nbrs = neighbors[nodeId] || [];
    nbrs.forEach(function (nbrId) {
      var nbrMesh = meshByNodeId[nbrId];
      if (nbrMesh) {
        nbrMesh.material.emissiveIntensity = 0.25;
      }
      var nbrSprite = labelByNodeId[nbrId];
      if (nbrSprite) nbrSprite.material.opacity = 1.0;
    });

    // Dim non-connected nodes
    nodeMeshes.forEach(function (m) {
      if (m !== mesh && !nbrs.includes(m.userData.nodeId)) {
        m.material.emissiveIntensity = 0.02;
        m.material.opacity = 0.4;
        m.material.transparent = true;
      }
    });
  }

  function unhover() {
    if (!hoveredMesh) return;
    // Don't reset the selected node's visual state
    if (hoveredMesh.userData.nodeId !== selectedNodeId) {
      hoveredMesh.material.emissiveIntensity = 0.08;
      hoveredMesh.scale.y = 1;
      hoveredMesh.position.y = hoveredMesh.userData.baseHeight / 2;
    }

    var sprite = labelByNodeId[hoveredMesh.userData.nodeId];
    if (sprite) sprite.material.opacity = 1.0;

    // Reset hover edges (but keep selection edges hidden)
    while (highlightGroup.children.length > 0) highlightGroup.remove(highlightGroup.children[0]);
    edgeLines.forEach(function (line) {
      // Only restore if not hidden by the active selection
      if (selectedNodeId && (line.userData.source === selectedNodeId || line.userData.target === selectedNodeId)) return;
      line.visible = true;
    });

    // Reset all nodes
    nodeMeshes.forEach(function (m) {
      m.material.emissiveIntensity = 0.08;
      m.material.opacity = 1.0;
      m.material.transparent = false;
    });
  }

  function updateTooltip(nodeId, screenX, screenY) {
    var p = previews[nodeId];
    if (!p) { hideTooltip(); return; }
    var node = nodeById[nodeId];
    var cat = node ? node.category : '';
    var colorHex = COLOR_HEX[cat] || '#888';

    var lead = p.lead || '';
    if (lead.length > 200) lead = lead.substring(0, 197) + '...';

    tooltipEl.innerHTML =
      '<div class="tip-type" style="color:' + colorHex + '">' + (CATEGORY_LABELS[cat] || cat) + '</div>' +
      '<div class="tip-title">' + escapeHtml(p.title || nodeId) + '</div>' +
      '<div class="tip-lead">' + escapeHtml(lead) + '</div>';

    var tw = 20 * 16, margin = 16;
    var left = screenX + 16, top = screenY - 10;
    if (left + tw > window.innerWidth - margin) left = screenX - tw - 16;
    if (left < margin) left = margin;
    if (top < margin) top = margin;
    if (top + 200 > window.innerHeight) top = window.innerHeight - 220;
    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
    tooltipEl.classList.add('visible');
  }

  function hideTooltip() { tooltipEl.classList.remove('visible'); }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ── Drag detection — suppress click after orbit drag ──
  var pointerDownX = 0, pointerDownY = 0, didDrag = false;
  renderer.domElement.addEventListener('pointerdown', function (e) {
    pointerDownX = e.clientX; pointerDownY = e.clientY; didDrag = false;
  });
  renderer.domElement.addEventListener('pointermove', function (e) {
    if (Math.abs(e.clientX - pointerDownX) + Math.abs(e.clientY - pointerDownY) > 5) didDrag = true;
  });

  // ── Detail panel ──
  var detailPanel = document.getElementById('detail-panel');
  var detailType = document.getElementById('detail-type');
  var detailBody = document.getElementById('detail-body');
  var detailOpen = document.getElementById('detail-open');
  var detailClose = document.getElementById('detail-close');
  var CATEGORY_LABELS_PANEL = { source: 'Source', concept: 'Concept', meta: 'Meta' };

  var legendPanel = document.getElementById('legend-panel');

  // Selection effects for clicked node
  // Ground glow disc
  var glowGeo = new THREE.CircleGeometry(55, 32);
  glowGeo.rotateX(-Math.PI / 2);
  var glowMat = new THREE.MeshBasicMaterial({ color: 0x7a1f1f, transparent: true, opacity: 0, side: THREE.DoubleSide });
  var selectionGlow = new THREE.Mesh(glowGeo, glowMat);
  selectionGlow.position.y = 0.3;
  scene.add(selectionGlow);

  // Outer ring
  var ringGeo = new THREE.RingGeometry(48, 55, 32);
  ringGeo.rotateX(-Math.PI / 2);
  var ringMat = new THREE.MeshBasicMaterial({ color: 0x7a1f1f, transparent: true, opacity: 0, side: THREE.DoubleSide });
  var selectionRing = new THREE.Mesh(ringGeo, ringMat);
  selectionRing.position.y = 0.5;
  scene.add(selectionRing);

  // Vertical beam — layered for soft glow
  var beamGroup = new THREE.Group();
  scene.add(beamGroup);
  var beamLayers = [];
  var beamRadii = [
    { top: 2, bot: 20, opacity: 0.1 },
    { top: 6, bot: 35, opacity: 0.06 },
    { top: 12, bot: 50, opacity: 0.03 },
  ];
  beamRadii.forEach(function (layer) {
    var geo = new THREE.CylinderGeometry(layer.top, layer.bot, 250, 16, 1, true);
    var mat = new THREE.MeshBasicMaterial({ color: 0xC2A96B, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.userData.baseOpacity = layer.opacity;
    beamLayers.push(mesh);
    beamGroup.add(mesh);
  });

  var selectedNodeId = null;

  function showDetail(nodeId) {
    var node = nodeById[nodeId];
    var p = previews[nodeId];
    if (!node) return;

    // Restore ALL nodes and edges to original state first
    while (selectionEdgeGroup.children.length > 0) selectionEdgeGroup.remove(selectionEdgeGroup.children[0]);
    edgeLines.forEach(function (line) { line.visible = true; });
    nodeMeshes.forEach(function (m) {
      m.material.color.set(m.userData.baseColor);
      m.material.emissive.set(m.userData.baseColor);
      m.material.emissiveIntensity = 0.08;
      m.scale.set(1, 1, 1);
      m.position.y = m.userData.baseHeight / 2;
    });

    // Highlight selected node
    selectedNodeId = nodeId;
    var mesh = meshByNodeId[nodeId];
    if (mesh) {
      var accentColor = currentTheme === 'light' ? 0xC2A96B : 0x2A9D8F;
      mesh.material.emissiveIntensity = 0.6;
      mesh.scale.set(1.1, 1.25, 1.1);
      mesh.position.y = mesh.userData.baseHeight * 1.25 / 2;

      // Ground glow
      selectionGlow.position.set(mesh.position.x, 0.3, mesh.position.z);
      glowMat.color.set(accentColor);
      glowMat.opacity = 0.2;

      // Ring
      selectionRing.position.set(mesh.position.x, 0.5, mesh.position.z);
      ringMat.color.set(accentColor);
      ringMat.opacity = 0.5;

      // Beam — soft layered glow
      beamGroup.position.set(mesh.position.x, mesh.userData.baseHeight + 125, mesh.position.z);
      beamLayers.forEach(function (layer) {
        layer.material.color.set(accentColor);
        layer.material.opacity = layer.userData.baseOpacity;
      });

      // Highlight connected edges with fat lines (persistent selection)
      while (selectionEdgeGroup.children.length > 0) selectionEdgeGroup.remove(selectionEdgeGroup.children[0]);
      var nbrs = neighbors[nodeId] || [];
      edgeLines.forEach(function (line) {
        if (line.userData.source === nodeId || line.userData.target === nodeId) {
          line.visible = false;
          var sn = nodeById[line.userData.source];
          var tn = nodeById[line.userData.target];
          if (sn && tn) {
            var midY = Math.max(sn._height, tn._height) * 0.5 + 4;
            var positions = [sn._wx, 1, sn._wz, sn._wx, midY, sn._wz, tn._wx, midY, tn._wz, tn._wx, 1, tn._wz];
            var geo = new LineGeometry();
            geo.setPositions(positions);
            var mat = new LineMaterial({ color: 0x2A9D8F, linewidth: 4, transparent: true, opacity: 0.9 });
            mat.resolution.set(window.innerWidth, window.innerHeight);
            var fatLine = new Line2(geo, mat);
            fatLine.computeLineDistances();
            selectionEdgeGroup.add(fatLine);
          }
        }
      });

      // Dim unconnected nodes by blending toward background
      var bgColor = new THREE.Color(T.bg);
      nodeMeshes.forEach(function (m) {
        if (m === mesh || nbrs.includes(m.userData.nodeId)) return;
        var base = new THREE.Color(m.userData.baseColor);
        m.material.color.copy(base).lerp(bgColor, 0.75);
        m.material.emissive.copy(base).lerp(bgColor, 0.75);
        m.material.emissiveIntensity = 0.02;
      });
    }

    var cat = node.category || '';
    detailType.textContent = CATEGORY_LABELS_PANEL[cat] || cat.toUpperCase();
    detailOpen.href = node.href || (nodeId + '.html');

    var html = '<h1>' + escapeHtml(p ? p.title : node.label) + '</h1>';
    html += '<div class="detail-meta">' + escapeHtml(cat) + ' &middot; ' + (node.words || 0) + ' words</div>';

    if (p && p.lead) {
      html += '<div class="detail-lead">' + escapeHtml(p.lead) + '</div>';
    }

    // Show connections
    var nbrs = neighbors[nodeId] || [];
    if (nbrs.length > 0) {
      html += '<div class="detail-links"><h4>Connected (' + nbrs.length + ')</h4>';
      nbrs.forEach(function (nbrId) {
        var nbrNode = nodeById[nbrId];
        var label = nbrNode ? nbrNode.label : nbrId;
        html += '<a href="javascript:void(0)" onclick="showDetailById(\'' + nbrId + '\')">' + escapeHtml(label) + '</a>';
      });
      html += '</div>';
    }

    detailBody.innerHTML = html;
    detailPanel.classList.add('open');
    legendPanel.style.display = 'none';
  }

  // Expose for inline onclick in connection links
  window.showDetailById = showDetail;

  function hideDetail() {
    detailPanel.classList.remove('open');
    legendPanel.style.display = '';
    glowMat.opacity = 0;
    ringMat.opacity = 0;
    beamLayers.forEach(function (layer) { layer.material.opacity = 0; });
    // Restore selection edges
    while (selectionEdgeGroup.children.length > 0) selectionEdgeGroup.remove(selectionEdgeGroup.children[0]);
    edgeLines.forEach(function (line) { line.visible = true; });
    // Restore all nodes to original colors
    nodeMeshes.forEach(function (m) {
      m.material.color.set(m.userData.baseColor);
      m.material.emissive.set(m.userData.baseColor);
      m.material.emissiveIntensity = 0.08;
    });
    if (selectedNodeId && meshByNodeId[selectedNodeId]) {
      var m = meshByNodeId[selectedNodeId];
      m.scale.set(1, 1, 1);
      m.position.y = m.userData.baseHeight / 2;
    }
    selectedNodeId = null;
  }

  detailClose.addEventListener('click', hideDetail);

  function onClick(event) {
    if (didDrag) return;
    if (event.target !== renderer.domElement) return;
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(nodeMeshes);
    if (intersects.length > 0) {
      var nodeId = intersects[0].object.userData.nodeId;
      showDetail(nodeId);
    }
  }

  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onClick);

  // ── Legend ──
  var legendItems = document.getElementById('legend-items');
  var categoryCounts = {};
  nodes.forEach(function (n) { categoryCounts[n.category] = (categoryCounts[n.category] || 0) + 1; });

  Object.keys(COLORS).forEach(function (cat) {
    if (!categoryCounts[cat]) return;
    var li = document.createElement('li');
    li.innerHTML =
      '<span class="dot" style="background:' + COLOR_HEX[cat] + '"></span>' +
      '<span>' + (CATEGORY_LABELS[cat] || cat) + '</span>' +
      '<span class="count">' + categoryCounts[cat] + '</span>';
    li.addEventListener('click', function () {
      if (activeCategories.has(cat)) activeCategories.delete(cat);
      else activeCategories.add(cat);
      li.classList.toggle('dimmed', !activeCategories.has(cat));
      applyFilter();
    });
    legendItems.appendChild(li);
  });

  function applyFilter() {
    nodes.forEach(function (node) {
      var visible = activeCategories.has(node.category);
      var mesh = meshByNodeId[node.id];
      var sprite = labelByNodeId[node.id];
      if (mesh) mesh.visible = visible;
      if (sprite) sprite.visible = visible;
    });
    buildEdges();
  }

  // ── Stats ──
  document.getElementById('stats-panel').innerHTML =
    '<strong>' + nodes.length + '</strong> nodes &middot; ' +
    '<strong>' + edges.length + '</strong> links';

  // ── Resize ──
  window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Theme: follow system preference ──
  function applyTheme(theme) {
    currentTheme = theme;
    T = THEMES[currentTheme];
    COLORS = T.colors;
    COLOR_HEX = T.colorHex;

    document.body.classList.toggle('light', currentTheme === 'light');

    scene.background.set(T.bg);
    scene.fog.color.set(T.fog);
    groundMat.color.set(T.ground);
    ambientLight.color.set(T.ambient);
    ambientLight.intensity = T.ambientI;
    dirLight.color.set(T.dir);
    dirLight.intensity = T.dirI;
    rimLight.color.set(T.rim);
    rimLight.intensity = T.rimI;

    // Update grid colors
    scene.remove(gridHelper); scene.remove(gridHelper2);
    gridHelper = new THREE.GridHelper(4000, 80, T.grid1, T.grid1);
    gridHelper.position.y = 0.1; scene.add(gridHelper);
    gridHelper2 = new THREE.GridHelper(4000, 20, T.grid2, T.grid2);
    gridHelper2.position.y = 0.2; scene.add(gridHelper2);

    // Update block colors
    nodeMeshes.forEach(function (mesh) {
      var nodeId = mesh.userData.nodeId;
      var node = nodeById[nodeId];
      var newColor = T.colors[node.category] || 0x888888;
      mesh.material.color.set(newColor);
      mesh.material.emissive.set(newColor);
      mesh.userData.baseColor = newColor;
    });

    // Update label colors
    Object.keys(labelByNodeId).forEach(function (nodeId) {
      var node = nodeById[nodeId];
      var color = T.colors[node.category] || 0x888888;
      var sprite = labelByNodeId[nodeId];
      var text = node.label.replace(/[~…]/g, '');
      if (text.length > 18) text = text.substring(0, 16) + '..';
      var c = document.createElement('canvas');
      c.width = 1024; c.height = 128;
      var ctx = c.getContext('2d');
      ctx.font = '600 44px monospace';
      ctx.textAlign = 'center';
      var tw = ctx.measureText(text).width;
      var px = 20, py = 10;
      ctx.fillStyle = currentTheme === 'light' ? 'rgba(251,250,245,0.88)' : 'rgba(10,10,10,0.75)';
      ctx.beginPath();
      ctx.roundRect(512 - tw/2 - px, 38 - py, tw + px*2, 56 + py*2, 8);
      ctx.fill();
      ctx.fillStyle = currentTheme === 'light' ? '#3A2F1C' : '#' + color.toString(16).padStart(6, '0');
      ctx.fillText(text, 512, 80);
      sprite.material.map.image = c;
      sprite.material.map.needsUpdate = true;
    });

    // Update edge colors
    var edgeMat = new THREE.LineBasicMaterial({ color: T.edge, transparent: true, opacity: 0.15 });
    edgeLines.forEach(function (line) {
      line.userData.defaultMat = edgeMat;
      line.material = edgeMat;
    });
  }
  // Apply initial theme based on body class
  document.body.classList.toggle('light', currentTheme === 'light');
  // Listen for system/app appearance changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
    applyTheme(e.matches ? 'dark' : 'light');
  });

  // ── Animate ──
  var clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Subtle block pulse for hovered
    if (hoveredMesh) {
      var t = clock.getElapsedTime();
      var pulse = 0.08 + 0.12 * (0.5 + 0.5 * Math.sin(t * 3));
      hoveredMesh.material.emissiveIntensity = pulse;
    }

    renderer.render(scene, camera);
  }
  animate();

})();
</script>
</body>
</html>
