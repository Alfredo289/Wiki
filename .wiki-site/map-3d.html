ed; a project folder with CLAUDE.md and accumulated context IS the ","rich":"_Scan TLDRs to find relevant pages. Load full pages only when needed._\n\n##Sources\n\n{{shannhk-2026-llm-wikid-readme}} - Documentation for llm-wikid, an open-source LLM wiki system based on Karpathy's pattern. Not RAG - pre-compiles knowledge into pages. {{yb-effect-2026-commonplace-practice}} - Practitioner's guide to Claude + Obsidian as a personal thinking tool. Five practices: commonplace journaling, atomic notes, intentional reading, agentic constitution, knowledge work PRs. {{klaassen-2026-folder-is-the-agent}} - Agent swarms failed; a project folder with CLAUDE.md and accumulated context IS the agent. 44 folder-agents with a dispatch layer. {{terpstra-2026-keyboard-driven-mac-utilities}} - Curated list of 20 macOS keyboard-centric utilities: Superkey, KindaVim, Karabiner-Elements, Keyboard Maestro, LaunchBar, Cotypist, Moom, Vimium. {{englert-2026-claude-cowork-tutorial}} - Zero-to-one Claude Cowork tutorial. Brain file strategy, one-click connectors, sub-advisory boards, scheduled morning debriefs, progressive trust. {{brussee-2026-caveman-compress}} - Claude Code skill that compresses CLAUDE.md and memory files by ~46% while preserving semantic content. Reduces token costs. {{newman-2026-claude-mem}} - Persistent memory system for Claude Code. SQLite + vector search with 3-layer progressive disclosure for ~10x token savings.\n\n##Concepts\n\n{{agentic-constitution}} - A living .md file giving LLM agents high-level context about the user. Read before any task, updated weekly. {{atomic-notes}} - Note-taking practice where each note captures one concept. Attributed to Andy Matuschak. Enables cross-domain thinking and LLM recall. {{commonplace-practice}} - Daily habit of capturing observations and thoughts in unstructured notes. Feeds context to LLM agents over time. {{compound-engineering}} - AI-native engineering philosophy by Kieran Klaassen. Context accumulates in project folders, making each AI interaction more effective. {{folder-as-agent}} - A project folder with CLAUDE.md, skills, and accumulated context turns a generalized LLM into a specialist. The context is the agent, not the model. {{intentional-reading}} - Deliberate content consumption: curate sources, read with active highlighting, convert into atomic notes. Uses Readwise. {{keyboard-driven-workflow}} - macOS productivity approach combining navigation, remapping, launching, text expansion, and window management utilities. {{knowledge-work-prs}} - Vault subroutines where agents draft changes and humans review like pull requests. Example: \"Tend the Vault.\" {{context-compression}} - Strategies to reduce token costs of persistent LLM context. Two approaches: compress files (caveman-compress) or retrieve selectively (claude-mem). {{llm-wiki-pattern}} - Knowledge management approach where an LLM pre-compiles raw sources into structured wiki pages instead of using RAG. Originated by Karpathy.\n\n##Entities\n\n{{andrej-karpathy}} - AI researcher, originated the LLM wiki pattern for personal knowledge management. {{andy-matuschak}} - Researcher behind the evergreen/atomic notes practice. Former Apple and Khan Academy. {{bettertouchtool}} - macOS utility for trackpad gestures and keyboard shortcuts. {{brett-terpstra}} - Developer and writer focused on macOS productivity. Creator of NiftyMenu, Cheaters, custom keybindings. {{cora}} - Every.to's AI email assistant. Built by Kieran Klaassen using compound engineering. {{kagi}} - Paid search engine with keyboard navigation and AI slop filtering. {{karabiner-elements}} - macOS system-level key remapping tool. Used for Hyper key setup. {{keyboard-maestro}} - macOS automation engine for keyboard-triggered macros and workflows. {{kieran-klaassen}} - GM of Cora, creator of compound engineering. Runs 44 folder-agents across projects. {{launchbar}} - macOS launcher with clipboard history and Instant Send. {{llm-wikid}} - Open-source Obsidian vault implementing the LLM wiki pattern. By Shann Holmberg. {{obsidian}} - Markdown-based knowledge management app. UI layer for llm-wikid and personal thinking workflows. {{paul-graham}} - Essayist, Y Combinator co-founder. Cited for \"writing is thinking.\" {{qmd}} - Local markdown search engine by Tobi Lutke. Hybrid BM25/vector search with LLM re-ranking. {{readwise}} - Reading highlights tool with Obsidian plugin. Central to intentional reading pipelines. {{shann-holmberg}} - Creator of llm-wikid. {{tobi-lutke}} - Creator of qmd. CEO of Shopify. {{caveman-compress}} - Claude Code skill that compresses CLAUDE.md files by ~46%. By Julius Brussee. {{claude-cowork}} - Anthropic's desktop tool between chat and Claude Code. Folder-based projects, connectors, skills, scheduled tasks. {{claude-mem}} - Persistent memory system for Claude Code. SQLite + vector search, progressive disclosure. By Alex Newman. {{jj-englert}} - Community enablement lead at Tenex. Claude Cowork power user and tutorial creator. {{vimium}} - Browser extension adding Vim-style keyboard navigation to web pages.\n\n##Projects\n\n_No projects yet._\n\n##SOPs\n\n_No SOPs yet._\n\n##Syntheses\n\n_No syntheses yet._\n\n##Outputs\n\n_No outputs yet. Run /wiki-query to ask a question._","href":"index.html","type":"Meta"},"intentional-reading":{"title":"Intentional Reading","lead":"Intentional Reading A deliberate approach to content consumption where reading time is structured into two phases: discovery (scanning for potential reads) and focused reading (highlighting, note-taking, connecting to existing knowledge). Described by YB (yb-effect-2026-commonplace-practice) as a reaction to \"cope consumption\" - feeling productive while passively listening to podcasts or scrolling Substack. The core shift: every piece of content read should produce new atomic-notes and connections. Pipeline Curate sources - \"Who gets access to my brain?\" (references @phokarlsson's \"Structure y","rich":"A deliberate approach to content consumption where reading time is structured into two phases: discovery (scanning for potential reads) and focused reading (highlighting, note-taking, connecting to existing knowledge).\n\nDescribed by YB ({{yb-effect-2026-commonplace-practice}}) as a reaction to \"cope consumption\" - feeling productive while passively listening to podcasts or scrolling Substack. The core shift: every piece of content read should produce new {{atomic-notes}} and connections.\n\n##Pipeline\n\n1. **Curate sources** - \"Who gets access to my brain?\" (references @phokarlsson's \"Structure your milieu\") 2. **Scroll = search** - browsing time is for finding potential reads to add to a backlog 3. **Read with intent** - dedicated time for highlighting and note-taking, even on short articles 4. **Extract to vault** - {{Readwise}} plugin pulls highlights into {{Obsidian}}, user connects them to existing notes\n\n##Counter-arguments\n\nAggressive curation may create filter bubbles and miss valuable serendipitous exposure Treating every 5-minute read as a note-taking opportunity could make reading feel like work The \"cope\" framing may unfairly dismiss the value of passive, exploratory consumption\n\n##Data gaps\n\nNo specifics on YB's reading volume or how much note output this produces \"Structure your milieu\" concept not ingested as a source Single source describing this in an LLM-vault context","href":"intentional-reading.html","type":"Source"},"context-compression":{"title":"Context Compression","lead":"Context Compression Strategies for reducing the token cost of persistent context in LLM agent workflows. As projects accumulate context files (CLAUDE.md, memory, documentation), token consumption grows with every session. Context compression addresses this without sacrificing the benefits of compound-engineering. Two Approaches File-level compression Rewrite context files into more concise language while preserving semantic meaning. Caveman Compress achieves ~46% token reduction by compressing CLAUDE.md and memory files, preserving code blocks, URLs, and structural elements while condensing pr","rich":"Strategies for reducing the token cost of persistent context in LLM agent workflows. As projects accumulate context files (CLAUDE.md, memory, documentation), token consumption grows with every session. Context compression addresses this without sacrificing the benefits of {{compound-engineering}}.\n\n##Two Approaches\n\n##File-level compression\n\nRewrite context files into more concise language while preserving semantic meaning. {{Caveman Compress}} achieves ~46% token reduction by compressing CLAUDE.md and memory files, preserving code blocks, URLs, and structural elements while condensing prose.\n\n**Tradeoff:** Compressed files are harder for humans to read and maintain. The compression itself requires an API call.\n\n##Retrieval-level compression (progressive disclosure)\n\nInstead of loading all context at once, provide a layered retrieval system that surfaces only relevant context on demand. {{Claude-Mem}} implements a 3-layer system (search → timeline → full details) claiming ~10x token savings.\n\n**Tradeoff:** Requires running additional infrastructure (databases, HTTP services). Effectiveness depends on how selectively the agent actually retrieves.\n\n##Why It Matters\n\nToken costs are a direct function of context size. For practitioners running multiple {{folder-as-agent}} projects with accumulated context, costs compound. A folder-agent with a rich CLAUDE.md, documentation, and operational memory might consume thousands of tokens just for startup context before any actual work begins.\n\nContext compression is the efficiency counterpart to {{compound-engineering}}: compound engineering says accumulate context for better results; context compression says manage that accumulated context efficiently.\n\n##Counter-arguments\n\nFor small projects, the overhead of compression tools may exceed the savings CLAUDE.md files are typically small (1-3K tokens) - compressing them saves pennies The real cost driver is usually conversation length, not startup context \"Just write concise CLAUDE.md files\" may be simpler than adding tooling\n\n##Data gaps\n\nNo head-to-head comparison of these two approaches on the same project No data on the crossover point where compression tools pay for themselves Unknown whether compressed context degrades agent performance vs full context Both tools are early-stage - no longitudinal usage data","href":"context-compression.html","type":"Source"},"llm-wiki-pattern":{"title":"LLM Wiki Pattern","lead":"LLM Wiki Pattern A knowledge management approach where an LLM agent reads raw sources and compiles them into structured, cross-referenced wiki pages. Distinguished from RAG by pre-compiling knowledge rather than re-deriving answers via vector search at query time. Originated by andrej-karpathy in a February 2025 tweet. At ~100 articles / ~400K words, Karpathy reported this approach outperforms RAG for personal Q&A. Key properties: Pre-compiled - knowledge is structured once, updated incrementally Compound loop - filed answers enrich future queries Bias-checked - counter-arguments and data gaps","rich":"A knowledge management approach where an LLM agent reads raw sources and compiles them into structured, cross-referenced wiki pages. Distinguished from RAG by pre-compiling knowledge rather than re-deriving answers via vector search at query time.\n\nOriginated by {{andrej-karpathy}} in a February 2025 tweet. At ~100 articles / ~400K words, Karpathy reported this approach outperforms RAG for personal Q&A.\n\nKey properties: **Pre-compiled** - knowledge is structured once, updated incrementally **Compound loop** - filed answers enrich future queries **Bias-checked** - counter-arguments and data gaps on every page **Human-validated** - explored gate prevents blind trust in AI output\n\n##Research vs Personal Thinking\n\nYB ({{yb-effect-2026-commonplace-practice}}) draws a distinction: the LLM wiki pattern is \"fantastic for research projects\" where synthetic artifacts make sense, but for personal thinking, \"you can't outsource your own life experiences to AI.\" This suggests the pattern works best for external knowledge compilation, while personal knowledge management needs a complementary approach built on {{commonplace-practice}} and {{atomic-notes}}.\n\n##Counter-arguments\n\nRequires more upfront processing than RAG May not scale as well to very large, rapidly changing corpora Single-user testimonial, not benchmarked rigorously\n\n##Data gaps\n\nNo head-to-head comparison with modern RAG systems (e.g., GraphRAG) Unclear at what scale the pre-compiled approach breaks down Original Karpathy tweet/thread not yet ingested as a primary source","href":"llm-wiki-pattern.html","type":"Source"},"keyboard-driven-workflow":{"title":"Keyboard-Driven Workflow","lead":"Keyboard-Driven Workflow A macOS productivity philosophy where the keyboard is the primary input device, minimizing mouse/trackpad usage through layered utilities. Described by Brett Terpstra as \"the most powerful tool we have when using our Macs.\" The key insight is that the power comes from combining specialized tools into an ecosystem, not from any single utility. Terpstra's stack covers six categories: Navigation - screen text search (Superkey), Vim bindings in any app (KindaVim), fuzzy menu search (Paletro) Key modification - system-level remapping (Karabiner-Elements), Hyper key setup, D","rich":"A macOS productivity philosophy where the keyboard is the primary input device, minimizing mouse/trackpad usage through layered utilities. Described by {{Brett Terpstra}} as \"the most powerful tool we have when using our Macs.\"\n\nThe key insight is that the power comes from **combining** specialized tools into an ecosystem, not from any single utility. Terpstra's stack covers six categories:\n\n1. **Navigation** - screen text search ({{Superkey}}), Vim bindings in any app ({{KindaVim}}), fuzzy menu search ({{Paletro}}) 2. **Key modification** - system-level remapping ({{Karabiner-Elements}}), Hyper key setup, DefaultKeyBindings.dict 3. **Launching** - app/file launcher ({{LaunchBar}}), static key sequences (LeaderKey) 4. **Text expansion** - snippet-based ({{TextExpander}}), AI-predictive ({{Cotypist}}) 5. **Window management** - keyboard-driven positioning ({{Moom}}) 6. **Web browsing** - Vim navigation ({{Vimium}}), keyboard-first search ({{Kagi}})\n\nOverlaps with the {{folder-as-agent}} pattern in one respect: both are about accumulating a personalized environment over time that compounds in effectiveness.\n\n##Counter-arguments\n\nHigh upfront learning curve and configuration cost Tool overlap creates maintenance burden Some users may get equivalent results with fewer, more integrated tools (e.g., Raycast replacing LaunchBar + clipboard + snippets)\n\n##Data gaps\n\nNo structured comparison of this stack vs simpler alternatives Cost and conflict information missing Single source","href":"keyboard-driven-workflow.html","type":"Source"},"commonplace-practice":{"title":"Commonplace Practice","lead":"Commonplace Practice A daily habit of jotting down observations, epiphanies, thoughts, and questions. Rooted in the historical tradition of commonplace books but adapted for LLM-augmented knowledge work. In the context of a Claude + Obsidian workflow, the practice serves a dual purpose: personal reflection and building context for AI agents. The more raw personal material captured, the more an LLM can identify patterns and make connections. Key principles (per YB): Unstructured is fine - optimize for capture speed, not formatting Voice transcription preferred - captures more including uncertai","rich":"A daily habit of jotting down observations, epiphanies, thoughts, and questions. Rooted in the historical tradition of commonplace books but adapted for LLM-augmented knowledge work.\n\nIn the context of a Claude + {{Obsidian}} workflow, the practice serves a dual purpose: personal reflection and building context for AI agents. The more raw personal material captured, the more an LLM can identify patterns and make connections.\n\nKey principles (per {{yb-effect-2026-commonplace-practice}}):\n\n**Unstructured is fine** - optimize for capture speed, not formatting **Voice transcription** preferred - captures more including uncertainty markers **Context compounds** - claimed benefits emerge after weeks of consistent practice **Personal, not synthetic** - distinguishes this from {{llm-wiki-pattern}} research workflows where AI generates the artifacts\n\n##Counter-arguments\n\nUnstructured notes may produce noise that degrades LLM context quality The compounding claim rests on a single practitioner's report Historical commonplace books worked without AI - unclear what the LLM integration adds beyond search\n\n##Data gaps\n\nNo metrics on how much daily capture is needed for the compounding effect No comparison with structured journaling approaches Single source - needs corroboration","href":"commonplace-practice.html","type":"Source"},"compound-engineering":{"title":"Compound Engineering","lead":"Compound Engineering An AI-native engineering philosophy created by Kieran Klaassen at Every.to. The core idea: context accumulated in project folders over months of work makes each subsequent AI interaction more effective. The folder-as-agent pattern is a direct product of this approach. Has 14,000+ stars on GitHub. Every.to offers a compound engineering guide and a plugin. Efficiency Counterpart: Context Compression As compound engineering accumulates context, token costs grow. Context Compression tools address this: Caveman Compress compresses the files themselves (~46% reduction), while Cl","rich":"An AI-native engineering philosophy created by {{Kieran Klaassen}} at Every.to. The core idea: context accumulated in project folders over months of work makes each subsequent AI interaction more effective. The {{folder-as-agent}} pattern is a direct product of this approach.\n\nHas 14,000+ stars on GitHub. Every.to offers a compound engineering guide and a plugin.\n\n##Efficiency Counterpart: Context Compression\n\nAs compound engineering accumulates context, token costs grow. {{Context Compression}} tools address this: {{Caveman Compress}} compresses the files themselves (~46% reduction), while {{Claude-Mem}} adds progressive disclosure to avoid loading everything (~10x savings). These are the efficiency layer that makes sustained compound engineering economically viable.\n\n##Counter-arguments\n\n\"Accumulated context improves results\" is intuitive but hard to measure May conflate project maturity with compound engineering benefits\n\n##Data gaps\n\nSource article mentions compound engineering but doesn't explain the methodology in detail The GitHub guide and plugin not yet ingested as primary sources No comparison with non-compound approaches on the same project","href":"compound-engineering.html","type":"Source"},"knowledge-work-prs":{"title":"Knowledge Work PRs","lead":"Knowledge Work PRs A workflow pattern where LLM agent subroutines process vault content and propose changes that the human reviews, analogous to code pull requests. Described by YB (yb-effect-2026-commonplace-practice) as the culmination of the Claude + Obsidian setup, but only effective if the preceding practices (commonplace-practice, atomic-notes, intentional-reading, agentic-constitution) are in place. How it works User defines subroutines (instruction sets) in the vault Each subroutine starts by reading the agentic-constitution Agent executes the subroutine and drafts changes User reviews","rich":"A workflow pattern where LLM agent subroutines process vault content and propose changes that the human reviews, analogous to code pull requests.\n\nDescribed by YB ({{yb-effect-2026-commonplace-practice}}) as the culmination of the Claude + {{Obsidian}} setup, but only effective if the preceding practices ({{commonplace-practice}}, {{atomic-notes}}, {{intentional-reading}}, {{agentic-constitution}}) are in place.\n\n##How it works\n\n1. User defines subroutines (instruction sets) in the vault 2. Each subroutine starts by reading the {{agentic-constitution}} 3. Agent executes the subroutine and drafts changes 4. User reviews changes one-by-one in a voice session (approve/tweak/reject) 5. Approved changes get committed to the vault\n\n**Example**: \"Tend the Vault\" - checks daily {{commonplace-practice}} entries since last run, identifies threads and insights, drafts updates to {{atomic-notes}}, presents changes for review.\n\nThe metaphor: agents are developers, you are the engineering manager reviewing PRs before they hit production.\n\n##Relationship to Folder-as-Agent\n\n{{Kieran Klaassen}}'s {{folder-as-agent}} pattern describes a similar human-in-the-loop dynamic at the engineering level: parallel {{Claude Code}} sessions work when each agent has a clear task and a human directs the work, but agent swarms coordinating autonomously fail. Knowledge Work PRs formalize this same constraint for personal knowledge management - the agent proposes, the human disposes.\n\n##Counter-arguments\n\nThe PR metaphor may break down - knowledge work changes are harder to diff than code Heavy reliance on agent quality - poor drafts waste more review time than they save Voice review sessions add friction compared to just writing the notes yourself\n\n##Data gaps\n\nNo subroutine examples shown (only \"Tend the Vault\" described at high level) No data on approval/rejection rates or time savings Klaassen's folder-as-agent article provides indirect corroboration of the human-review pattern","href":"knowledge-work-prs.html","type":"Source"},"atomic-notes":{"title":"Atomic Notes","lead":"Atomic Notes A note-taking practice where each note captures a single concept rather than facts, names, or dates. Attributed to Andy Matuschak's evergreen notes practice, itself building on Niklas Luhmann's Zettelkasten method. YB (yb-effect-2026-commonplace-practice) frames atomic notes as \"API endpoints you call when solving problems\" - reusable conceptual building blocks that can be combined across life domains you'd normally keep separate. In an LLM-augmented vault, atomic notes serve as the structured layer that makes commonplace-practice captures useful. Once enough atomic notes exist, y","rich":"A note-taking practice where each note captures a single concept rather than facts, names, or dates. Attributed to {{Andy Matuschak}}'s evergreen notes practice, itself building on Niklas Luhmann's Zettelkasten method.\n\nYB ({{yb-effect-2026-commonplace-practice}}) frames atomic notes as \"API endpoints you call when solving problems\" - reusable conceptual building blocks that can be combined across life domains you'd normally keep separate.\n\nIn an LLM-augmented vault, atomic notes serve as the structured layer that makes {{commonplace-practice}} captures useful. Once enough atomic notes exist, you can dictate a train of thought and the AI pulls relevant past thinking from across the vault.\n\nConnects to {{Paul Graham}}'s observation that \"writing is thinking\" - the act of distilling a concept into an atomic note forces clarity.\n\n##Counter-arguments\n\nAtomicity is subjective - practitioners disagree on the right granularity The \"API endpoint\" metaphor may overstate how cleanly concepts decompose Overhead of maintaining many small notes can become its own burden\n\n##Data gaps\n\nMatuschak's original writing not yet ingested as a primary source No evidence on optimal note count before LLM recall becomes useful Single source describing the practice in an LLM context","href":"atomic-notes.html","type":"Source"},"agentic-constitution":{"title":"Agentic Constitution","lead":"Agentic Constitution A file that serves as the bridge between an Obsidian vault and Claude (or other LLM agents). Contains high-level personal context: who you are, your big question, how you like to work, main goals, current problems, team context. Described by YB (yb-effect-2026-commonplace-practice) as the first file agents read before doing any work, ensuring alignment with the user's current priorities and thinking style. Key characteristics: Living document - updated weekly as priorities shift Team-like communication - treat it as briefing a team member, not configuring software Portal f","rich":"A .md file that serves as the bridge between an {{Obsidian}} vault and Claude (or other LLM agents). Contains high-level personal context: who you are, your big question, how you like to work, main goals, current problems, team context.\n\nDescribed by YB ({{yb-effect-2026-commonplace-practice}}) as the first file agents read before doing any work, ensuring alignment with the user's current priorities and thinking style.\n\nKey characteristics:\n\n**Living document** - updated weekly as priorities shift **Team-like communication** - treat it as briefing a team member, not configuring software **Portal function** - the primary interface between personal knowledge and AI agents **Feeds subroutines** - all {{knowledge-work-prs}} start by reading this file\n\nFunctionally similar to a CLAUDE.md project instruction file, but scoped to personal identity and goals rather than codebase conventions.\n\n##Relationship to Folder-as-Agent\n\n{{Kieran Klaassen}} ({{klaassen-2026-folder-is-the-agent}}) describes a related pattern at the project level: the CLAUDE.md file in a project folder, combined with accumulated documentation and operational memory, turns the folder itself into an agent. Where the agentic constitution captures personal-level context (identity, goals, work style), the folder-as-agent captures project-level context (code conventions, architecture, runbooks). Both converge on the principle that **accumulated context is the agent**.\n\n##Claude Cowork \"Brain File\"\n\n{{JJ Englert}} ({{englert-2026-claude-cowork-tutorial}}) demonstrates the same pattern in {{Claude Cowork}}: a preferences document (the \"brain file\") that Claude reads at the start of every session. Contains who you are, how you work, communication style, and priorities. This is the agentic constitution applied within Cowork's project-based UI, confirming the pattern extends beyond developer-oriented tools to mainstream productivity use cases.\n\nThree independent sources now describe variations of this pattern: personal vault context (YB), project folder context (Klaassen), and Cowork project preferences (Englert).\n\n##Counter-arguments\n\nWeekly updates are a significant maintenance burden for unclear returns Risk of AI over-fitting to stated goals and filtering out serendipitous discoveries The distinction from a standard system prompt or CLAUDE.md is unclear\n\n##Data gaps\n\nNo example of what a good agentic constitution looks like (YB references a template in replies but content not captured) Now referenced by three sources (YB, Klaassen, Englert) across personal, project, and productivity contexts No data on how much constitution detail actually improves agent output quality","href":"agentic-constitution.html","type":"Source"},"folder-as-agent":{"title":"Folder-as-Agent Pattern","lead":"Folder-as-Agent Pattern A design pattern where a project folder - containing instruction files (CLAUDE.md/AGENT.md), skill definitions, documentation, and accumulated operational context - transforms a generalized LLM into a specialist agent. Coined by Kieran Klaassen in the context of building Cora at Every.to. Core claim: An agent is a model with enough context so you don't have to re-explain everything each time you open the chat. The folder provides that context. The same model pointed at different folders becomes a fundamentally different agent. Layers of a Folder-Agent Conventions - codi","rich":"A design pattern where a project folder - containing instruction files (CLAUDE.md/AGENT.md), skill definitions, documentation, and accumulated operational context - transforms a generalized LLM into a specialist agent. Coined by {{Kieran Klaassen}} in the context of building {{Cora}} at Every.to.\n\n**Core claim**: An agent is a model with enough context so you don't have to re-explain everything each time you open the chat. The folder provides that context. The same model pointed at different folders becomes a fundamentally different agent.\n\n##Layers of a Folder-Agent\n\n1. **Conventions** - coding standards, deploy workflows, naming patterns (CLAUDE.md) 2. **Institutional knowledge** - architecture docs, design decisions, domain documentation 3. **Operational memory** - runbooks, incident investigations, resolved bugs 4. **Specialized sub-agents** - refined instruction files for specific tasks (reviewers, planners)\n\n##Relationship to Other Patterns\n\n**{{Agentic Constitution}}** - similar principle applied at the personal level rather than project level. The constitution captures identity and goals; the folder captures project knowledge. **{{LLM Wiki Pattern}}** - another form of pre-compiled context, but organized as a queryable knowledge base rather than an agent instruction set. **{{Compound Engineering}}** - Klaassen's broader methodology; the folder-as-agent pattern is one outcome of sustained compound engineering practice.\n\n##Claude Cowork as Folder-Agent UI\n\n{{JJ Englert}} ({{englert-2026-claude-cowork-tutorial}}) demonstrates the folder-as-agent pattern in {{Claude Cowork}}: each project maps to a folder on your computer, with shared memory persisting across conversations. The project accumulates context (brain files, skills, connector configurations) that make Claude progressively more effective - the same compound accumulation Klaassen describes, but packaged in a GUI for non-engineers.\n\n##Anti-pattern: Agent Swarms\n\nKlaassen explicitly warns against agent swarms - multiple agents coordinating with each other without human direction. The failure mode: agents don't have a speed limit, but the human reviewing their output does. Parallel sessions work only when each agent has a clear task and a human directs the work.\n\n##Counter-arguments\n\n\"Give the model good context\" is a well-known principle - the folder framing adds packaging but not necessarily new insight The 44-agent claim is unverified and the dispatch layer is undescribed Agent swarm failures may reflect 2026 tooling limitations, not a permanent constraint\n\n##Data gaps\n\nSource article clipping is truncated - dispatch layer details missing No examples of what a minimal vs mature folder-agent looks like No metrics on how folder-agent quality improves over time Now corroborated by Englert's Cowork tutorial, though in a different (GUI) context","href":"folder-as-agent.html","type":"Source"},"yb-effect-2026-commonplace-practice":{"title":"YB - Build a Daily Commonplace Practice","lead":"YB - Build a Daily Commonplace Practice Source: Tweet thread by YB (@yb_effect), 2026-04-13 Engagement: 129 likes, 279 bookmarks, 6.1K impressions !yb-effect-commonplace-practice-overview.jpg The image summarizes the five practices and recommended Obsidian plugins (Copilot, Dataview, Readwise, Excalidraw, Simple Note Review). Summary YB describes a Claude + Obsidian workflow they've used for 9+ months, arguing it fundamentally changed their daily habits. The thread distinguishes this personal thinking use case from andrej-karpathy's llm-wiki-pattern, which YB considers better suited for resear","rich":"**Source**: Tweet thread by YB (@yb_effect), 2026-04-13 **Engagement**: 129 likes, 279 bookmarks, 6.1K impressions\n\n!{{yb-effect-commonplace-practice-overview.jpg}}\n\nThe image summarizes the five practices and recommended {{Obsidian}} plugins (Copilot, Dataview, {{Readwise}}, Excalidraw, Simple Note Review).\n\n##Summary\n\nYB describes a Claude + {{Obsidian}} workflow they've used for 9+ months, arguing it fundamentally changed their daily habits. The thread distinguishes this personal thinking use case from {{andrej-karpathy}}'s {{llm-wiki-pattern}}, which YB considers better suited for research projects with synthetic artifacts. The key difference: for personal thinking, you can't outsource your own life experiences to AI - the personal context you add is what makes the tool useful.\n\n##Five Practices\n\n##1. {{Commonplace Practice}}\n\nDaily habit of jotting down observations, epiphanies, thoughts, and questions. Notes don't need to be clean or structured. Voice transcription recommended because it captures more context, including uncertainty (\"ifs, buts, and ums\"). The claim: context compounds over weeks and months, producing surprising pattern recognition.\n\n##2. {{Atomic Notes}} (via {{Andy Matuschak}})\n\nNotes should be concepts, not facts/names/dates. YB frames them as \"API endpoints you call when solving problems.\" Thinking in atomic notes lets you pull context from different life domains you'd normally keep separate. References {{Paul Graham}}'s \"writing is thinking\" - write notes for yourself, not for an audience.\n\nThe payoff: once you have enough atomic notes, you can dictate a train of thought and Claude pulls your own past thinking to help.\n\n##3. {{Intentional Reading}} (via {{Readwise}})\n\nConnects {{Readwise}} or Obsidian Web Clipper to build a reading pipeline. YB's key insight: much past content consumption was \"cope\" - feeling productive while passively scrolling. The new approach: search for potential reads during scroll time, then dedicate focused time to reading with highlighting and note-taking. Even a 5-minute article should produce new atomic notes.\n\nReferences @phokarlsson's \"Structure your milieu\" concept - deliberately curate who gets access to your brain.\n\n##4. {{Agentic Constitution}}\n\nA .md file that serves as the portal between {{Obsidian}} and Claude. Contains high-level context: who you are, your big question, how you like to work, main goals, current problems, team context. Agents read this file first before doing any work.\n\nKey characteristic: it's a constant WIP document, updated weekly, treated like updating a team on changing priorities.\n\n##5. {{Knowledge Work PRs}}\n\nVault subroutines - specific instruction sets that start by reading the {{agentic constitution}}. Example: \"Tend the Vault\" checks daily commonplace entries, identifies threads, drafts updates to atomic notes. The user then reviews changes in a voice session, approving/tweaking/rejecting, similar to a code PR review process.\n\n##Mentioned Tools & People\n\n{{Andrej Karpathy}} - LLM wiki pattern (research-oriented) {{Andy Matuschak}} - atomic note-taking practice {{Paul Graham}} - \"writing is thinking\" {{Readwise}} - reading highlights pipeline @phokarlsson - \"Structure your milieu\" concept @kepano - Obsidian Web Clipper\n\n##Counter-arguments\n\nThe 9-month claim is a single practitioner's experience with no controlled comparison Voice transcription produces messy notes that may create noise rather than signal for LLMs The \"context compounds\" claim is unfalsifiable - confirmation bias could explain perceived patterns Heavy setup cost and daily habit requirement may not suit most people\n\n##Data gaps\n\nNo specifics on what \"surprising patterns\" the system surfaced No comparison of outcomes vs simpler note-taking approaches The \"Tend the Vault\" subroutine and other agent workflows are described but not shown No discussion of failure modes or when the system breaks down","href":"yb-effect-2026-commonplace-practice.html","type":"Source"},"newman-2026-claude-mem":{"title":"Alex Newman - Claude-Mem","lead":"Alex Newman - Claude-Mem Source: GitHub README Author: Alex Newman (@thedotmack) Format: Open-source Claude Code plugin License: AGPL-3.0 Summary Claude-Mem is a persistent memory compression system for Claude Code that captures what Claude learns during tool interactions, compresses observations into semantic summaries, and makes them available to future sessions. It addresses context-compression through progressive disclosure rather than file compression. Architecture Lifecycle hooks tie into Claude Code events: SessionStart, UserPromptSubmit, PostToolUse, Stop, SessionEnd Worker service run","rich":"**Source:** GitHub README **Author:** Alex Newman (@thedotmack) **Format:** Open-source Claude Code plugin **License:** AGPL-3.0\n\n##Summary\n\n{{Claude-Mem}} is a persistent memory compression system for Claude Code that captures what Claude learns during tool interactions, compresses observations into semantic summaries, and makes them available to future sessions. It addresses {{context-compression}} through progressive disclosure rather than file compression.\n\n##Architecture\n\n**Lifecycle hooks** tie into Claude Code events: SessionStart, UserPromptSubmit, PostToolUse, Stop, SessionEnd **Worker service** runs on port 37777 with HTTP API and web viewer UI (Bun runtime) **Storage** uses SQLite with FTS5 full-text search plus Chroma vector database for hybrid semantic/keyword search\n\n##3-Layer Progressive Disclosure\n\nThe key design: instead of dumping all context at once, retrieval happens in three layers with ~10x token savings:\n\n1. **search** - compact index with IDs (~50-100 tokens per result) 2. **timeline** - chronological context around observations 3. **get_observations** - full details for filtered IDs (~500-1,000 tokens per result)\n\nThis lets Claude selectively load only the context it needs rather than consuming tokens on irrelevant history.\n\n##Relationship to Other Tools\n\nSolves the same problem as {{Caveman Compress}} (reducing token costs for persistent context) but from the opposite direction: claude-mem adds a retrieval layer so you don't load everything, while caveman compresses the files themselves. Both are {{context-compression}} strategies.\n\nAlso related to {{compound-engineering}}: claude-mem is infrastructure for accumulating project knowledge over time, which is the core promise of compound engineering.\n\n##Advanced Features\n\n**Endless Mode** - biomimetic memory for extended sessions **Privacy controls** - <private> tags exclude sensitive content **Real-time feeds** - optional streaming to Telegram, Discord, Slack Cross-platform: supports Claude Code, Gemini CLI, OpenClaw\n\n##Counter-arguments\n\nRunning a local HTTP service + SQLite + Chroma is heavy infrastructure for memory management Lifecycle hooks add latency to every tool interaction 10x token savings claim depends on how selectively the agent actually retrieves - a lazy agent might still pull everything AGPL-3.0 license limits commercial use\n\n##Data gaps\n\nNo benchmarks showing actual token savings in real workflows No comparison with simpler approaches (e.g., just a well-maintained CLAUDE.md) Unclear how well the vector search handles cross-session concept drift No data on storage growth rate over long-running projects","href":"newman-2026-claude-mem.html","type":"Source"},"klaassen-2026-folder-is-the-agent":{"title":"Kieran Klaassen - The Folder Is the Agent","lead":"Kieran Klaassen - The Folder Is the Agent Source: Article by Kieran Klaassen, Every.to, 2026-04-13 Context: Klaassen is general manager of Cora (Every's AI email assistant) and creator of the compound-engineering methodology (14,000+ GitHub stars). Summary Klaassen spent three months trying to make agent swarms work - multiple AI agents coordinating with each other, deciding what to work on, producing output he hadn't shaped. The experiment failed: when 10 agents finished simultaneously, he had 10 results to evaluate without enough context to trust any of them. The insight: \"AI agents don't ha","rich":"**Source**: Article by Kieran Klaassen, Every.to, 2026-04-13 **Context**: Klaassen is general manager of {{Cora}} (Every's AI email assistant) and creator of the {{compound-engineering}} methodology (14,000+ GitHub stars).\n\n##Summary\n\nKlaassen spent three months trying to make agent swarms work - multiple AI agents coordinating with each other, deciding what to work on, producing output he hadn't shaped. The experiment failed: when 10 agents finished simultaneously, he had 10 results to evaluate without enough context to trust any of them. The insight: \"AI agents don't have a speed limit, but the person managing them still does.\"\n\nHe stopped looking for a smarter orchestration layer and realized the real agent was something he already had - a **project folder**. A folder with a CLAUDE.md/AGENT.md file, skill definitions, and context accumulated through months of {{compound-engineering}} makes a generalized model into a specialist.\n\n##The Folder-as-Agent Pattern\n\nAn agent is defined as: **a model with enough context so you don't have to re-explain everything each time you open the chat.**\n\nThe ~/cora/ folder demonstrates the layers:\n\n**Conventions and standards** - CLAUDE.md covers Rails conventions, deploy workflows, database patterns **Institutional knowledge** - docs/developer-docs/ holds architecture reports, email processing pipeline, assistant system design **Operational memory** - docs/runbooks/ and docs/investigations/ capture patterns from real incidents **Specialized agents** - .claude/agents/ holds refined specialists: reviewers, planners, component creators\n\nReading order for new agents: CLAUDE.md first, then architecture document, then assistant system report, then assistant prompt, then component creator agent.\n\n##Key Claims\n\nKlaassen runs **44 folder-agents** across multiple projects, each in a specialized folder built over months A **dispatch layer** routes between the 44 agents {{Claude Code}} Skills - files that give the model specific capabilities - are an example of the folder-as-agent structure. People were already writing markdown instruction files and dropping them into project directories before anyone called them \"skills\" Parallel Claude Code sessions work when each agent has a clear task and a human directs work; swarms where agents coordinate with each other fail The same model (mostly {{Claude}} Opus 4.6, also GPT 5.4 and Gemini Pro 3.1) becomes a completely different agent when pointed at different folders\n\n##Relationship to Other Concepts\n\nThe folder-as-agent pattern is closely related to the {{agentic-constitution}} concept from YB - both treat structured markdown files as the primary interface between human intent and AI capability. The key difference: Klaassen's pattern emphasizes **project-level** accumulated context (codebases, runbooks, incident history), while YB's constitution emphasizes **personal-level** context (identity, goals, work style).\n\nBoth patterns converge on the idea that the value is in the **accumulated context**, not the model itself.\n\n##Mentioned Tools and People\n\n{{Claude Code}} - primary tool for running folder-agents {{Cora}} - Every's AI email assistant, Klaassen's main project {{compound-engineering}} - Klaassen's AI-native engineering methodology Every.to - publisher, where Klaassen builds Cora Trevin Chow - product leader working with Klaassen on compound engineering\n\n##Counter-arguments\n\n44 agents sounds impressive but the article doesn't describe what most of them do or how the dispatch layer works (clipping truncated) The \"folder is the agent\" framing is essentially \"give the model good context\" - a well-known principle repackaged as a methodology The failure of agent swarms may reflect the state of tooling in early 2026, not a fundamental limitation No discussion of when folder-agents fail or produce poor output\n\n##Data gaps\n\nArticle clipping is truncated - likely missing sections on the dispatch layer, specific agent examples, and conclusions No metrics on productivity gains from the 44-agent setup vs fewer agents The dispatch layer between agents is mentioned but not described No comparison with other orchestration approaches that did work","href":"klaassen-2026-folder-is-the-agent.html","type":"Source"},"terpstra-2026-keyboard-driven-mac-utilities":{"title":"Brett Terpstra - Keyboard-Driven Mac Utility List","lead":"Brett Terpstra - Keyboard-Driven Mac Utility List Source: Blog post by Brett Terpstra, 2026-03-27 Context: Terpstra is a developer and writer focused on macOS productivity tooling. Summary A curated overview of 20 macOS utilities organized around the principle that the keyboard is the most powerful input tool on a Mac. Terpstra uses all of these daily and describes how they complement each other. Categories and Tools Keyboard Navigation Superkey - searches text on screen, simulates mouse click on matching text. Navigate without leaving keyboard. Wooshy - alternative to Superkey for navigating ","rich":"**Source**: Blog post by {{Brett Terpstra}}, 2026-03-27 **Context**: Terpstra is a developer and writer focused on macOS productivity tooling.\n\n##Summary\n\nA curated overview of 20 macOS utilities organized around the principle that the keyboard is the most powerful input tool on a Mac. Terpstra uses all of these daily and describes how they complement each other.\n\n##Categories and Tools\n\n##Keyboard Navigation\n\n**{{Superkey}}** - searches text on screen, simulates mouse click on matching text. Navigate without leaving keyboard. **Wooshy** - alternative to Superkey for navigating all UI elements via keyboard. **{{KindaVim}}** - brings Vim-like key bindings (h/j/k/l/u/d/a/i) to any macOS app. Not perfect but great for basic Vim navigation. **{{Paletro}}** - Shift+Cmd+P in any app for fuzzy menu item search. Used daily. **Scrolla** - keyboard-driven scrolling through documents.\n\n##Keyboard Modifications\n\n**{{BetterTouchTool}}** - trackpad gesture and keyboard shortcut manager. Creates personalized commands. **{{Karabiner-Elements}}** - system-level key remapping. Terpstra uses it for Hyper key setup. **DefaultKeyBindings.dict** - macOS built-in key mapping file for custom keyboard shortcuts. **{{Keyboard Maestro}}** - automation engine for repetitive tasks. Combined with key bindings for streamlined text editing.\n\n##Launchers\n\n**{{LaunchBar}}** - Terpstra's preferred launcher after trying all alternatives. Features: clipboard history across reboots, Instant Send (double-tap Option), file actions. Combined with KindaVim and Superkey, creates a powerful navigation system. **LeaderKey** - static single-key sequences for launching frequently used apps and URLs. Complements LaunchBar.\n\n##Text Expansion\n\n**{{TextExpander}}** - longtime tool with snippet search, reminders, shell script execution. Expansion after whitespace feature gives it an edge. **TextBlaze** - alternative text expander, but Terpstra finds using both confusing. **{{Cotypist}}** - current favorite. AI-powered automatic text completion in any app. Predicts inputs without pre-created snippets. Works in Cursor too.\n\n##Window Management\n\n**{{Moom}}** - move and resize windows via keyboard. Grid mode for drawing positions on the fly.\n\n##Web Browsing\n\n**{{Vimium}}** - Vim-style navigation for browsers. Press F to tag visible links with key sequences. **{{Kagi}}** - search engine with full keyboard navigation and AI slop filtering.\n\n##Key Insights\n\nThe tools form an ecosystem where each fills a gap the others leave. The power is in the combination, not individual tools. Terpstra mentions an unpublished script based on NiftyMenu that scans any app for available shortcuts and generates {{Dash}} cheatsheets. The LaunchBar + KindaVim + Superkey combination is highlighted as particularly powerful for mouse-free navigation.\n\n##Counter-arguments\n\n20 utilities is a heavy investment in configuration and muscle memory Many tools overlap in functionality (e.g., BetterTouchTool can do some of what Keyboard Maestro and Karabiner do) Using both TextExpander and TextBlaze simultaneously suggests even the author hasn't fully rationalized the stack Some tools (Cotypist) rely on AI prediction which may not suit all writing styles\n\n##Data gaps\n\nNo discussion of how long it took to build this workflow or the learning curve No mention of conflicts between tools (key binding collisions, etc.) Missing cost breakdown - several are paid apps No comparison with built-in macOS keyboard features that might replace some of these tools","href":"terpstra-2026-keyboard-driven-mac-utilities.html","type":"Source"},"shannhk-2026-llm-wikid-readme":{"title":"llm-wikid README - AI-Maintained Knowledge Base for Obsidian","lead":"llm-wikid README - AI-Maintained Knowledge Base for Obsidian !llm-wikid-cover.png Summary llm-wikid is an open-source project by shann-holmberg that implements andrej-karpathy's llm-wiki-pattern as a ready-to-clone Obsidian vault. The core idea: you dump raw sources (tweets, articles, PDFs, ideas) into a folder, and an AI agent compiles them into structured, cross-referenced wiki pages in . Key Claims This is not RAG. The system explicitly distinguishes itself from retrieval-augmented generation. RAG re-derives answers every time by chunking documents and running vector search. This system pre","rich":"!{{llm-wikid-cover.png}}\n\n##Summary\n\n**llm-wikid** is an open-source project by {{shann-holmberg}} that implements {{andrej-karpathy}}'s {{llm-wiki-pattern}} as a ready-to-clone Obsidian vault. The core idea: you dump raw sources (tweets, articles, PDFs, ideas) into a raw/ folder, and an AI agent compiles them into structured, cross-referenced wiki pages in wiki/.\n\n##Key Claims\n\n**This is not RAG.** The system explicitly distinguishes itself from retrieval-augmented generation. RAG re-derives answers every time by chunking documents and running vector search. This system **pre-compiles** knowledge into structured wiki pages, keeps them current, and pre-builds cross-references. At ~100 articles / ~400K words, Karpathy found this outperforms RAG for Q&A.\n\n**The compound loop.** Every query answer gets filed back into the wiki, so the next query has more to work with. The system grows smarter with use, not just with new source material.\n\n**Agent-agnostic.** Works with any agent that can read markdown and run shell commands - Claude Code, OpenClaw, Hermes, Codex, or custom setups.\n\n##Ingest Pipeline\n\nThe system processes sources in phases:\n\n1. **Sort clippings** - raw/clippings/ is an inbox. Files get moved to the right subfolder (tweets to bookmarks, articles to articles, PDFs to papers) 2. **Resolve** - URLs get fetched via the appropriate tool (yt-dlp for YouTube, scrapling for web, X API for tweets) 3. **Media extraction** - Images downloaded and analyzed, video transcripts extracted 4. **Classify and compile** - Type-specific extraction (transcripts get speaker attribution, papers get method/findings, articles get thesis/arguments) 5. **Cross-link and bias check** - Wikilinks, counter-arguments, data gaps on every page\n\n##Quality Controls\n\n**Bias checks**: Counter-arguments and data gaps sections on every page **Validation gate**: explored: false on all AI-created pages, only human sets true **Confidence levels**: high/medium/low/uncertain based on source quality **Source tracing**: Every claim links to a specific source page **No blind links**: Every wikilink resolves to a page or stub\n\n##Tool Ecosystem\n\n| Tool | Purpose | |------|---------| | {{qmd}} | Local hybrid BM25/vector search with LLM re-ranking | | {{obsidian}} | Vault UI, graph view, Dataview queries | | yt-dlp | YouTube transcript extraction | | scrapling | Web scraping | | Obsidian Web Clipper | Browser-to-vault clipping |\n\n##Scaling Strategy\n\nFile-based with index scanning up to ~300 pages, then {{qmd}} as primary search, then PostgreSQL/Supabase at 500+.\n\n##Counter-arguments\n\nPre-compiled knowledge requires re-processing when understanding changes, unlike RAG which always pulls fresh chunks The \"outperforms RAG\" claim comes from Karpathy's personal experience at ~100 articles, not a controlled benchmark Agent-maintained wikis can accumulate confident-sounding but wrong information if bias checks are superficial The compound loop could also compound errors if early sources are flawed\n\n##Data gaps\n\nNo performance benchmarks comparing this approach to RAG systems at various scales Unknown how well the pattern works beyond single-user knowledge bases (team/collaborative use) No data on how much human curation time is actually needed to keep quality high The \"not RAG\" framing may be a false dichotomy - hybrid approaches could combine both","href":"shannhk-2026-llm-wikid-readme.html","type":"Source"},"brussee-2026-caveman-compress":{"title":"Julius Brussee - Caveman Compress","lead":"Julius Brussee - Caveman Compress Source: GitHub README Author: Julius Brussee Format: Open-source Claude Code skill Summary Caveman Compress is a Claude Code skill that reduces token consumption by compressing project memory files (CLAUDE.md, todos, preferences) into a more concise format while preserving their semantic content and structure. Part of a broader pattern of context-compression tools that reduce the cost of persistent context in LLM workflows. How It Works File type detection (local, no API call) Claude-powered compression (single API call to rewrite concisely) Validation (local ","rich":"**Source:** GitHub README **Author:** Julius Brussee **Format:** Open-source Claude Code skill\n\n##Summary\n\n{{Caveman Compress}} is a Claude Code skill that reduces token consumption by compressing project memory files (CLAUDE.md, todos, preferences) into a more concise format while preserving their semantic content and structure. Part of a broader pattern of {{context-compression}} tools that reduce the cost of persistent context in LLM workflows.\n\n##How It Works\n\n1. **File type detection** (local, no API call) 2. **Claude-powered compression** (single API call to rewrite concisely) 3. **Validation** (local checks that headings, code blocks, URLs, file paths, bullets survive) 4. **Targeted repairs** (patches only broken sections, no full recompression) 5. **Output generation** (compressed version + human-readable .original.md backup)\n\n##Preservation Rules\n\nCode blocks, inline code, URLs, file paths, technical terms, heading text, table structure, and numeric values are never modified. Only natural language prose gets compressed.\n\n##Benchmarks\n\n~46% average token reduction across five file types: Preference files: 59.6% Project notes: 53.3% Project metadata: 43.3% Todo lists: 38.1% Mixed documentation: 36.9%\n\nReal example: 706-token preferences file → 285 tokens, identical instructions.\n\n##Relationship to Other Tools\n\nAddresses the same problem as {{Claude-Mem}} (reducing token costs for persistent context) but from the opposite direction: caveman compresses the files themselves, while claude-mem provides progressive disclosure to avoid loading everything.\n\n##Counter-arguments\n\n46% compression on small files saves little in absolute terms - CLAUDE.md files are typically 1-3K tokens Compressed files may be harder for humans to read and maintain Claude-powered compression introduces a dependency on the model it's trying to optimize for Validation catches structural breaks but can't verify semantic preservation\n\n##Data gaps\n\nNo A/B testing of whether compressed vs uncompressed CLAUDE.md produces equivalent agent behavior Benchmarks are from five files - unclear if gains hold across diverse projects No discussion of failure modes when compression alters meaning Python 3.10+ requirement limits accessibility","href":"brussee-2026-caveman-compress.html","type":"Source"},"englert-2026-claude-cowork-tutorial":{"title":"JJ Englert - Claude Cowork Tutorial for Non-Engineers","lead":"JJ Englert - Claude Cowork Tutorial for Non-Engineers Source: How I AI podcast (YouTube), hosted by Claire Vo Author: JJ Englert (community enablement at Tenex) Date: 2026-04-13 Format: Video tutorial (~50 min) with transcript Summary A comprehensive walkthrough of Claude Cowork, Anthropic's desktop tool positioned between simple chat and terminal-based Claude Code. Aimed at non-engineers who want AI to do work, not just suggest it. Core Patterns Brain file strategy - Create a preferences document that Claude reads at the start of every session. Contains who you are, how you work, communicatio","rich":"**Source:** How I AI podcast (YouTube), hosted by Claire Vo **Author:** {{JJ Englert}} (community enablement at Tenex) **Date:** 2026-04-13 **Format:** Video tutorial (~50 min) with transcript\n\n##Summary\n\nA comprehensive walkthrough of {{Claude Cowork}}, Anthropic's desktop tool positioned between simple chat and terminal-based {{Claude Code}}. Aimed at non-engineers who want AI to do work, not just suggest it.\n\n##Core Patterns\n\n**Brain file strategy** - Create a preferences document that Claude reads at the start of every session. Contains who you are, how you work, communication style, and priorities. Functionally identical to an {{agentic-constitution}}, applied within Cowork's project structure.\n\n**Projects as folders** - Each Cowork project maps to a folder on your computer. Shared memory persists across conversations within a project, building context over time. Reinforces the {{folder-as-agent}} pattern: the project folder accumulates context that makes Claude more effective with each interaction.\n\n**One-click connectors** - Gmail, Slack, Notion, Google Calendar connect with a single click. Permission controls let you set Claude to draft-only (never send) or always-ask mode. The connectors transform Claude from advisor (\"here's what you should do\") to executor (\"I did it for you\").\n\n**Sub-advisory board** - Spin up three AI agents with different personas (e.g., your boss, your engineering partner, your customer) to review work from multiple perspectives before you present it. Each gets a fresh context window for objectivity.\n\n**Scheduled tasks** - Set up recurring tasks like a morning debrief at 7:30 a.m. that reads email, Slack, and calendar to produce a daily briefing. Moves AI from reactive (you ask) to proactive (it runs on schedule).\n\n**Progressive trust** - Start with restrictive permissions, gradually expand as you build confidence. The tradeoff: more information access yields more productivity, but requires trust in the tool's judgment.\n\n##Key Quotes\n\n\"Even though you might not be a developer, you're now an AI orchestrator.\" \"In chat it's like cool, you told me what to do, but now I got to go do it. Co-work is literally doing it for you.\" \"All my friends are agents. I'm a solo founder.\" (on using sub-advisory boards)\n\n##Tools Referenced\n\n{{Claude Cowork}}, {{Claude Code}}, {{Obsidian}}, Notion, OpenClaw, Wispr Flow, Monologue\n\n##Counter-arguments\n\nCowork's value depends heavily on connector quality - if Gmail/Slack integrations are flaky, the whole workflow breaks The sub-advisory board technique may produce artificial consensus rather than genuinely diverse perspectives Scheduled tasks reading email and Slack raise significant privacy and data exposure concerns \"Progressive trust\" could be a euphemism for gradually surrendering oversight\n\n##Data gaps\n\nNo comparison of Cowork vs Claude Code for overlapping use cases No discussion of cost/token implications for scheduled tasks running daily Sub-advisory board technique is described but no examples of actual output quality shown How does Cowork handle errors or hallucinations in automated workflows?","href":"englert-2026-claude-cowork-tutorial.html","type":"Source"},"karabiner-elements":{"title":"Karabiner-Elements","lead":"Karabiner-Elements Open-source macOS tool for system-level key remapping and behavior modification. Used by Brett Terpstra primarily for Hyper key setup, which unlocks additional keyboard shortcut possibilities. Website: karabiner-elements.pqrs.org. Part of the keyboard modification layer in a keyboard-driven-workflow, alongside BetterTouchTool, Keyboard Maestro, and DefaultKeyBindings.dict.","rich":"Open-source macOS tool for system-level key remapping and behavior modification. Used by {{Brett Terpstra}} primarily for Hyper key setup, which unlocks additional keyboard shortcut possibilities. Website: karabiner-elements.pqrs.org.\n\nPart of the keyboard modification layer in a {{keyboard-driven-workflow}}, alongside {{BetterTouchTool}}, {{Keyboard Maestro}}, and DefaultKeyBindings.dict.","href":"karabiner-elements.html","type":"Source"},"caveman-compress":{"title":"Caveman Compress","lead":"Caveman Compress Open-source Claude Code skill by Julius Brussee that reduces token consumption by compressing project memory files (CLAUDE.md, todos, preferences) while preserving semantic content. Achieves ~46% average token reduction. Uses a pipeline: file detection → Claude-powered compression → validation → targeted repairs. Preserves code blocks, URLs, file paths, and structural elements. Part of the context-compression landscape. Complements Claude-Mem (which uses progressive disclosure instead of file compression). Command: . Requires Python 3.10+.","rich":"Open-source Claude Code skill by Julius Brussee that reduces token consumption by compressing project memory files (CLAUDE.md, todos, preferences) while preserving semantic content.\n\nAchieves ~46% average token reduction. Uses a pipeline: file detection → Claude-powered compression → validation → targeted repairs. Preserves code blocks, URLs, file paths, and structural elements.\n\nPart of the {{context-compression}} landscape. Complements {{Claude-Mem}} (which uses progressive disclosure instead of file compression).\n\nCommand: /caveman:compress <filepath>. Requires Python 3.10+.","href":"caveman-compress.html","type":"Source"},"jj-englert":{"title":"JJ Englert","lead":"JJ Englert Community enablement lead at Tenex. Known for a widely-shared article asking \"Who is Cowork for anyway?\" and a subsequent zero-to-one Claude Cowork tutorial on the How I AI podcast. Practices: brain files for agent context (agentic-constitution), sub-advisory boards with multiple AI personas, scheduled morning debriefs, progressive trust model for AI permissions. Uses Cowork for productivity (email, Slack, documents) and Claude Code for building.","rich":"Community enablement lead at Tenex. Known for a widely-shared article asking \"Who is Cowork for anyway?\" and a subsequent zero-to-one {{Claude Cowork}} tutorial on the How I AI podcast.\n\nPractices: brain files for agent context ({{agentic-constitution}}), sub-advisory boards with multiple AI personas, scheduled morning debriefs, progressive trust model for AI permissions.\n\nUses Cowork for productivity (email, Slack, documents) and {{Claude Code}} for building.","href":"jj-englert.html","type":"Source"},"llm-wikid":{"title":"llm-wikid","lead":"llm-wikid Open-source project by shann-holmberg that implements andrej-karpathy's llm-wiki-pattern as a ready-to-clone obsidian vault. Agent-agnostic - works with Claude Code, OpenClaw, Hermes, Codex, or custom setups. Core operations: INGEST (process raw sources), QUERY (research and file answers), EXPLORE (expand topics), LINT (health check). Uses qmd for local search at scale. Stub - expand when more sources reference this entity.","rich":"Open-source project by {{shann-holmberg}} that implements {{andrej-karpathy}}'s {{llm-wiki-pattern}} as a ready-to-clone {{obsidian}} vault. Agent-agnostic - works with Claude Code, OpenClaw, Hermes, Codex, or custom setups.\n\nCore operations: INGEST (process raw sources), QUERY (research and file answers), EXPLORE (expand topics), LINT (health check).\n\nUses {{qmd}} for local search at scale.\n\n_Stub - expand when more sources reference this entity._","href":"llm-wikid.html","type":"Source"},"kagi":{"title":"Kagi","lead":"Kagi Paid search engine offering full keyboard navigation of results and AI slop filtering. Used by Brett Terpstra alongside Vimium for a keyboard-driven web browsing experience. Website: kagi.com.","rich":"Paid search engine offering full keyboard navigation of results and AI slop filtering. Used by {{Brett Terpstra}} alongside {{Vimium}} for a keyboard-driven web browsing experience. Website: kagi.com.","href":"kagi.html","type":"Source"},"tobi-lutke":{"title":"Tobi Lutke","lead":"Tobi Lutke Creator of qmd, a local markdown search engine with hybrid BM25/vector search. CEO of Shopify. Stub - expand when more sources reference this entity.","rich":"Creator of {{qmd}}, a local markdown search engine with hybrid BM25/vector search. CEO of Shopify.\n\n_Stub - expand when more sources reference this entity._","href":"tobi-lutke.html","type":"Source"},"claude-mem":{"title":"Claude-Mem","lead":"Claude-Mem Open-source persistent memory system for Claude Code by Alex Newman (@thedotmack). Captures observations during tool interactions, compresses them into semantic summaries, and makes them available across sessions. Architecture: lifecycle hooks → SQLite (FTS5) + Chroma vector DB → 3-layer progressive disclosure (search → timeline → full details). Claims ~10x token savings vs loading all context. Part of the context-compression landscape. Complements Caveman Compress (which compresses files directly instead of adding a retrieval layer). Supports Claude Code, Gemini CLI, and OpenClaw. ","rich":"Open-source persistent memory system for Claude Code by Alex Newman (@thedotmack). Captures observations during tool interactions, compresses them into semantic summaries, and makes them available across sessions.\n\nArchitecture: lifecycle hooks → SQLite (FTS5) + Chroma vector DB → 3-layer progressive disclosure (search → timeline → full details). Claims ~10x token savings vs loading all context.\n\nPart of the {{context-compression}} landscape. Complements {{Caveman Compress}} (which compresses files directly instead of adding a retrieval layer).\n\nSupports Claude Code, Gemini CLI, and OpenClaw. Licensed AGPL-3.0.","href":"claude-mem.html","type":"Source"},"shann-holmberg":{"title":"Shann Holmberg","lead":"Shann Holmberg Creator of llm-wikid. Known on X as @shannholmberg and on GitHub as shannhk. Stub - expand when more sources reference this entity.","rich":"Creator of {{llm-wikid}}. Known on X as @shannholmberg and on GitHub as shannhk.\n\n_Stub - expand when more sources reference this entity._","href":"shann-holmberg.html","type":"Source"},"obsidian":{"title":"Obsidian","lead":"Obsidian Markdown-based knowledge management application. In the context of llm-wikid, serves as the UI layer for browsing the wiki - graph view for visualizing connections, Dataview for structured queries, and Web Clipper for collecting sources from the browser into . Recommended plugins (from llm-wikid): Dataview, Obsidian Git, Templater, Tag Wrangler. Additional plugins recommended by YB (yb-effect-2026-commonplace-practice): Copilot, Readwise, Excalidraw, Simple Note Review. As a Personal Thinking Tool YB describes using Obsidian + Claude as a personal thinking system built around five pra","rich":"Markdown-based knowledge management application. In the context of {{llm-wikid}}, serves as the UI layer for browsing the wiki - graph view for visualizing connections, Dataview for structured queries, and Web Clipper for collecting sources from the browser into raw/clippings/.\n\nRecommended plugins (from {{shannhk-2026-llm-wikid-readme}}): Dataview, Obsidian Git, Templater, Tag Wrangler.\n\nAdditional plugins recommended by YB ({{yb-effect-2026-commonplace-practice}}): Copilot, {{Readwise}}, Excalidraw, Simple Note Review.\n\n##As a Personal Thinking Tool\n\nYB describes using Obsidian + Claude as a personal thinking system built around five practices: {{commonplace-practice}}, {{atomic-notes}}, {{intentional-reading}}, {{agentic-constitution}}, and {{knowledge-work-prs}}. This use case differs from the {{llm-wiki-pattern}} research workflow - the emphasis is on capturing personal context that AI can't generate on its own.","href":"obsidian.html","type":"Source"},"paul-graham":{"title":"Paul Graham","lead":"Paul Graham Essayist, programmer, and co-founder of Y Combinator. Referenced by YB (yb-effect-2026-commonplace-practice) for the idea that \"writing is thinking\" - used to motivate the practice of writing atomic-notes for oneself as a way of developing thought. Stub - expand when more sources reference this entity.","rich":"Essayist, programmer, and co-founder of Y Combinator. Referenced by YB ({{yb-effect-2026-commonplace-practice}}) for the idea that \"writing is thinking\" - used to motivate the practice of writing {{atomic-notes}} for oneself as a way of developing thought.\n\n_Stub - expand when more sources reference this entity._","href":"paul-graham.html","type":"Source"},"readwise":{"title":"Readwise","lead":"Readwise Reading highlights aggregation tool. Captures highlights from books, articles, podcasts, and other sources. Includes a Reader app for focused reading with annotation. The Obsidian plugin syncs highlights into the vault, enabling users to connect reading material to atomic-notes and other knowledge. Central to the intentional-reading pipeline described by YB (yb-effect-2026-commonplace-practice). Stub - expand when more sources reference this entity.","rich":"Reading highlights aggregation tool. Captures highlights from books, articles, podcasts, and other sources. Includes a Reader app for focused reading with annotation.\n\nThe {{Obsidian}} plugin syncs highlights into the vault, enabling users to connect reading material to {{atomic-notes}} and other knowledge. Central to the {{intentional-reading}} pipeline described by YB ({{yb-effect-2026-commonplace-practice}}).\n\n_Stub - expand when more sources reference this entity._","href":"readwise.html","type":"Source"},"brett-terpstra":{"title":"Brett Terpstra","lead":"Brett Terpstra Developer and writer based in Minnesota, USA. Maintains a blog at brettterpstra.com focused on macOS productivity tools and automation. Active on GitHub (ttscoff) and Mastodon. Notable projects: NiftyMenu (menu item scanner), Cheaters (cheatsheet viewer), custom DefaultKeyBindings.dict for macOS, Karabiner-Elements mods. Known for his extensive keyboard-driven-workflow combining 20+ macOS utilities. Key tools in his daily stack: LaunchBar, Keyboard Maestro, Karabiner-Elements, BetterTouchTool, KindaVim, Superkey, Moom, Vimium, Cotypist.","rich":"Developer and writer based in Minnesota, USA. Maintains a blog at brettterpstra.com focused on macOS productivity tools and automation. Active on GitHub (ttscoff) and Mastodon.\n\nNotable projects: NiftyMenu (menu item scanner), Cheaters (cheatsheet viewer), custom DefaultKeyBindings.dict for macOS, {{Karabiner-Elements}} mods.\n\nKnown for his extensive {{keyboard-driven-workflow}} combining 20+ macOS utilities. Key tools in his daily stack: {{LaunchBar}}, {{Keyboard Maestro}}, {{Karabiner-Elements}}, {{BetterTouchTool}}, {{KindaVim}}, {{Superkey}}, {{Moom}}, {{Vimium}}, {{Cotypist}}.","href":"brett-terpstra.html","type":"Source"},"andy-matuschak":{"title":"Andy Matuschak","lead":"Andy Matuschak Researcher and designer known for work on tools for thought. Former Apple (iOS) and Khan Academy. Creator of the evergreen notes / atomic-notes practice, which emphasizes writing concept-oriented notes that build on each other over time. Referenced by YB (yb-effect-2026-commonplace-practice) as the foundational influence for atomic note-taking in a Claude + Obsidian workflow. Stub - expand when more sources reference this entity.","rich":"Researcher and designer known for work on tools for thought. Former Apple (iOS) and Khan Academy. Creator of the evergreen notes / {{atomic-notes}} practice, which emphasizes writing concept-oriented notes that build on each other over time.\n\nReferenced by YB ({{yb-effect-2026-commonplace-practice}}) as the foundational influence for atomic note-taking in a Claude + {{Obsidian}} workflow.\n\n_Stub - expand when more sources reference this entity._","href":"andy-matuschak.html","type":"Source"},"kieran-klaassen":{"title":"Kieran Klaassen","lead":"Kieran Klaassen General manager of Cora, Every.to's AI email assistant. Creator of compound-engineering, an AI-native engineering philosophy with 14,000+ GitHub stars. Sole engineer building Cora. Known for the folder-as-agent pattern - the claim that a project folder with accumulated context is the real \"agent,\" not the model. Runs 44 such folder-agents with a custom dispatch layer. Primarily uses Claude Opus 4.6, also GPT 5.4 and Gemini Pro 3.1. Published at Every.to's Source Code column. Collaborates with product leader Trevin Chow on compound engineering workshops.","rich":"General manager of {{Cora}}, Every.to's AI email assistant. Creator of {{compound-engineering}}, an AI-native engineering philosophy with 14,000+ GitHub stars. Sole engineer building Cora.\n\nKnown for the {{folder-as-agent}} pattern - the claim that a project folder with accumulated context is the real \"agent,\" not the model. Runs 44 such folder-agents with a custom dispatch layer. Primarily uses Claude Opus 4.6, also GPT 5.4 and Gemini Pro 3.1.\n\nPublished at Every.to's Source Code column. Collaborates with product leader Trevin Chow on compound engineering workshops.","href":"kieran-klaassen.html","type":"Source"},"bettertouchtool":{"title":"BetterTouchTool","lead":"BetterTouchTool macOS application for trackpad gesture management and keyboard shortcut customization. Used by Brett Terpstra in his keyboard-driven-workflow. Website: folivora.ai. Part of the keyboard modification layer alongside Karabiner-Elements and Keyboard Maestro.","rich":"macOS application for trackpad gesture management and keyboard shortcut customization. Used by {{Brett Terpstra}} in his {{keyboard-driven-workflow}}. Website: folivora.ai.\n\nPart of the keyboard modification layer alongside {{Karabiner-Elements}} and {{Keyboard Maestro}}.","href":"bettertouchtool.html","type":"Source"},"keyboard-maestro":{"title":"Keyboard Maestro","lead":"Keyboard Maestro macOS automation application for creating keyboard-triggered macros and complex workflows. Used by Brett Terpstra as part of his keyboard-driven-workflow for automating repetitive tasks and streamlining text editing. Website: keyboardmaestro.com. Combined with Karabiner-Elements for key remapping and DefaultKeyBindings.dict for system-level shortcuts, forms the modification layer of a keyboard-driven setup.","rich":"macOS automation application for creating keyboard-triggered macros and complex workflows. Used by {{Brett Terpstra}} as part of his {{keyboard-driven-workflow}} for automating repetitive tasks and streamlining text editing. Website: keyboardmaestro.com.\n\nCombined with {{Karabiner-Elements}} for key remapping and DefaultKeyBindings.dict for system-level shortcuts, forms the modification layer of a keyboard-driven setup.","href":"keyboard-maestro.html","type":"Source"},"launchbar":{"title":"LaunchBar","lead":"LaunchBar macOS application launcher and productivity tool by Objective Development. Features: clipboard history across reboots, Instant Send (double-tap Option key), file actions, quick calculations. Brett Terpstra's preferred launcher. Website: obdev.at/launchbar. Combined with KindaVim for Finder navigation and Superkey for screen text selection, forms a powerful mouse-free navigation system.","rich":"macOS application launcher and productivity tool by Objective Development. Features: clipboard history across reboots, Instant Send (double-tap Option key), file actions, quick calculations. {{Brett Terpstra}}'s preferred launcher. Website: obdev.at/launchbar.\n\nCombined with {{KindaVim}} for Finder navigation and {{Superkey}} for screen text selection, forms a powerful mouse-free navigation system.","href":"launchbar.html","type":"Source"},"cora":{"title":"Cora","lead":"Cora AI email assistant built by Every.to. Developed by Kieran Klaassen as sole engineer. The primary case study for the folder-as-agent pattern and compound-engineering methodology. Website: cora.computer.","rich":"AI email assistant built by Every.to. Developed by {{Kieran Klaassen}} as sole engineer. The primary case study for the {{folder-as-agent}} pattern and {{compound-engineering}} methodology. Website: cora.computer.","href":"cora.html","type":"Source"},"claude-cowork":{"title":"Claude Cowork","lead":"Claude Cowork Anthropic's desktop productivity tool, positioned between simple chat and terminal-based Claude Code. Available in the Claude desktop app as the middle tab (Chat | Cowork | Code). Designed for non-engineers who want AI to execute tasks, not just advise. Key features: Folder-based projects with shared memory across conversations (reinforces folder-as-agent) One-click connectors to Gmail, Slack, Notion, Google Calendar with granular permissions Skills - reusable instructions for specific tasks (writing style, advisory boards, research) Scheduled tasks - recurring automations (e.g.,","rich":"Anthropic's desktop productivity tool, positioned between simple chat and terminal-based {{Claude Code}}. Available in the Claude desktop app as the middle tab (Chat | Cowork | Code).\n\nDesigned for non-engineers who want AI to execute tasks, not just advise. Key features:\n\n**Folder-based projects** with shared memory across conversations (reinforces {{folder-as-agent}}) **One-click connectors** to Gmail, Slack, Notion, Google Calendar with granular permissions **Skills** - reusable instructions for specific tasks (writing style, advisory boards, research) **Scheduled tasks** - recurring automations (e.g., morning debrief at 7:30 a.m.) **Sub-agents** - multiple AI personas for multi-perspective review\n\nThe \"brain file\" pattern (a preferences document Claude reads every session) is functionally identical to an {{agentic-constitution}}.\n\n##Counter-arguments\n\nMay be a UI wrapper that adds friction vs direct Claude Code usage Connector quality determines the ceiling of the tool\n\n##Data gaps\n\nSingle tutorial source - no comparative reviews or benchmarks Cost/token implications of scheduled tasks and sub-agents unclear","href":"claude-cowork.html","type":"Source"},"vimium":{"title":"Vimium","lead":"Vimium Browser extension that adds Vim-style navigation to web pages. Used by Brett Terpstra in his keyboard-driven-workflow. Key feature: pressing F tags every visible link with key sequences for keyboard-only navigation. Website: vimium.github.io.","rich":"Browser extension that adds Vim-style navigation to web pages. Used by {{Brett Terpstra}} in his {{keyboard-driven-workflow}}. Key feature: pressing F tags every visible link with key sequences for keyboard-only navigation. Website: vimium.github.io.","href":"vimium.html","type":"Source"},"qmd":{"title":"qmd","lead":"qmd Local markdown search engine by tobi-lutke. Three search modes: BM25 keyword (fast), vector semantic, and hybrid with LLM re-ranking (best results). Runs 100% on-device. Built-in MCP server for agent integration. Used by llm-wikid as the search layer when wiki scales past ~300 pages. Stub - expand when more sources reference this entity.","rich":"Local markdown search engine by {{tobi-lutke}}. Three search modes: BM25 keyword (fast), vector semantic, and hybrid with LLM re-ranking (best results). Runs 100% on-device.\n\nBuilt-in MCP server for agent integration. Used by {{llm-wikid}} as the search layer when wiki scales past ~300 pages.\n\n_Stub - expand when more sources reference this entity._","href":"qmd.html","type":"Source"},"andrej-karpathy":{"title":"Andrej Karpathy","lead":"Andrej Karpathy AI researcher known for work on computer vision and neural networks. Former director of AI at Tesla, founding member of OpenAI. Originated the llm-wiki-pattern for personal knowledge management, reporting that at ~100 articles it outperforms RAG for Q&A. Stub - expand when more sources reference this entity.","rich":"AI researcher known for work on computer vision and neural networks. Former director of AI at Tesla, founding member of OpenAI. Originated the {{llm-wiki-pattern
