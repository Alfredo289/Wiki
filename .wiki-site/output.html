<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{title}} — Wikiwise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-output">
<header class="masthead">
  <a class="masthead-mark" href="home.html">
    <span class="masthead-mark-letter">W</span>
    <span class="masthead-mark-words">
      <span class="masthead-mark-word-primary">Wikiwise</span>
    </span>
  </a>
  <div class="masthead-search">
    <input id="search-input" type="search" placeholder="Search Wikiwise…" autocomplete="off">
    <div id="search-results"></div>
  </div>
</header>
<div class="layout">
<aside class="rail">
<nav class="rail-nav"><h4>Navigate</h4><ul><li><a href="home.html">Home</a></li><li><a href="index.html">Catalog</a></li><li><a href="map-3d.html">Map</a></li><li><a href="log.html">Recent changes</a></li></ul></nav>
<section class="toc-block"><h4>Contents</h4><div class="toc"><ul><li><a href="#answer">Answer</a></li><li><a href="#sources-consulted">Sources Consulted</a></li></ul></div></section>
</aside>
<div class="article">
<div class="article-head">
  <h1 class="article-title">{{title}}</h1>
<div class="article-subtitle">output</div>
</div>
<div class="article-body">
<table class="infobox"><caption>Source</caption><tr><th>tldr</th><td>&quot;&quot;</td></tr><tr><th>date_created</th><td>{{date}}</td></tr><tr><th>date_modified</th><td>{{date}}</td></tr><tr><th>tags</th><td>[]</td></tr><tr><th>query</th><td>&quot;&quot;</td></tr><tr><th>sources</th><td>[]</td></tr><tr><th>explored</th><td>false</td></tr><tr><th>confidence</th><td>medium</td></tr></table><h2 id="answer">Answer</h2>
<h2 id="sources-consulted">Sources Consulted</h2>

</div>
</div>
</div>
<script src="search.json.js"></script>
<script src="app.js"></script>
</body>
</html>
