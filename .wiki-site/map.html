assistant built by Every.to. Developed by {{Kieran Klaassen}} as sole engineer. The primary case study for the {{folder-as-agent}} pattern and {{compound-engineering}} methodology. Website: cora.computer.","href":"cora.html","type":"Source"},"claude-cowork":{"title":"Claude Cowork","lead":"Claude Cowork Anthropic's desktop productivity tool, positioned between simple chat and terminal-based Claude Code. Available in the Claude desktop app as the middle tab (Chat | Cowork | Code). Designed for non-engineers who want AI to execute tasks, not just advise. Key features: Folder-based projects with shared memory across conversations (reinforces folder-as-agent) One-click connectors to Gmail, Slack, Notion, Google Calendar with granular permissions Skills - reusable instructions for specific tasks (writing style, advisory boards, research) Scheduled tasks - recurring automations (e.g.,","rich":"Anthropic's desktop productivity tool, positioned between simple chat and terminal-based {{Claude Code}}. Available in the Claude desktop app as the middle tab (Chat | Cowork | Code).\n\nDesigned for non-engineers who want AI to execute tasks, not just advise. Key features:\n\n**Folder-based projects** with shared memory across conversations (reinforces {{folder-as-agent}}) **One-click connectors** to Gmail, Slack, Notion, Google Calendar with granular permissions **Skills** - reusable instructions for specific tasks (writing style, advisory boards, research) **Scheduled tasks** - recurring automations (e.g., morning debrief at 7:30 a.m.) **Sub-agents** - multiple AI personas for multi-perspective review\n\nThe \"brain file\" pattern (a preferences document Claude reads every session) is functionally identical to an {{agentic-constitution}}.\n\n##Counter-arguments\n\nMay be a UI wrapper that adds friction vs direct Claude Code usage Connector quality determines the ceiling of the tool\n\n##Data gaps\n\nSingle tutorial source - no comparative reviews or benchmarks Cost/token implications of scheduled tasks and sub-agents unclear","href":"claude-cowork.html","type":"Source"},"vimium":{"title":"Vimium","lead":"Vimium Browser extension that adds Vim-style navigation to web pages. Used by Brett Terpstra in his keyboard-driven-workflow. Key feature: pressing F tags every visible link with key sequences for keyboard-only navigation. Website: vimium.github.io.","rich":"Browser extension that adds Vim-style navigation to web pages. Used by {{Brett Terpstra}} in his {{keyboard-driven-workflow}}. Key feature: pressing F tags every visible link with key sequences for keyboard-only navigation. Website: vimium.github.io.","href":"vimium.html","type":"Source"},"qmd":{"title":"qmd","lead":"qmd Local markdown search engine by tobi-lutke. Three search modes: BM25 keyword (fast), vector semantic, and hybrid with LLM re-ranking (best results). Runs 100% on-device. Built-in MCP server for agent integration. Used by llm-wikid as the search layer when wiki scales past ~300 pages. Stub - expand when more sources reference this entity.","rich":"Local markdown search engine by {{tobi-lutke}}. Three search modes: BM25 keyword (fast), vector semantic, and hybrid with LLM re-ranking (best results). Runs 100% on-device.\n\nBuilt-in MCP server for agent integration. Used by {{llm-wikid}} as the search layer when wiki scales past ~300 pages.\n\n_Stub - expand when more sources reference this entity._","href":"qmd.html","type":"Source"},"andrej-karpathy":{"title":"Andrej Karpathy","lead":"Andrej Karpathy AI researcher known for work on computer vision and neural networks. Former director of AI at Tesla, founding member of OpenAI. Originated the llm-wiki-pattern for personal knowledge management, reporting that at ~100 articles it outperforms RAG for Q&A. Stub - expand when more sources reference this entity.","rich":"AI researcher known for work on computer vision and neural networks. Former director of AI at Tesla, founding member of OpenAI. Originated the {{llm-wiki-pattern}} for personal knowledge management, reporting that at ~100 articles it outperforms RAG for Q&A.\n\n_Stub - expand when more sources reference this entity._","href":"andrej-karpathy.html","type":"Source"},"readme":{"title":"LLM Wikid","lead":"<p align=\"center\"> <img src=\"assets/cover.png\" alt=\"LLM Wikid\" width=\"700\"> <\/p> LLM Wikid An AI-maintained knowledge base that lives in Obsidian. Based on Karpathy's LLM Wiki pattern. You dump raw sources into a folder. An AI agent reads them, compiles structured wiki pages with cross-references, runs bias checks, and maintains a master index. Every question you ask gets filed back in. The wiki compounds the more you use it. Works with any agent that can read markdown and run shell commands: Claude Code, OpenClaw, Hermes, Codex, or your own setup. Quick Start ```CLAUDE.md``/wiki-ingestraw/raw","rich":"<p align=\"center\"> <img src=\"assets/cover.png\" alt=\"LLM Wikid\" width=\"700\"> <\/p>\n\nAn AI-maintained knowledge base that lives in Obsidian. Based on Karpathy's LLM Wiki pattern.\n\nYou dump raw sources into a folder. An AI agent reads them, compiles structured wiki pages with cross-references, runs bias checks, and maintains a master index. Every question you ask gets filed back in. The wiki compounds the more you use it.\n\nWorks with any agent that can read markdown and run shell commands: Claude Code, OpenClaw, Hermes, Codex, or your own setup.\n\n##Quick Start\n\nThe agent reads CLAUDE.md and knows everything. That file is the schema that controls the entire system.\n\n##How It Works\n\nThis is **not RAG**. RAG re-derives answers every time by chunking documents and running vector search. This system compiles knowledge once into structured wiki pages, keeps them current, and pre-builds cross-references. At ~100 articles / ~400K words, Karpathy found this outperforms RAG for Q&A.\n\nThe compound loop: every answer filed back means the next query has more to work with. Your curiosity makes the system smarter.\n\n##The Ingest Pipeline\n\nWhen you run /wiki-ingest, the agent processes everything in raw/ through these phases:\n\n**Phase 0 - Sort clippings.** Anything in raw/clippings/ gets moved to the right subfolder based on its URL. Tweet goes to raw/bookmarks/, article to raw/articles/, PDF to raw/papers/. The clippings folder is just an inbox.\n\n**Phase 1 - Resolve.** The agent detects what each file contains and fetches the full content: YouTube URL: extracts transcript via yt-dlp X/Twitter URL: fetches tweet text, thread, metrics via X API Web URL / Reddit: scrapes full page via scrapling PDF: reads directly Plain text: already resolved\n\nThe resolved content replaces the file in-place. The original URL stays in frontmatter for provenance.\n\n**Phase 1.5 - Media extraction.** Images get downloaded to raw/assets/images/ and analyzed. Videos get their transcripts pulled. A tweet that says \"here's my stack\" with an image of the stack is useless without the image.\n\n**Phase 2 - Classify and compile.** Each source gets classified by type (transcript, paper, report, article, tweet, notes) and extracted differently. A transcript gets speaker attribution and action items. A paper gets method and findings. An article gets core thesis and supporting arguments. Generic extraction misses what makes each format valuable.\n\nThe agent creates wiki pages, adds {{wikilinks}} between them, runs bias checks (counter-arguments and data gaps on every page), and updates the master index.\n\n**Phase 3 - Re-index.** If you have qmd installed, the search index gets updated with new content.\n\n##Commands\n\n| Command | What it does | |---------|-------------| | /wiki-ingest | Process new raw sources into wiki pages | | /wiki-query [question] | Research a question, get a cited answer, file it back | | /wiki-explore [topic] | Actively research and expand a topic using web search and /last30days | | /wiki-lint | Health check: contradictions, orphans, broken links, stale content |\n\n##Folder Structure\n\nAfter your first ingest, this is what it looks like:\n\n##Quality Controls\n\nThe system has safeguards to prevent it from becoming a pile of confident-sounding AI output:\n\n**Bias checks.** Every concept and source page includes a ## Counter-arguments section (what pushes back) and a ## Data gaps section (what we don't know). Without these, the wiki just agrees with every source.\n\n**Validation gate.** The agent sets explored: false on every page it creates. Only you can mark something as reviewed by setting it to true. You always know what's been human-verified and what hasn't.\n\n**Confidence levels.** Pages are tagged high, medium, low, or uncertain based on how well-supported the content is. Multiple corroborating sources = high. Single mention with thin evidence = low. The agent has to be honest.\n\n**Source tracing.** Every claim links back to a specific source page. No vague \"research shows\" without pointing to which research.\n\n**No blind links.** Every {{wikilink}} resolves to an actual page. If a concept is mentioned but doesn't have a page yet, the agent creates a stub.\n\n##Curation\n\nThis is an idea bank, not a fact database. Some of what goes in will be wrong, half-formed, or just bad. That's fine. The point is capturing your thinking so it compounds over time.\n\nBut curation matters. Before clipping something into raw/, ask: does this feel 80%+ relevant to what I'm working on or thinking about? If it's noise, skip it. The wiki gets stronger when the inputs are high-signal.\n\nRunning /wiki-lint regularly catches the drift: contradictions between pages, stale claims, orphan pages nobody links to, concepts mentioned but never defined. The agent fixes what it can and flags what needs your judgment.\n\n##Git Sync\n\nGitHub is the source of truth. Every operation that changes wiki/ or raw/ ends with a commit and push. This means:\n\nEvery change is reversible (git revert) Multiple agents can work on the same wiki (pull before writing, push after) You can access the wiki from anywhere that can clone a repo Your entire knowledge history is preserved\n\n##Claude Dispatch (automated ingest)\n\nSet up a scheduled trigger that runs /wiki-ingest every morning. You clip things during the day, they get processed overnight.\n\nOr configure directly: a cron trigger pointing at your repo, running the ingest prompt daily. The remote agent clones the repo, reads CLAUDE.md, processes new sources, commits, and pushes. You wake up to a richer wiki.\n\nThe Dispatch agent runs remotely, so it won't have local tools like X API keys. It can still process web URLs, plain text, and anything already resolved. Tweet resolution happens when you run ingest locally.\n\n##Search (qmd)\n\nFor fast search across your wiki, install qmd by Tobi Lutke. Hybrid BM25/vector search with LLM re-ranking, 100% on-device.\n\nThree search modes:\n\nqmd has a built-in MCP server so your agent can use it as a native tool:\n\nThe /wiki-explore command uses qmd automatically when installed.\n\n##Recommended Skills\n\n| Skill | What it adds | |-------|-------------| | last30days | Searches Reddit, HN, X, YouTube, GitHub, Polymarket for recent community signals. Used by /wiki-explore. | | Obsidian Web Clipper | Clip anything from your browser directly to raw/clippings/ |\n\n##Obsidian Plugins\n\n| Plugin | Purpose | |--------|---------| | Dataview | Query frontmatter, build dashboards from wiki data | | Obsidian Git | Auto-commit on interval, push to remote | | Templater | Auto-populate dates and fields on new notes | | Tag Wrangler | Bulk rename and merge tags |\n\n##Scaling\n\n| Wiki Size | Strategy | |-----------|----------| | 0-300 pages | File-based, index TLDR scanning + qmd search | | 300-500 pages | qmd becomes primary search layer | | 500+ pages | Consider PostgreSQL/Supabase |\n\n##Optional Tools\n\nInstalled as needed during ingestion:\n\n| Tool | What it does | Install | |------|-------------|---------| | yt-dlp | YouTube transcripts | brew install yt-dlp | | scrapling | Web scraping | pipx install scrapling | | summarize | PDF extraction | brew install steipete/tap/summarize | | X API | Tweet/thread fetching | OAuth keys in .env (optional) |\n\n##Credits\n\nAndrej Karpathy's LLM Wiki pattern - the original idea hooeem's LLM Knowledge Base course - practical walkthrough qmd by Tobi Lutke - local markdown search engine last30days by mvanhorn - multi-platform signal search Built by @shannholmberg","href":"readme.html","type":"Concept"},"concept":{"title":"{{title}}","lead":"{{title}} [Lead section: 2-3 sentences defining this concept] Key Ideas How It Connects Counter-arguments Data gaps","rich":"[Lead section: 2-3 sentences defining this concept]\n\n##Key Ideas\n\n##How It Connects\n\n##Counter-arguments\n\n##Data gaps","href":"concept.html","type":"Source"},"entity":{"title":"{{title}}","lead":"{{title}} [One paragraph: what/who this is and why it matters] Details Related","rich":"[One paragraph: what/who this is and why it matters]\n\n##Details\n\n##Related","href":"entity.html","type":"Source"},"source":{"title":"{{title}}","lead":"{{title}} Summary Key Takeaways Concepts & Entities Mentioned Counter-arguments Data gaps","rich":"##Summary\n\n##Key Takeaways\n\n##Concepts & Entities Mentioned\n\n##Counter-arguments\n\n##Data gaps","href":"source.html","type":"Source"},"synthesis":{"title":"{{title}}","lead":"{{title}} Analysis Patterns Counter-arguments Data gaps","rich":"##Analysis\n\n##Patterns\n\n##Counter-arguments\n\n##Data gaps","href":"synthesis.html","type":"Source"},"project":{"title":"{{title}}","lead":"{{title}} Goal Context Key Decisions Related","rich":"##Goal\n\n##Context\n\n##Key Decisions\n\n##Related","href":"project.html","type":"Source"},"output":{"title":"{{title}}","lead":"{{title}} Answer Sources Consulted","rich":"##Answer\n\n##Sources Consulted","href":"output.html","type":"Source"},"sop":{"title":"{{title}}","lead":"{{title}} When to Use Steps Notes","rich":"##When to Use\n\n##Steps\n\n1.\n\n##Notes","href":"sop.html","type":"Source"},"claude":{"title":"claude","lead":"# LLM Knowledge Base - Schema Overview Personal knowledge base maintained by an LLM agent. Raw sources live in . The compiled wiki lives in . You (the AI) maintain all wiki content. The user directs strategy and source collection; you execute compilation, maintenance, and queries. This is NOT RAG. Knowledge is pre-compiled into wiki pages. The agent reads structured pages, not raw chunks. Every query compounds the system. Directory Structure Wiki - Master index linking every page with TLDR for fast scanning - Append-only changelog of all operations - Concept pages (ideas, frameworks, topics) -","rich":"# LLM Knowledge Base - Schema\n\n##Overview\n\nPersonal knowledge base maintained by an LLM agent. Raw sources live in raw/. The compiled wiki lives in wiki/. You (the AI) maintain all wiki content. The user directs strategy and source collection; you execute compilation, maintenance, and queries.\n\nThis is NOT RAG. Knowledge is pre-compiled into wiki pages. The agent reads structured pages, not raw chunks. Every query compounds the system.\n\n##Directory Structure\n\n##Wiki\n\nwiki/index.md - Master index linking every page with TLDR for fast scanning wiki/log.md - Append-only changelog of all operations wiki/concepts/ - Concept pages (ideas, frameworks, topics) wiki/entities/ - Entity pages (people, companies, tools, protocols) wiki/sources/ - Source summary pages (one per raw source) wiki/syntheses/ - Cross-cutting analysis across sources wiki/outputs/ - Filed answers to queries wiki/sops/ - Repeatable processes and workflows templates/ - Starter templates per page type (for Obsidian Templater)\n\n##Raw\n\nraw/ideas/ - Idea notes and brainstorms raw/bookmarks/ - Bookmarked tweet and article sources raw/x-archive/ - X archive tweets (exported from X/Twitter) raw/clippings/ - Obsidian Web Clipper inbox. Everything lands here. During INGEST, files get sorted to the correct subfolder and removed from clippings. raw/articles/ - Long-form articles and blog posts (sorted from clippings) raw/papers/ - Research papers and PDFs (sorted from clippings) raw/assets/ - Images, videos, and other media\n\nNew wiki pages go in the subfolder matching their type frontmatter field. Wikilinks use filename only (Obsidian resolves via shortest-path setting).\n\n##Frontmatter Schema\n\nEvery wiki page MUST have YAML frontmatter:\n\n##Validation Gate\n\nexplored defaults to **false** on every AI-created or AI-updated page. Only the user can set it to true after reviewing the content. This prevents blind trust in AI-generated knowledge. The agent must never set explored: true.\n\nconfidence signals how well-supported the content is: **high** - multiple corroborating sources, well-established topic **medium** - single source or limited evidence, reasonable synthesis **low** - speculative, early-stage idea, thin evidence **uncertain** - contradictory sources or insufficient information\n\n##Page Types\n\n| Type | What it is | |------|-----------| | concept | An idea, framework, or topic | | entity | Person, company, tool, protocol | | source | Summary of one raw source | | project | Active project with goals and context | | sop | Repeatable process or workflow | | synthesis | Cross-cutting analysis across sources | | output | Filed answer to a query |\n\n##Source Resolution (Resolve Before Classify)\n\nraw/ is a messy inbox. Before classification, INGEST must resolve each input to its full content using the right tool.\n\n##Resolution Tool Mapping\n\n| Input Pattern | Tool | What It Extracts | |--------------|------|-----------------| | YouTube URL (youtube.com, youtu.be) | yt-dlp | Transcript (auto-subs), title, description, metadata | | X/Twitter URL (x.com, twitter.com) | X API (OAuth) | Tweet text, thread, author, metrics. If video/image attached, also yt-dlp for video and download images | | Web URL / Reddit URL | scrapling | Page content, title, author, date | | PDF file (.pdf) | Read directly / summarize CLI | Full text extraction | | Bookmark dump (list of URLs) | Parse each URL, resolve individually | One resolved file per URL | | Plain text / notes / ideas | Read as-is | No resolution needed |\n\n##Media Extraction\n\nEvery source with attached media MUST have that media downloaded and analyzed:\n\n**Images:** Download to raw/assets/images/ with descriptive kebab-case names Analyze the image content (diagrams, screenshots, infographics, memes, charts) Include analysis in the source summary: what the image shows, key data points, visual format Reference in the raw file frontmatter: media: [\"raw/assets/images/filename.png\"] Embed in wiki source pages: !{{raw/assets/images/filename.png}}\n\n**Videos:** Extract transcript via yt-dlp --write-auto-sub --skip-download Download thumbnail to raw/assets/images/ If short video (under 2 min), describe the visual content in the source summary Reference in raw file frontmatter: media_transcript: \"raw/assets/filename-transcript.txt\"\n\nImages often contain the actual information (diagrams, frameworks, data). A tweet saying \"here's my framework\" with an image of the framework is useless without the image. The wiki must capture the visual knowledge, not just the text.\n\nResolution updates the file in raw/ in-place, preserving the original URL in frontmatter:\n\n##Tool Dependencies\n\n| Tool | Install | Auth | |------|---------|------| | yt-dlp | brew install yt-dlp | None | | scrapling | pipx install scrapling | None | | X API | Official API (OAuth 2.0) | Bearer token + client credentials in .env (optional) | | summarize (optional) | brew install steipete/tap/summarize | None |\n\n##Source Classification (Classify After Resolution)\n\nAfter resolution, classify the content and extract accordingly:\n\n| Source Type | Extraction Focus | |------------|-----------------| | **Transcript** (YouTube, meeting) | Speaker attribution, decisions made, action items, key quotes | | **Paper/Research** | Method, findings, limitations, how it connects to existing knowledge | | **Report** | Executive summary first, key metrics, recommendations | | **Article/Blog** | Core thesis, supporting arguments, author's perspective | | **Tweet/Thread** | Core claim, context, engagement signals, author credibility | | **Reddit thread** | Original post thesis, top arguments for/against, consensus vs outliers | | **Notes/Ideas** | Key ideas, questions raised, connections to other topics |\n\nGeneric extraction misses what makes each format valuable.\n\n##Bias Check\n\nEvery concept, synthesis, and source page MUST include:\n\nThis prevents the wiki from becoming an echo chamber that agrees with every source.\n\n##Operations\n\n##INGEST\n\n1. Scan raw/ for files not yet summarized in wiki/ 2. **RESOLVE**: For each unprocessed file, detect if it contains a URL or unresolved reference. Fetch full content using the right tool and update the file in-place, preserving the original URL in frontmatter. 3. Classify each source by type (transcript, paper, report, article, tweet, reddit, notes) 4. Create source summary using type-specific extraction 5. Identify concepts, entities, and projects mentioned 6. Create new pages if concept appears in 2+ sources (stub if only 1) 7. Update existing pages - append new info, never rewrite from scratch 8. Add {{wikilinks}} to connect new content to existing pages 9. Run bias check: add counter-arguments and data gaps sections 10. Update wiki/index.md with new entries and TLDRs 11. Append to wiki/log.md with date, operation, pages touched\n\n##QUERY\n\n1. Read wiki/index.md - scan TLDRs only 2. Identify relevant pages from TLDRs (skip irrelevant ones to save tokens) 3. Read full content of relevant pages 4. Synthesize an answer with citations to specific {{wiki pages}} 5. Save the answer as wiki/outputs/{question-slug}.md with type: output 6. Update wiki/index.md and wiki/log.md\n\n##EXPLORE\n\n1. Take a topic or concept name as input 2. Read the existing wiki page for that topic (if it exists) 3. Identify gaps, thin sections, and open questions from the page's Data gaps section 4. Search for additional information using available tools (web search, scraping, etc.) 5. Expand the page with new findings, always citing sources 6. Create new source pages in wiki/sources/ for any external material found 7. Update related concept and entity pages with cross-references 8. Set confidence based on source quality and corroboration 9. Set explored: false (always - only the user validates) 10. Update wiki/index.md and wiki/log.md\n\n##LINT\n\n1. Find contradictions between pages 2. Find orphan pages (no inbound links) 3. Find broken {{wikilinks}} pointing to nothing 4. Identify missing frontmatter fields 5. Flag stale content (>6 months, no updates) 6. Suggest new articles for frequently mentioned but unlinked concepts 7. Check for duplicate concepts under different names - merge them 8. Fix automatically where possible 9. Output report to wiki/outputs/lint-report-{date}.md\n\n##COMPILE (rebuild indexes)\n\n1. Scan all wiki pages 2. Regenerate wiki/index.md with current page list and TLDRs 3. Verify all {{wikilinks}} resolve to existing pages 4. Create stubs for any unresolved links\n\n##Page Creation Threshold\n\n**Full page**: subject appears in 2+ sources **Stub page**: single mention (frontmatter + one-line definition + source link) **Never** leave a {{wikilink}} pointing to nothing\n\n##Quality Standards\n\nSource summaries: 200-500 words, synthesize - don't copy Concept articles: 500-1500 words with clear lead section Always trace claims to specific source pages Flag contradictions with a warning note, stating both positions Prefer recency when sources conflict Only make connections explicitly supported by source material Use {{wikilinks}} for all internal cross-references Link only the first occurrence of a concept per section Bold key terms on first use in each article No em dashes - use regular dashes or commas All filenames: kebab-case, lowercase Source summaries: {author-or-source}-{year}-{short-title}.md\n\n##External Integrations\n\n**Git**: Version control for the vault. Every change is reversible. **Obsidian**: Browse and read the wiki. Graph view for connections. Dataview for queries. **Obsidian Web Clipper**: Save location set to raw/clippings/. Clip anything - tweets, articles, Reddit, YouTube, GitHub. During INGEST Phase 0, files get sorted to the correct raw/ subfolder based on source URL, then removed from clippings/.\n\n##Scale Plan\n\n| Pages | Strategy | |-------|----------| | 0-300 | File-based, index.md TLDR scanning. Current approach. | | 300-500 | Add qmd - local markdown search with hybrid BM25/vector + LLM re-ranking. CLI and MCP server. | | 500+ | Consider structured DB (PostgreSQL/Supabase). |","href":"claude.html","type":"Concept"}};

<script type="module">
import { prepareWithSegments, layoutWithLines, layoutNextLine } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.4/+esm';

(function () {
  // ── Theme palette — reads CSS variables so light/dark mode works automatically ──
  var cs = getComputedStyle(document.documentElement);
  function cssVar(name) { return cs.getPropertyValue(name).trim(); }
  var DG = {
    bg:           cssVar('--dg-bg'),
    surface:      cssVar('--dg-surface'),
    border:       cssVar('--dg-border'),
    borderGlow:   cssVar('--dg-border-glow'),
    text:         cssVar('--dg-text'),
    textDim:      cssVar('--dg-text-dim'),
    textGhost:    cssVar('--dg-text-ghost'),
    maroon:       cssVar('--dg-maroon'),
    maroonBright: cssVar('--dg-maroon-bright'),
    teal:         cssVar('--dg-teal'),
    tealDim:      cssVar('--dg-teal-dim'),
    gold:         cssVar('--dg-gold'),
    goldBright:   cssVar('--dg-gold-bright'),
    cream:        cssVar('--dg-cream'),
  };

  // ── Category colors — read from CSS variables ──
  var COLORS = {
    question:   cssVar('--dg-cat-question'),
    concept:    cssVar('--dg-cat-concept'),
    entity:     cssVar('--dg-cat-entity'),
    source:     cssVar('--dg-cat-source'),
    special:    cssVar('--dg-cat-special')
  };
  var CATEGORY_LABELS = {
    question:   "Open Questions",
    concept:    "Concepts",
    entity:     "Entities",
    source:     "Sources",
    special:    "Meta",
  };
  var BRACKETS = {
    question:   ["<", ">"],
    concept:    ["(", ")"],
    entity:     ["[", "]"],
    source:     ["[", "]"],
    special:    ["{", "}"],
  };

  // ── State ──
  var nodes = [];
  var edges = [];
  var nodeById = {};
  var neighbors = {};
  var edgeWeights = {};
  var previews = null;
  var hoverId = null;
  var hoverNode = null;
  var searchHighlightId = null;
  var selectedNodeId = null;
  var activeCategories = new Set(Object.keys(COLORS));
  var hiddenNodes = new Set();
  var stackPanels = [];  // [{nodeId, el}]
  var pretextCache = {};
  var pulsePhase = 0;    // for animated glow
  var animFrameId = null;

  // ── Canvas + transform ──
  var canvas = document.getElementById("map-canvas");
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var W, H;

  var panX = 0, panY = 0, zoom = 1;
  var targetZoom = 1, targetPanX = 0, targetPanY = 0;
  var animating = false;
  var dragging = false, didDrag = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

  // ── Layout constants ──
  var CELL_W = 200;
  var CELL_H = 80;
  var FONT_SIZE = 13;
  var PREVIEW_FONT_SIZE = 11;
  var PREVIEW_LINE_HEIGHT = 15;
  var ZOOM_PREVIEW_THRESHOLD = 2.0;
  var ZOOM_EDITORIAL_THRESHOLD = 4.0;
  var PREVIEW_MAX_H = 50;  // max extra height for preview text (keeps boxes from overlapping)
  var MONO = "'JetBrains Mono', monospace";
  var SERIF = "'Source Serif 4', Georgia, serif";

  // ── Editorial mode state ──
  var editorialNodeId = null;       // which node is in editorial mode
  var editorialFade = 0;            // 0..1 transition progress
  var editorialFadeTarget = 0;
  var editorialFadeStart = 0;
  var editorialFadeStartTime = 0;
  var EDITORIAL_FADE_DURATION = 500;
  var editorialLayoutCache = {};    // cached editorial layouts per node
  var forceEditorial = false;       // set by dblclick to enter editorial without zoom animation
  var editorialScrollY = 0;         // scroll offset within the editorial card (pixels)

  // ── Draggable pull-quote state (single-column editorial mode) ──
  // Quote position is stored in COLUMN-LOCAL coordinates: x=0 is left of the body column,
  // y=0 is the TOP of the body (right after title/separator). This lets us re-use the
  // same position across scroll, resize, and fade animation.
  var editorialQuoteX = 0;
  var editorialQuoteY = 0;
  var editorialQuoteInitialized = false; // per-node, set when layout first computed
  var editorialDraggingQuote = false;
  var editorialDragHoverQuote = false;
  var editorialDragOffsetX = 0;
  var editorialDragOffsetY = 0;
  var editorialDragSkipFrame = false; // throttle to ~30fps during drag if needed

  function hexRgb(hex) {
    var h = hex.replace("#", "");
    return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };
  }
  var RGB = {};
  for (var k in COLORS) RGB[k] = hexRgb(COLORS[k]);

  function rgba(cat, a) {
    var c = RGB[cat] || { r: 150, g: 150, b: 150 };
    return "rgba(" + c.r + "," + c.g + "," + c.b + "," + a + ")";
  }

  function tealRgba(a) {
    var c = hexRgb(DG.teal);
    return "rgba(" + c.r + "," + c.g + "," + c.b + "," + a + ")";
  }

  // ── Escape ──
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function truncateAtParagraph(text, maxLen) {
    if (!text || text.length <= maxLen) return text;
    // Try to cut at a paragraph break
    var cut = text.indexOf('\n\n');
    if (cut > 0 && cut <= maxLen) return text.slice(0, cut);
    // Otherwise cut at last sentence end before maxLen
    var trimmed = text.slice(0, maxLen);
    var lastDot = trimmed.lastIndexOf('. ');
    if (lastDot > maxLen * 0.4) return trimmed.slice(0, lastDot + 1);
    return trimmed + '…';
  }

  function formatLead(text) {
    if (!text) return '<p>No preview available.</p>';
    return text.split(/\n\n+/).map(function(p) {
      p = p.trim();
      return p ? '<p>' + escapeHtml(p) + '</p>' : '';
    }).join('');
  }

  function formatRich(text) {
    if (!text) return '<p>No preview available.</p>';
    return text.split(/\n\n+/).map(function(para) {
      para = para.trim();
      if (!para) return '';
      // Headers: ## Title -> <h3>. Match both "## Title" (with space) and
      // "##Title" (no space) — build.py's rich_text() strips the space when
      // it emits "##Heading" so the editorial canvas renderer can detect
      // headers via /^##/, and this HTML panel path has to accept the same.
      if (/^##/.test(para)) {
        var headerText = para.replace(/^##\s*/, '');
        return '<h3>' + escapeHtml(headerText) + '</h3>';
      }
      // Escape HTML first, then apply markup conversions
      var safe = escapeHtml(para);
      // Bold: **text** -> <strong>
      safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Italic: *text* -> <em> (but not inside already-processed strong tags)
      safe = safe.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // Wikilinks: {{slug}} -> teal link
      safe = safe.replace(/\{\{([^}]+)\}\}/g, function(_, slug) {
        var display = slug.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        return '<a href="' + slug + '.html" style="color:var(--dg-teal)">' + display + '</a>';
      });
      // Citation references: ([[slug]]) -> dimmed cite
      safe = safe.replace(/\(\[\[([^\]]+)\]\]\)/g, function(_, slug) {
        return '<cite style="color:var(--dg-text-dim)">(' + escapeHtml(slug) + ')</cite>';
      });
      return '<p>' + safe + '</p>';
    }).join('');
  }

  // ── Tooltip ──
  var tooltip = document.getElementById("map-tooltip");
  function showTooltip(node, screenX, screenY) {
    if (!previews) return;
    var p = previews[node.id];
    if (!p) return;
    var cat = node.category;
    var color = COLORS[cat] || "#baa997";
    tooltip.innerHTML =
      '<div class="tip-type" style="color:' + color + '">' + escapeHtml(CATEGORY_LABELS[cat] || cat) + '</div>' +
      '<div class="tip-title">' + escapeHtml(p.title || node.label) + '</div>' +
      '<p class="tip-lead">' + escapeHtml(truncateAtParagraph(p.lead || "", 250)) + '</p>';
    var tw = 22 * 16, margin = 16;
    var left = screenX + 16, top = screenY - 10;
    if (left + tw > window.innerWidth - margin) left = screenX - tw - 16;
    if (left < margin) left = margin;
    if (top < margin) top = margin;
    if (top + 200 > window.innerHeight) top = window.innerHeight - 220;
    tooltip.style.left = left + "px";
    tooltip.style.top = top + "px";
    tooltip.classList.add("visible");
  }
  function hideTooltip() { tooltip.classList.remove("visible"); }

  // ── Transforms ──
  function worldToScreen(wx, wy) { return [wx * zoom + panX, wy * zoom + panY]; }
  function screenToWorld(sx, sy) { return [(sx - panX) / zoom, (sy - panY) / zoom]; }

  // ── Smooth animation ──
  function animateTo(tz, tpx, tpy, duration) {
    targetZoom = tz; targetPanX = tpx; targetPanY = tpy;
    if (animating) return;
    animating = true;
    var sz = zoom, spx = panX, spy = panY, st = performance.now();
    duration = duration || 300;
    function ease(t) { return 1 - Math.pow(1 - t, 3); }
    function step(now) {
      var t = Math.min(1, (now - st) / duration);
      var e = ease(t);
      zoom = sz + (targetZoom - sz) * e;
      panX = spx + (targetPanX - spx) * e;
      panY = spy + (targetPanY - spy) * e;
      scheduleRedraw();
      if (t < 1) requestAnimationFrame(step);
      else { zoom = targetZoom; panX = targetPanX; panY = targetPanY; animating = false; scheduleRedraw(); }
    }
    requestAnimationFrame(step);
  }

  function zoomToNode(node, tz) {
    tz = tz || 2.5;
    animateTo(tz, W / 2 - node._wx * tz, H / 2 - node._wy * tz, 400);
  }
  function panToNode(node) {
    animateTo(zoom, W / 2 - node._wx * zoom, H / 2 - node._wy * zoom, 300);
  }

  // ── Hit testing ──
  function nodeAt(sx, sy) {
    var w = screenToWorld(sx, sy), wx = w[0], wy = w[1];
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (hiddenNodes.has(n.id)) continue;
      var hw = n._boxW / 2, hh = n._boxH / 2;
      if (wx >= n._wx - hw && wx <= n._wx + hw && wy >= n._wy - hh && wy <= n._wy + hh) return n;
    }
    return null;
  }

  // ── Pretext preview layout ──
  function getPreviewLayout(node) {
    if (pretextCache[node.id]) return pretextCache[node.id];
    if (!previews || !previews[node.id]) return null;
    var text = previews[node.id].lead || "";
    if (!text) return null;
    if (text.length > 200) text = text.substring(0, 197) + "\u2026";
    var maxW = node._boxW - 16;
    if (maxW < 60) maxW = 60;
    try {
      var font = PREVIEW_FONT_SIZE + "px " + SERIF;
      var prepared = prepareWithSegments(text, font);
      var result = layoutWithLines(prepared, maxW, PREVIEW_LINE_HEIGHT);
      var lines = result.lines.slice(0, 5);
      pretextCache[node.id] = { lines: lines, totalH: lines.length * PREVIEW_LINE_HEIGHT, maxWidth: maxW };
      return pretextCache[node.id];
    } catch (e) {
      return fallbackLayout(node, text, maxW);
    }
  }

  function fallbackLayout(node, text, maxW) {
    ctx.font = PREVIEW_FONT_SIZE + "px " + SERIF;
    var words = text.split(/\s+/), lines = [], cur = "";
    for (var i = 0; i < words.length && lines.length < 5; i++) {
      var test = cur ? cur + " " + words[i] : words[i];
      if (ctx.measureText(test).width > maxW && cur) {
        lines.push({ text: cur, width: ctx.measureText(cur).width });
        cur = words[i];
      } else cur = test;
    }
    if (cur && lines.length < 5) lines.push({ text: cur, width: ctx.measureText(cur).width });
    pretextCache[node.id] = { lines: lines, totalH: lines.length * PREVIEW_LINE_HEIGHT, maxWidth: maxW };
    return pretextCache[node.id];
  }

  // ── Editorial layout — adaptive card that sizes to content ──
  // Produces a layout object with all text pre-measured. The card dimensions
  // are computed FROM content, not forced to viewport size.
  var editorialRevealStart = 0; // timestamp for line-by-line reveal
  var editorialRevealedNodeId = null; // prevent re-animating same node

  function getEditorialLayout(nodeId) {
    var cacheKey = nodeId + "|adaptive";
    if (editorialLayoutCache[cacheKey]) return editorialLayoutCache[cacheKey];
    if (!previews || !previews[nodeId]) return null;
    var p = previews[nodeId];
    var text = p.rich || p.lead || "";
    if (!text) return null;

    // ── Typography constants (screen pixels) ──
    var titleFontSize = 32;
    var catFontSize = 11;
    var bodyFontSize = 17;

      // Runs for BOTH single-column and two-column modes. The quote position is in
      // card-local coords: single-col x is relative to startX, two-col x is relative

        // padding band (not the text band) and sit at low alpha as ornaments. Using
        // a modest size tied to the line-height (not the box height) keeps them

        ctx.textAlign = "left";

      alpha = Math.min(0.35, alpha * (1 + (weight - 1) * 0.5));
      ctx.strokeStyle = tealRgba(alpha);
      ctx.lineWidth = ((dist <= 2 ? 1.0 : 0.6) * (1 + (weight - 1) * 0.6)) / zoom;
      drawEdge(ctx, sn, tn, weight);
    }

    // Highlighted edges with glow
    for (var i = 0; i < highE.length; i++) {
      var e = highE[i], weight = getEdgeWeight(e.source, e.target);
      var sn = nodeById[e.source], tn = nodeById[e.target];
      var pulse = 0.6 + 0.2 * Math.sin(pulsePhase);

      // Glow layer
      ctx.strokeStyle = DG.tealDim;
      ctx.lineWidth = (5 + (weight - 1) * 2) / zoom;
      drawEdge(ctx, sn, tn, weight);

      // Main line
      ctx.strokeStyle = DG.teal;
      ctx.lineWidth = (1.5 + (weight - 1) * 0.8) / zoom;
      drawEdge(ctx, sn, tn, weight);
    }

    // ── Nodes ──
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id)) drawNode(ctx, nodes[i], showPreviews, effectiveHoverId);
    }

    // ── Reset alpha after dungeon elements ──
    if (inEditorial) ctx.globalAlpha = 1;

    // ── Editorial reading surface (drawn over dungeon) ──
    if (inEditorial) {
      drawEditorial(ctx);
    }

    ctx.restore();

    // Request continuous redraw when hovering (for pulse animation)
    if (effectiveHoverId) requestAnimationFrame(function() { scheduleRedraw(); });
  }

  function drawGrid(ctx) {
    // Subtle dot grid for orientation
    if (zoom < 0.4) return;
    var step = 200;
    var tl = screenToWorld(0, 0), br = screenToWorld(W, H);
    var startX = Math.floor(tl[0] / step) * step;
    var startY = Math.floor(tl[1] / step) * step;
    ctx.fillStyle = "rgba(42, 74, 80, 0.12)";
    for (var x = startX; x < br[0]; x += step) {
      for (var y = startY; y < br[1]; y += step) {
        ctx.fillRect(x - 0.5, y - 0.5, 1, 1);
      }
    }
  }

  function drawEdge(ctx, sn, tn, weight) {
    var dx = tn._wx - sn._wx, dy = tn._wy - sn._wy;
    var sHW = sn._boxW / 2, tHW = tn._boxW / 2, sHH = sn._boxH / 2, tHH = tn._boxH / 2;
    if (weight >= 2) ctx.setLineDash([]);
    else ctx.setLineDash([4 / zoom, 3 / zoom]);

    if (sn.row === tn.row) {
      var fx = dx > 0 ? sn._wx + sHW : sn._wx - sHW;
      var tx = dx > 0 ? tn._wx - tHW : tn._wx + tHW;
      ctx.beginPath(); ctx.moveTo(fx, sn._wy); ctx.lineTo(tx, tn._wy); ctx.stroke();
    } else if (sn.col === tn.col) {
      var fy = dy > 0 ? sn._wy + sHH : sn._wy - sHH;
      var ty = dy > 0 ? tn._wy - tHH : tn._wy + tHH;
      ctx.beginPath(); ctx.moveTo(sn._wx, fy); ctx.lineTo(tn._wx, ty); ctx.stroke();
    } else {
      var fy = dy > 0 ? sn._wy + sHH : sn._wy - sHH;
      var tx = dx > 0 ? tn._wx - tHW : tn._wx + tHW;
      ctx.beginPath(); ctx.moveTo(sn._wx, fy); ctx.lineTo(sn._wx, tn._wy); ctx.lineTo(tx, tn._wy); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawNode(ctx, node, showPreviews, effectiveHoverId) {
    var cat = node.category;
    var color = COLORS[cat] || "#baa997";
    var brk = BRACKETS[cat] || ["[", "]"];
    var label = brk[0] + " " + node.label + " " + brk[1];
    var focused = !effectiveHoverId || effectiveHoverId === node.id || (neighbors[effectiveHoverId] && neighbors[effectiveHoverId][node.id]);
    var isHovered = hoverId === node.id;
    var isSearchMatch = searchHighlightId === node.id;
    var isSelected = selectedNodeId === node.id;

    var wx = node._wx, wy = node._wy;
    var hw = node._boxW / 2, hh = node._boxH / 2;
    var pulse = 0.7 + 0.3 * Math.sin(pulsePhase);
    var r = 2;

    // ── Glow effect for hovered/selected nodes ──
    if ((isHovered || isSelected) && focused) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 16 / zoom;
      ctx.fillStyle = "rgba(0,0,0,0)";
      roundRect(ctx, wx - hw - 2, wy - hh - 2, node._boxW + 4, node._boxH + 4, r + 1);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Pulsing glow for connected neighbors when hovering
    if (effectiveHoverId && effectiveHoverId !== node.id && focused && (neighbors[effectiveHoverId] && neighbors[effectiveHoverId][node.id])) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = (8 * pulse) / zoom;
      ctx.fillStyle = "rgba(0,0,0,0)";
      roundRect(ctx, wx - hw - 1, wy - hh - 1, node._boxW + 2, node._boxH + 2, r);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Box background
    if (isHovered || isSearchMatch || isSelected) {
      ctx.fillStyle = DG.surface;
    } else {
      ctx.fillStyle = focused ? DG.surface : DG.bg;
    }
    roundRect(ctx, wx - hw, wy - hh, node._boxW, node._boxH, r);
    ctx.fill();

    // Border
    var bAlpha = focused ? 0.6 : 0.08;
    if (isSelected) { ctx.strokeStyle = DG.gold; ctx.lineWidth = 2 / zoom; }
    else if (isHovered || isSearchMatch) { ctx.strokeStyle = rgba(cat, 0.8); ctx.lineWidth = 1.5 / zoom; }
    else { ctx.strokeStyle = rgba(cat, bAlpha); ctx.lineWidth = 1 / zoom; }
    roundRect(ctx, wx - hw, wy - hh, node._boxW, node._boxH, r);
    ctx.stroke();

    // Label
    ctx.font = ((isHovered || isSelected) ? "600 " : "500 ") + FONT_SIZE + "px " + MONO;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    var bracketColor = focused ? rgba(cat, 0.7) : rgba(cat, 0.1);
    var textColor = focused ? DG.cream : DG.textGhost;
    if (isHovered || isSelected) textColor = DG.gold;

    var bracketL = brk[0] + " ", bracketR = " " + brk[1];
    var fullW = ctx.measureText(label).width;
    var blW = ctx.measureText(bracketL).width;
    var innerW = ctx.measureText(node.label).width;
    var labelY = showPreviews ? wy - hh + (node._baseBoxH / 2) : wy;
    var startX = wx - fullW / 2;

    ctx.textAlign = "left";
    ctx.fillStyle = bracketColor;
    ctx.fillText(bracketL, startX, labelY);
    ctx.fillStyle = textColor;
    ctx.fillText(node.label, startX + blW, labelY);
    ctx.fillStyle = bracketColor;
    ctx.fillText(bracketR, startX + blW + innerW, labelY);

    // Semantic zoom preview
    if (showPreviews && focused) {
      var pv = getPreviewLayout(node);
      if (pv && pv.lines.length > 0) {
        ctx.save();
        roundRect(ctx, wx - hw, wy - hh, node._boxW, node._boxH, r);
        ctx.clip();

        // Separator
        ctx.strokeStyle = rgba(cat, 0.15);
        ctx.lineWidth = 0.5 / zoom;
        ctx.beginPath();
        ctx.moveTo(wx - hw + 6, wy - hh + node._baseBoxH);
        ctx.lineTo(wx + hw - 6, wy - hh + node._baseBoxH);
        ctx.stroke();

        ctx.font = PREVIEW_FONT_SIZE + "px " + SERIF;
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillStyle = focused ? "rgba(250, 240, 230, 0.55)" : "rgba(250, 240, 230, 0.08)";
        var sy = wy - hh + node._baseBoxH + 2, sx = wx - hw + 8;
        for (var li = 0; li < pv.lines.length; li++) {
          ctx.fillText(pv.lines[li].text, sx, sy + li * PREVIEW_LINE_HEIGHT);
        }

        // Fade gradient at bottom
        var fadeH = 20;
        var fadeY = wy + hh - fadeH;
        var fadeGrad = ctx.createLinearGradient(0, fadeY, 0, wy + hh);
        fadeGrad.addColorStop(0, "rgba(19, 32, 36, 0)");
        fadeGrad.addColorStop(1, "rgba(19, 32, 36, 1)");
        ctx.fillStyle = fadeGrad;
        ctx.fillRect(wx - hw, fadeY, node._boxW, fadeH);

        ctx.restore();
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── Layout ──
  function layoutNodes() {
    ctx.font = "500 " + FONT_SIZE + "px " + MONO;
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i], brk = BRACKETS[n.category] || ["[", "]"];
      var label = brk[0] + " " + n.label + " " + brk[1];
      var tw;
      try {
        var prepared = prepareWithSegments(label, "500 " + FONT_SIZE + "px " + MONO);
        var result = layoutWithLines(prepared, 9999, FONT_SIZE + 4);
        tw = result.lines.length > 0 ? result.lines[0].width : ctx.measureText(label).width;
      } catch (e) { tw = ctx.measureText(label).width; }
      n._boxW = tw + 16;
      n._baseBoxH = FONT_SIZE + 16;
      n._boxH = n._baseBoxH;
      n._wx = n.col * CELL_W;
      n._wy = n.row * CELL_H;
    }
    pretextCache = {};
  }

  function centerView() {
    if (!nodes.length) return;
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (hiddenNodes.has(n.id)) continue;
      minX = Math.min(minX, n._wx - n._boxW / 2);
      maxX = Math.max(maxX, n._wx + n._boxW / 2);
      minY = Math.min(minY, n._wy - n._boxH / 2);
      maxY = Math.max(maxY, n._wy + n._boxH / 2);
    }
    if (minX === Infinity) return;
    var cw = maxX - minX, ch = maxY - minY, pad = 80;
    zoom = Math.min((W - pad * 2) / cw, (H - pad * 2) / ch, 1.5);
    zoom = Math.max(zoom, 0.15);
    panX = W / 2 - (minX + cw / 2) * zoom;
    panY = H / 2 - (minY + ch / 2) * zoom;
  }

  function resize() {
    // Map root starts at top of viewport (no masthead)
    canvas.parentElement.style.top = "0px";
    var rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
  }

  // ── Mini-map ──
  var mmCvs = document.getElementById("minimap-canvas");
  var mmCtx = mmCvs.getContext("2d");
  var MM_W = 160, MM_H = 100;
  var mmTransform = { minX: 0, minY: 0, scale: 1, pad: 12 };

  function setupMinimap() {
    mmCvs.width = MM_W * dpr; mmCvs.height = MM_H * dpr;
    mmCvs.style.width = MM_W + "px"; mmCvs.style.height = MM_H + "px";
  }

  function drawMinimap() {
    if (!nodes.length) return;
    mmCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    mmCtx.clearRect(0, 0, MM_W, MM_H);
    mmCtx.fillStyle = DG.surface;
    mmCtx.fillRect(0, 0, MM_W, MM_H);

    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (var i = 0; i < nodes.length; i++) {
      minX = Math.min(minX, nodes[i]._wx); maxX = Math.max(maxX, nodes[i]._wx);
      minY = Math.min(minY, nodes[i]._wy); maxY = Math.max(maxY, nodes[i]._wy);
    }
    if (minX === Infinity) return;
    var pad = 12, cw = maxX - minX || 1, ch = maxY - minY || 1;
    var scale = Math.min((MM_W - pad * 2) / cw, (MM_H - pad * 2) / ch);
    mmTransform.minX = minX; mmTransform.minY = minY; mmTransform.scale = scale; mmTransform.pad = pad;
    function mx(wx) { return pad + (wx - minX) * scale; }
    function my(wy) { return pad + (wy - minY) * scale; }

    // Edges
    mmCtx.strokeStyle = "rgba(42, 157, 143, 0.1)";
    mmCtx.lineWidth = 0.5;
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      if (hiddenNodes.has(e.source) || hiddenNodes.has(e.target)) continue;
      var sn = nodeById[e.source], tn = nodeById[e.target];
      if (!sn || !tn) continue;
      mmCtx.beginPath(); mmCtx.moveTo(mx(sn._wx), my(sn._wy));
      mmCtx.lineTo(mx(tn._wx), my(tn._wy)); mmCtx.stroke();
    }

    // Nodes
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (hiddenNodes.has(n.id)) continue;
      mmCtx.fillStyle = COLORS[n.category] || "#baa997";
      mmCtx.globalAlpha = (hoverId === n.id || selectedNodeId === n.id) ? 1 : 0.6;
      mmCtx.fillRect(mx(n._wx) - 1.5, my(n._wy) - 1.5, 3, 3);
    }
    mmCtx.globalAlpha = 1;

    // Viewport
    var tl = screenToWorld(0, 0), br = screenToWorld(W, H);
    mmCtx.strokeStyle = DG.gold;
    mmCtx.lineWidth = 1;
    mmCtx.strokeRect(mx(tl[0]), my(tl[1]), mx(br[0]) - mx(tl[0]), my(br[1]) - my(tl[1]));
  }

  // ── Minimap interaction ──
  var mmDragging = false;

  function minimapToWorld(mmX, mmY) {
    var t = mmTransform;
    var worldX = (mmX - t.pad) / t.scale + t.minX;
    var worldY = (mmY - t.pad) / t.scale + t.minY;
    return [worldX, worldY];
  }

  function panFromMinimap(e) {
    var rect = mmCvs.getBoundingClientRect();
    var mmX = (e.clientX - rect.left) * (MM_W / rect.width);
    var mmY = (e.clientY - rect.top) * (MM_H / rect.height);
    var world = minimapToWorld(mmX, mmY);
    panX = W / 2 - world[0] * zoom;
    panY = H / 2 - world[1] * zoom;
    scheduleRedraw();
  }

  mmCvs.addEventListener("mousedown", function(e) {
    e.preventDefault();
    e.stopPropagation();
    mmDragging = true;
    panFromMinimap(e);
  });

  window.addEventListener("mousemove", function(e) {
    if (!mmDragging) return;
    e.preventDefault();
    panFromMinimap(e);
  });

  window.addEventListener("mouseup", function(e) {
    if (mmDragging) {
      mmDragging = false;
      e.stopPropagation();
    }
  });

  // ── HUD ──
  var hud = document.getElementById("map-hud");
  var hudZoomEl = document.getElementById("hud-zoom");

  function updateHud(node) {
    if (!node || hiddenNodes.has(node.id)) {
      hud.classList.add("empty");
      hud.innerHTML = '<span class="hud-label">explore the map</span><span class="hud-zoom" id="hud-zoom">' + zoom.toFixed(1) + 'x</span>';
      hudZoomEl = document.getElementById("hud-zoom");
      return;
    }
    hud.classList.remove("empty");
    var cat = node.category;
    var color = COLORS[cat] || "#baa997";
    var brk = BRACKETS[cat] || ["[", "]"];
    var catLabel = CATEGORY_LABELS[cat] || cat;

    // Get top neighbors by val
    var nids = neighbors[node.id] || {};
    var neighborNodes = [];
    for (var nid in nids) {
      if (!hiddenNodes.has(nid)) neighborNodes.push(nodeById[nid]);
    }
    neighborNodes.sort(function(a, b) { return (b.val || 0) - (a.val || 0); });
    neighborNodes = neighborNodes.slice(0, 5);

    var html = '<span class="hud-node" style="color:' + color + '">' +
      escapeHtml(brk[0] + " " + node.label + " " + brk[1]) + '</span>' +
      '<span class="hud-sep">\u2192</span>' +
      '<span class="hud-cat" style="color:' + color + '">' + escapeHtml(catLabel) + '</span>';

    if (neighborNodes.length > 0) {
      html += '<span class="hud-sep">\u2502</span><span class="hud-label">linked:</span>';
      html += '<span class="hud-neighbors">';
      for (var i = 0; i < neighborNodes.length; i++) {
        var nn = neighborNodes[i];
        var nbrk = BRACKETS[nn.category] || ["[", "]"];
        var ncolor = COLORS[nn.category] || "#baa997";
        html += '<span class="hud-neighbor" style="color:' + ncolor + '">' +
          escapeHtml(nbrk[0] + nn.label + nbrk[1]) + '</span>';
      }
      html += '</span>';
    }
    html += '<span class="hud-zoom" id="hud-zoom">' + zoom.toFixed(1) + 'x</span>';
    hud.innerHTML = html;
    hudZoomEl = document.getElementById("hud-zoom");
  }

  function updateHudZoom() {
    if (hudZoomEl) hudZoomEl.textContent = zoom.toFixed(1) + "x";
    var zlLabel = document.getElementById("zoom-level-label");
    if (zlLabel) zlLabel.textContent = zoom.toFixed(1) + "x";
  }

  // ── Stacking panels ──
  var panelOverlay = document.getElementById("panel-overlay");

  function openPanel(nodeId) {
    var p = previews && previews[nodeId];
    var node = nodeById[nodeId];
    if (!node) return;

    // Don't open duplicate
    for (var i = 0; i < stackPanels.length; i++) {
      if (stackPanels[i].nodeId === nodeId) return;
    }

    // Mark previous panels as stacked
    for (var i = 0; i < stackPanels.length; i++) {
      stackPanels[i].el.classList.add("stacked");
    }

    // Max 2 panels
    if (stackPanels.length >= 2) {
      var oldest = stackPanels.shift();
      oldest.el.remove();
    }

    var cat = node.category;
    var color = COLORS[cat] || "#baa997";
    var catLabel = CATEGORY_LABELS[cat] || cat;

    var panel = document.createElement("div");
    panel.className = "stack-panel";
    panel.innerHTML =
      '<div class="panel-header">' +
        '<button class="panel-close" data-nid="' + nodeId + '">\u00D7</button>' +
        '<div class="panel-cat" style="color:' + color + '">' + escapeHtml(catLabel) + '</div>' +
        '<h3 class="panel-title">' + escapeHtml(p ? p.title : node.label) + '</h3>' +
      '</div>' +
      '<div class="panel-body">' + (p && p.rich ? formatRich(p.rich) : formatLead(p ? p.lead : "")) + '</div>' +
      '<div class="panel-nav"><a href="' + (node.href || "#") + '">Open full page</a></div>';

    panelOverlay.appendChild(panel);
    // Trigger reflow then animate in
    panel.offsetHeight;
    panel.classList.add("visible");

    // Close handler
    panel.querySelector(".panel-close").addEventListener("click", function() {
      closePanel(nodeId);
    });

    stackPanels.push({ nodeId: nodeId, el: panel });
    repositionUI();
  }

  function repositionUI() {
    var hasPanel = stackPanels.length > 0;
    var legendEl = document.querySelector(".map-legend");
    var minimapEl = document.querySelector(".map-minimap");
    // Calculate total panel width so we can tuck legend/minimap just left of panels
    var panelWidth = 0;
    if (hasPanel) {
      panelWidth = 380; // first panel
      if (stackPanels.length > 1) panelWidth += (stackPanels.length - 1) * 340; // stacked panels overlap by 20px
    }
    var rightOffset = hasPanel ? (panelWidth + 18) + "px" : "18px";
    if (legendEl) {
      legendEl.style.right = rightOffset;
      legendEl.style.left = "auto";
    }
    if (minimapEl) {
      minimapEl.style.right = rightOffset;
      minimapEl.style.left = "auto";
    }
  }

  function closePanel(nodeId) {
    for (var i = stackPanels.length - 1; i >= 0; i--) {
      if (stackPanels[i].nodeId === nodeId) {
        stackPanels[i].el.classList.remove("visible");
        var el = stackPanels[i].el;
        setTimeout(function() { el.remove(); }, 300);
        stackPanels.splice(i, 1);
        break;
      }
    }
    // Unstack the last remaining panel
    if (stackPanels.length > 0) {
      stackPanels[stackPanels.length - 1].el.classList.remove("stacked");
    }
    repositionUI();
  }

  function closeAllPanels() {
    for (var i = 0; i < stackPanels.length; i++) {
      stackPanels[i].el.classList.remove("visible");
      var el = stackPanels[i].el;
      setTimeout(function() { el.remove(); }, 300);
    }
    stackPanels = [];
    repositionUI();
  }

  // Close panels when clicking on canvas background
  canvas.addEventListener("mousedown", function(e) {
    // Will be handled in click if not drag
  });

  // ── Filter ──
  function applyFilter() {
    hiddenNodes.clear();
    for (var i = 0; i < nodes.length; i++) {
      if (!activeCategories.has(nodes[i].category)) hiddenNodes.add(nodes[i].id);
    }
    if (hoverId && hiddenNodes.has(hoverId)) { hoverId = null; hoverNode = null; hideTooltip(); }
    if (selectedNodeId && hiddenNodes.has(selectedNodeId)) selectedNodeId = null;
    if (searchHighlightId && hiddenNodes.has(searchHighlightId)) searchHighlightId = null;
    scheduleRedraw();
    updateStats();
  }

  function updateStats() {
    var vn = nodes.filter(function(n) { return !hiddenNodes.has(n.id); });
    var ve = edges.filter(function(e) { return !hiddenNodes.has(e.source) && !hiddenNodes.has(e.target); });
    document.getElementById("map-stats").innerHTML =
      '<strong>' + vn.length + '</strong> rooms &middot; <strong>' + ve.length + '</strong> connections';
  }

  // ── Search ──
  var searchInput = document.getElementById("search-input");

  function findNode(q) {
    if (!q) return null;
    q = q.toLowerCase().trim();
    if (!q) return null;
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id) && nodes[i].id === q) return nodes[i];
    }
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id) && nodes[i].label.toLowerCase().startsWith(q)) return nodes[i];
    }
    for (var i = 0; i < nodes.length; i++) {
      if (!hiddenNodes.has(nodes[i].id) && nodes[i].label.toLowerCase().indexOf(q) !== -1) return nodes[i];
    }
    if (previews) {
      for (var i = 0; i < nodes.length; i++) {
        var p = previews[nodes[i].id];
        if (p && !hiddenNodes.has(nodes[i].id) && p.title && p.title.toLowerCase().indexOf(q) !== -1) return nodes[i];
      }
    }
    return null;
  }

  if (searchInput) {
    searchInput.addEventListener("input", function() {
      var q = searchInput.value;
      if (!q || !q.trim()) { searchHighlightId = null; scheduleRedraw(); return; }
      var match = findNode(q);
      if (match) { searchHighlightId = match.id; updateHud(match); panToNode(match); }
      else { searchHighlightId = null; scheduleRedraw(); }
    });
    searchInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && searchHighlightId) {
        var node = nodeById[searchHighlightId];

  // ── Mouse events ──
  // Hit-test the live editorial pull quote in screen coordinates. Returns true if
  // the point lies inside the floating quote block (including its drag hit-padding).
  function quoteAt(sx, sy) {
    if (editorialFade < 0.5 || !editorialNodeId) return false;
    var lay = getEditorialLayout(editorialNodeId);
    if (!lay || !lay.draggableQuote) return false;
    if (typeof lay._quoteScreenX !== "number") return false;
    var pad = 8;
    return sx >= lay._quoteScreenX - pad &&
           sx <= lay._quoteScreenX + lay._quoteScreenW + pad &&
           sy >= lay._quoteScreenY - pad &&
           sy <= lay._quoteScreenY + lay._quoteScreenH + pad;
  }

  // Hit-test wikilink words inside the current editorial card. Link hitboxes are
  // populated every frame by drawStyledJustifiedLine, so they match the visible
  // text exactly — including across justified lines and exclusion-zone fragments.
  function linkAt(sx, sy) {
    if (editorialFade < 0.5 || !editorialNodeId) return null;
    var lay = getEditorialLayout(editorialNodeId);
    if (!lay || !lay._linkHitboxes) return null;
    for (var i = 0; i < lay._linkHitboxes.length; i++) {
      var h = lay._linkHitboxes[i];
      if (sx >= h.x && sx <= h.x + h.w && sy >= h.y && sy <= h.y + h.h) {
        return h;
      }
    }
    return null;
  }

      editorialNodeId = null;

      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;
      editorialFadeStartTime = performance.now();
      for (var ni = 0; ni < nodes.length; ni++) nodes[ni]._hasPill = false;
      if (searchInput) searchInput.value = "";
      closeAllPanels();
      updateHud(null);
      scheduleRedraw();
      return;
    }
    if (e.key === "Enter" && selectedNodeId) {
      var node = nodeById[selectedNodeId];
      if (node && node.href) window.location = node.href;
      return;
    }

    // ── Editorial scroll keys ──
    if ((forceEditorial || editorialFade > 0.5) && editorialNodeId) {
      var scrollKey = null;
      var scrollDelta = 0;
      if (e.key === "ArrowDown") { scrollDelta = 60; scrollKey = true; }
      else if (e.key === "ArrowUp") { scrollDelta = -60; scrollKey = true; }
      else if (e.key === "PageDown" || e.key === " " || e.key === "Space") { scrollDelta = H * 0.8; scrollKey = true; }
      else if (e.key === "PageUp") { scrollDelta = -H * 0.8; scrollKey = true; }
      else if (e.key === "Home") { editorialScrollY = 0; e.preventDefault(); scheduleRedraw(); return; }
      else if (e.key === "End") {
        var elayout = getEditorialLayout(editorialNodeId);
        if (elayout) editorialScrollY = Math.max(0, (elayout.contentH || elayout.cardH) - elayout.cardH);
        e.preventDefault(); scheduleRedraw(); return;
      }
      if (scrollKey) {
        e.preventDefault();
        var elayout2 = getEditorialLayout(editorialNodeId);
        if (elayout2) {
          var maxScroll = Math.max(0, (elayout2.contentH || elayout2.cardH) - elayout2.cardH);
          editorialScrollY = Math.max(0, Math.min(maxScroll, editorialScrollY + scrollDelta));

          }

        return;

      if (!cur) return;
      var nids = neighbors[selectedNodeId];

      for (var nid in nids) {
        if (hiddenNodes.has(nid)) continue;
        var n = nodeById[nid]; if (!n) continue;
        var dx = n._wx - cur._wx, dy = n._wy - cur._wy;
        var d = Math.sqrt(dx * dx + dy * dy);
        var ok = false;
        switch (e.key) {
          case "ArrowRight": ok = dx > 0 && Math.abs(dx) > Math.abs(dy) * 0.5; break;
          case "ArrowLeft":  ok = dx < 0 && Math.abs(dx) > Math.abs(dy) * 0.5; break;
          case "ArrowDown":  ok = dy > 0 && Math.abs(dy) > Math.abs(dx) * 0.5; break;
          case "ArrowUp":    ok = dy < 0 && Math.abs(dy) > Math.abs(dx) * 0.5; break;
        }

      }

        for (var nid in nids) {
          if (hiddenNodes.has(nid)) continue;
          var n = nodeById[nid]; if (!n) continue;
          var dx = n._wx - cur._wx, dy = n._wy - cur._wy;
          var d = Math.sqrt(dx * dx + dy * dy);
          var ok = false;
          switch (e.key) {
            case "ArrowRight": ok = dx > 0; break;
            case "ArrowLeft":  ok = dx < 0; break;
            case "ArrowDown":  ok = dy > 0; break;
            case "ArrowUp":    ok = dy < 0; break;
          }
          if (ok && d < bestD) { best = n; bestD = d; }
        }
      }
      if (best) {
        selectedNodeId = best.id;
        panToNode(best);
        updateHud(best);
        scheduleRedraw();
      }
    }
  });

  // ── Legend ──
  function buildLegend(stats) {
    var legendEl = document.getElementById("legend-items");
    var resetBtn = document.getElementById("legend-reset");
    var order = ["question", "concept", "entity", "source", "special"];
    var activeCats = order.filter(function(c) { return stats[c] > 0; });

    for (var i = 0; i < order.length; i++) {
      var cat = order[i], count = stats[cat] || 0;
      if (!count) continue;
      (function(cat, count) {
        var li = document.createElement("li");
        var brk = BRACKETS[cat] || ["[", "]"];
        li.innerHTML =
          '<span class="dot" style="background:' + COLORS[cat] + '"></span>' +
          '<span class="bracket">' + escapeHtml(brk[0] + " " + brk[1]) + '</span>' +
          '<span>' + (CATEGORY_LABELS[cat] || cat) + '</span>' +
          '<span class="count">' + count + '</span>';
        li.addEventListener("click", function() {
          if (activeCategories.has(cat)) activeCategories.delete(cat);
          else activeCategories.add(cat);
          li.classList.toggle("dimmed", !activeCategories.has(cat));
          resetBtn.style.display = activeCategories.size === activeCats.length ? "none" : "block";
          applyFilter();
        });
        legendEl.appendChild(li);
      })(cat, count);
    }
    resetBtn.addEventListener("click", function() {
      activeCategories = new Set(Object.keys(COLORS));
      var items = legendEl.querySelectorAll("li");
      for (var j = 0; j < items.length; j++) items[j].classList.remove("dimmed");
      resetBtn.style.display = "none";
      applyFilter();
    });
  }

  document.getElementById("zoom-out-btn").addEventListener("click", function(e) {

  document.getElementById("zoom-fit-btn").addEventListener("click", function(e) {

      forceEditorial = false;
      editorialScrollY = 0;
      editorialFadeStart = editorialFade;

    if (!nodes.length) return;
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];

      maxX = Math.max(maxX, n._wx + n._boxW / 2);

        totalBodyH: lay.totalBodyH,
        pullBlockW: lay.pullBlockW,
        pullBlockH: lay.pullBlockH,
        targetHalfForTwoCol: lay.targetHalfForTwoCol,
        lineCount: col1Samples.length + col2Samples.length,
        col1LineCount: col1Samples.length,
        col2LineCount: col2Samples.length,
        firstLines: col1Samples.slice(0, 30),
        col1Lines: col1Samples,
        col2Lines: col2Samples,
      };
    },
    getPullQuote: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      var lines = lay.pullQuoteLines || [];
      var text = lines.map(function (l) { return l.text || ""; }).join(" ").trim();
      return {
        text: text,
        lineCount: lines.length,
        useColumns: lay.useColumns || false,
        initialQuoteX: lay.initialQuoteX,
        initialQuoteY: lay.initialQuoteY,
        pullBlockW: lay.pullBlockW,
        pullBlockH: lay.pullBlockH,
        colW: lay.colW,
        innerW: lay.innerW,
        lineWidths: lines.map(function (l) { return l.width || 0; }),
        lineCenterDx: lines.map(function (l) { return l._centerDx || 0; }),
        lineTexts: lines.map(function (l) { return l.text || ""; }),
      };
    },
    getLinkHitboxes: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      return (lay._linkHitboxes || []).map(function (h) {
        return { x: h.x, y: h.y, w: h.w, h: h.h, slug: h.slug, display: h.display };
      });
    },
    getBlocks: function () {
      if (!editorialNodeId) return null;
      var lay = getEditorialLayout(editorialNodeId);
      if (!lay) return null;
      function pack(blocks) {
        return (blocks || []).map(function (b) {
          return {
            isHeader: !!b.isHeader,
            isDropCapPara: !!b.isDropCapPara,
            startY: b.startY,
            endY: b.endY,
            spaceAbove: b.spaceAbove,
            spaceBelow: b.spaceBelow,
            firstLineText: (b.lines && b.lines[0] && b.lines[0].text || "").slice(0, 40),
          };
        });
      }
      return {
        useColumns: lay.useColumns,
        bodyBlocks: pack(lay.bodyBlocks),
        col1Blocks: pack(lay.col1Blocks),
        col2Blocks: pack(lay.col2Blocks),
      };
    },
    listNodeIds: function () {
      if (typeof nodes === "undefined" || !nodes) return [];
      return nodes.map(function (n) { return n.id; });
    },
    openPanelForTest: function (nodeId) {
      // Directly open the sidebar panel for a node, bypassing the
      // canvas-click path. Used by headless audits that can't find
      // the node's screen position by pixel scan. Fires the same
      // render path (openPanel → formatRich / formatLead).
      if (!nodeById[nodeId]) return false;
      selectedNodeId = nodeId;
      updateHud(nodeById[nodeId]);
      openPanel(nodeId);
      scheduleRedraw();
      return true;
    },
    closeAllPanelsForTest: function () {
      closeAllPanels();
      scheduleRedraw();
      return true;
    },
  };

  // ── Boot ──
  Promise.resolve().then(function() {
    // Prefer inlined data (works on file://); fall back to fetch (for live dev server)
    if (window.__MAP_DATA__) {
      return [window.__MAP_DATA__, window.__PREVIEWS_DATA__ || {}, window.__GRAPH_DATA__ || { links: [] }];
    }
    return Promise.all([
      fetch("map.json").then(function(r) { return r.json(); }),
      fetch("previews.json").then(function(r) { return r.json(); }).catch(function() { return {}; }),
      fetch("graph.json").then(function(r) { return r.json(); }).catch(function() { return { links: [] }; }),
    ]);
  }).then(function(results) {
    var mapData = results[0];
    previews = results[1];
    var graphData = results[2];
    nodes = mapData.nodes;
    edges = mapData.edges;
    computeEdgeWeights(graphData.links);

    for (var i = 0; i < nodes.length; i++) {
      nodeById[nodes[i].id] = nodes[i];
      neighbors[nodes[i].id] = {};
    }
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      if (neighbors[e.source]) neighbors[e.source][e.target] = true;
      if (neighbors[e.target]) neighbors[e.target][e.source] = true;
    }

    buildLegend(mapData.stats);
    updateStats();
    resize();
    layoutNodes();
    centerView();
    setupMinimap();
    scheduleRedraw();

    window.addEventListener("resize", function() {
      resize(); editorialLayoutCache = {}; layoutNodes(); scheduleRedraw(); setupMinimap();
    });
  }).catch(function(err) {
    var isFile = window.location.protocol === 'file:';
    var canvas = document.getElementById("map-canvas");
    var rect = canvas.parentElement.getBoundingClientRect();
    var W = rect.width, H = rect.height;
    var dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    var ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#0a1214";
    ctx.fillRect(0, 0, W, H);
    ctx.font = "600 18px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#C4813D";
    ctx.textAlign = "center";
    ctx.fillText(isFile ? "Cannot load map data from file:// protocol" : "Failed to load map data", W/2, H/2 - 20);
    ctx.font = "14px 'JetBrains Mono', monospace";
    ctx.fillStyle = "rgba(250, 240, 230, 0.5)";
    ctx.fillText(isFile ? "Run: cd site && python3 -m http.server 8799 --directory out" : err.message || "Check the console for details", W/2, H/2 + 10);
    ctx.fillText(isFile ? "Then open http://localhost:8799/map.html" : "", W/2, H/2 + 35);
  });
})();
</script>
</body>
</html>
