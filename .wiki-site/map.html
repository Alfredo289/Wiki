<link rel="stylesheet" href="wikipedia.css">
<style>
  /* ── Dark dungeon override ─────────────────────────────────── */
  /* Light mode (default) — matches wiki editorial surface */
  :root {
    --dg-bg: #fbfaf5;
    --dg-bg2: #f5f3ec;
    --dg-surface: #ffffff;
    --dg-surface2: #f0ede4;
    --dg-border: #e3dccb;
    --dg-border-glow: #d4cbb5;
    --dg-text: #1a1612;
    --dg-text-dim: rgba(26, 22, 18, 0.5);
    --dg-text-ghost: rgba(26, 22, 18, 0.18);
    --dg-maroon: #7a1f1f;
    --dg-maroon-bright: #a03030;
    --dg-teal: #1a7a6e;
    --dg-teal-dim: rgba(26, 122, 110, 0.25);
    --dg-gold: #9a6a2a;
    --dg-gold-bright: #b87d30;
    --dg-cream: #1a1612;
    --dg-cat-question: #4a7ca6;
    --dg-cat-concept: #4f8a6d;
    --dg-cat-entity: #c77a3c;
    --dg-cat-source: #8d6ba3;
    --dg-cat-special: #9a8a77;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --dg-bg: #0a1214;
      --dg-bg2: #0f1a1d;
      --dg-surface: #132024;
      --dg-surface2: #1a2c31;
      --dg-border: #1e3338;
      --dg-border-glow: #2a4a50;
      --dg-text: #FAF0E6;
      --dg-text-dim: rgba(250, 240, 230, 0.5);
      --dg-text-ghost: rgba(250, 240, 230, 0.2);
      --dg-maroon: #722F37;
      --dg-maroon-bright: #a34450;
      --dg-teal: #2A9D8F;
      --dg-teal-dim: rgba(42, 157, 143, 0.35);
      --dg-gold: #C4813D;
      --dg-gold-bright: #e0a050;
      --dg-cream: #FAF0E6;
      --dg-cat-question: #5a9cc6;
      --dg-cat-concept: #5aaa7d;
      --dg-cat-entity: #d89a5c;
      --dg-cat-source: #ad8bc3;
      --dg-cat-special: #baa997;
    }
  }

  html, body { height: 100%; }
  body.page-map {
    overflow: hidden;
    background: var(--dg-bg);
  }

  /* Masthead removed — map uses its own nav toggle */
  body.page-map #search-results a {
    color: var(--dg-text);
    border-bottom-color: var(--dg-border);
  }
  body.page-map #search-results a:hover {
    background: var(--dg-surface2);
  }
  body.page-map #search-results .hint { color: var(--dg-text-dim); }

  .map-root {
    position: fixed;
    top: 0;
    left: 0; right: 0; bottom: 0;
    background: var(--dg-bg);
  }
  #map-canvas {
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
    touch-action: manipulation;
  }
  #map-canvas:active { cursor: grabbing; }

  /* ── Panels ────────────────────────────────────────────────── */
  .map-panel {
    position: absolute;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--dg-text);
  }

  /* ── Legend ─────────────────────────────────────────────────── */
  .map-legend {
    top: 18px; right: 18px;
    padding: 12px 14px;
    min-width: 180px;
    z-index: 100;
    transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .map-legend h4 {
    margin: 0 0 8px;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--dg-text-dim);
    font-weight: 600;
  }
  .map-legend ul { list-style: none; padding: 0; margin: 0; }
  .map-legend li {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s ease;
  }
  .map-legend li.dimmed { opacity: 0.25; }
  .map-legend li:hover { opacity: 0.8; }
  .map-legend li.dimmed:hover { opacity: 0.4; }
  .map-legend .dot {
    width: 8px; height: 8px; border-radius: 2px;
    display: inline-block; flex: 0 0 auto;
  }
  .map-legend .bracket {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--dg-text-dim);
    min-width: 2.2em;
    text-align: center;
  }
  .map-legend .count {
    margin-left: auto;
    color: var(--dg-text-dim);
    font-variant-numeric: tabular-nums;
  }
  .map-legend .reset-btn {
    display: block;
    margin-top: 8px;
    padding: 3px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dg-teal);
    background: transparent;
    border: 1px solid var(--dg-teal-dim);
    border-radius: 2px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .map-legend .reset-btn:hover {
    background: rgba(42, 157, 143, 0.12);
    border-color: var(--dg-teal);
    color: var(--dg-cream);
  }

  /* ── Help ───────────────────────────────────────────────────── */
  .map-help {
    bottom: 52px; left: 50%;
    transform: translateX(-50%);
    padding: 6px 10px;
    color: var(--dg-text-ghost);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    white-space: nowrap;
    pointer-events: none;
  }

  /* ── Stats ──────────────────────────────────────────────────── */
  .map-stats {
    top: 18px; left: 18px;
    padding: 8px 12px;
    color: var(--dg-text-dim);
    font-size: 0.7rem;
    font-variant-numeric: tabular-nums;
  }
  .map-stats strong { color: var(--dg-gold); font-weight: 600; }

  /* ── Nav toggle ─────────────────────────────────────────────── */
  .map-nav-toggle {
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    display: flex;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    z-index: 100;
  }
  .map-nav-toggle a {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.66rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dg-text-dim);
    text-decoration: none;
    border: none;
    border-right: 1px solid var(--dg-border);
    transition: background 0.15s, color 0.15s;
  }
  .map-nav-toggle a:last-child { border-right: none; }
  .map-nav-toggle a:hover { background: var(--dg-surface2); color: var(--dg-text); }
  .map-nav-toggle a.active {
    background: var(--dg-text);
    color: var(--dg-bg);
  }

  /* ── HUD Breadcrumb bar ─────────────────────────────────────── */
  .map-hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 44px;
    background: var(--dg-surface);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid var(--dg-border);
    display: flex;
    align-items: center;
    padding: 0 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--dg-text-dim);
    z-index: 150;
    transition: opacity 0.2s ease;
    overflow: hidden;
    gap: 6px;
  }
  .map-hud.empty { opacity: 0.4; }
  .hud-node {
    color: var(--dg-gold);
    font-weight: 600;
    white-space: nowrap;
  }
  .hud-sep {
    color: var(--dg-text-ghost);
    margin: 0 2px;
  }
  .hud-cat {
    color: var(--dg-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.58rem;
    white-space: nowrap;
  }
  .hud-neighbors {
    display: flex;
    gap: 6px;
    overflow: hidden;
    flex-shrink: 1;
  }
  .hud-neighbor {
    color: var(--dg-teal);
    white-space: nowrap;
    font-size: 0.65rem;
  }
  .hud-label {
    color: var(--dg-text-ghost);
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .hud-zoom {
    margin-left: auto;
    color: var(--dg-text-ghost);
    font-size: 0.6rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ── Tooltip ────────────────────────────────────────────────── */
  .map-tooltip {
    position: fixed;
    z-index: 300;
    width: 22rem;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border-glow);
    border-radius: 3px;
    padding: 0.85rem 1.05rem;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15), 0 0 1px rgba(26, 122, 110, 0.2);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--dg-text);
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .map-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .map-tooltip .tip-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.56rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.3rem;
  }
  .map-tooltip .tip-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-size: 1.02rem;
    font-weight: 500;
    margin: 0 0 0.4rem;
    color: var(--dg-cream);
    line-height: 1.2;
  }
  .map-tooltip .tip-lead {
    color: var(--dg-text-dim);
    margin: 0;
    font-size: 0.82rem;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Mini-map ───────────────────────────────────────────────── */
  .map-minimap {
    position: absolute;
    bottom: 62px;
    right: 18px;
    width: 160px;
    height: 100px;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    z-index: 90;
    transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #minimap-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Stacking panels (Obsidian Publish style) ──────────────── */
  .panel-overlay {
    position: absolute;
    top: 0; right: 0; bottom: 44px;
    display: flex;
    flex-direction: row-reverse;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }
  .stack-panel {
    pointer-events: auto;
    width: 380px;
    min-width: 380px;
    height: 100%;
    background: var(--dg-bg2);
    border-left: 1px solid var(--dg-border);
    border-top: 1px solid var(--dg-border);
    box-shadow: -8px 0 32px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }
  .stack-panel.visible {
    transform: translateX(0);
  }
  .stack-panel.stacked {
    width: 360px;
    min-width: 360px;
    margin-right: -20px;
    opacity: 0.85;
  }
  .panel-header {
    padding: 22px 18px 14px;
    border-bottom: 1px solid var(--dg-border);
    flex-shrink: 0;
  }
  .panel-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 24px; height: 24px;
    background: transparent;
    border: 1px solid var(--dg-border);
    border-radius: 2px;
    color: var(--dg-text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .panel-close:hover {
    background: var(--dg-maroon);
    border-color: var(--dg-maroon);
    color: var(--dg-cream);
  }
  .panel-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.56rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .panel-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--dg-cream);
    line-height: 1.25;
    margin: 0;
    padding-right: 30px;
  }
  .panel-body {
    padding: 16px 18px;
    overflow-y: auto;
    flex: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--dg-text-dim);
  }
  .panel-body p { margin: 0 0 1em; }
  .panel-body h3 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--dg-cream);
    margin: 1.4em 0 0.5em;
    line-height: 1.3;
  }
  .panel-body h3:first-child { margin-top: 0; }
  .panel-body strong {
    color: var(--dg-cream);
    font-weight: 600;
  }
  .panel-body em {
    font-style: italic;
    color: rgba(250, 240, 230, 0.72);
  }
  .panel-body a {
    color: var(--dg-teal);
    text-decoration: none;
    border-bottom: 1px solid var(--dg-teal-dim);
    transition: border-color 0.15s;
  }
  .panel-body a:hover {
    border-bottom-color: var(--dg-teal);
  }
  .panel-body cite {
    font-style: normal;
    color: var(--dg-text-dim);
    font-size: 0.82rem;
  }
  .panel-nav {
    padding: 12px 18px;
    border-top: 1px solid var(--dg-border);
    flex-shrink: 0;
  }
  .panel-nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dg-teal);
    text-decoration: none;
    transition: color 0.15s;
  }
  .panel-nav a:hover { color: var(--dg-gold); }
  .panel-nav a::after { content: " \2192"; }

  /* ── Zoom controls ──────────────────────────────────────────── */
  .map-zoom-controls {
    position: absolute;
    bottom: 62px;
    left: 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 100;
  }
  .map-zoom-btn {
    width: 28px;
    height: 28px;
    background: var(--dg-surface);
    border: 1px solid var(--dg-border);
    border-radius: 3px;
    color: var(--dg-cream);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    padding: 0;
  }
  .map-zoom-btn:hover {
    border-color: var(--dg-teal);
    box-shadow: 0 0 6px rgba(42, 157, 143, 0.25);
    background: var(--dg-surface2);
  }
  .map-zoom-level {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--dg-text-ghost);
    text-align: center;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Reduced motion ─────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .stack-panel { transition-duration: 0.01ms !important; }
    .map-tooltip { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body class="page-map">
<div class="map-root">
  <canvas id="map-canvas"></canvas>
  <div class="map-nav-toggle">

  </div>
  <div class="map-panel map-stats" id="map-stats"></div>

    <button class="reset-btn" id="legend-reset" style="display:none">Show all</button>
  </div>
  <div class="map-panel map-help">scroll zoom / drag pan / hover info / click panel / dblclick editorial / arrows navigate / R editorial / esc clear</div>
  <div class="map-minimap">
    <canvas id="minimap-canvas"></canvas>
  </div>
  <div class="map-zoom-controls" id="zoom-controls">
    <button class="map-zoom-btn" id="zoom-in-btn" title="Zoom in">+</button>
    <button class="map-zoom-btn" id="zoom-out-btn" title="Zoom out">&minus;</button>
    <button class="map-zoom-btn" id="zoom-fit-btn" title="Zoom to fit">1</button>
    <button class="map-zoom-btn" id="zoom-read-btn" title="Editorial mode">R</button>

  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="map-hud empty" id="map-hud">
    <span class="hud-label">explore the map</span>
    <span class="hud-zoom" id="hud-zoom">1.0x</span>
  </div>
</div>
<div class="map-tooltip" id="map-tooltip"></div>
